<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(145deg, #1e1e2f, #232339);
            font-family: 'Segoe UI', sans-serif;
            color: #eee;
            padding: 20px;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .energy {
            background: #2e2e42;
            border-radius: 20px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
        .energy-icon { font-size: 24px; }
        .progress-bg {
            background: #3f3f5c;
            height: 14px;
            width: 140px;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            background: #f0c45a;
            height: 100%;
            width: 72%; /* пример текущего значения */
            border-radius: 10px;
        }
        .coin-badge {
            background: #2e2e42;
            border-radius: 20px;
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
        .daily-section {
            background: #2a2a3c;
            border-radius: 20px;
            padding: 5px;
            margin-top: 15px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
        }
        iframe {
            width: 100%;
            height: 320px;
            border: none;
            border-radius: 16px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="energy">
            <span class="energy-icon">⚡</span>
            <div>
                <div style="font-size:14px; margin-bottom:4px;">Энергия</div>
                <div class="progress-bg">
                    <div class="progress-fill"></div>
                </div>
            </div>
        </div>
        <div class="coin-badge">
            <span>🪙</span> 1 500
        </div>
    </div>

    <h2 style="margin: 15px 0 5px;">📅 Ежедневные награды</h2>
    <div class="daily-section">
        <!-- Подключаем dailyrewards.html через iframe -->
        <iframe src="dailyrewards.html" title="Ежедневные награды"></iframe>
    </div>
</body>
</html>
