<div class="header">
    <div class="stat-badge" style="justify-content: center; width: auto; min-width: 120px;">
        <svg class="nav-svg" style="color:#ffb020; margin:0 6px 0 0;" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 16h-2v-2h2v2zm0-4h-2V7h2v7z"/></svg>
        <div id="coins">0</div>
    </div>
</div>

<div class="screen active" id="game-scr">
    <button class="coin-btn" id="coin-clicker">
        <img src="assets/coin.jpg" onerror="this.src='coin.jpg'">
    </button>
    <div class="energy-box">
        <div class="energy-text">
            <span id="lbl-energy">Энергия</span>
            <span id="energy-val">100/100</span>
        </div>
        <div class="energy-bar"><div class="energy-fill" id="energy-fill"></div></div>
    </div>
</div>

<div class="screen" id="shop-scr">
    <div class="shop-card">
        <h3 id="lbl-multitap">Мультитап</h3>
        <p id="desc-multitap">+1 монет за клик</p>
        <button class="btn" id="btn-upgrade-tap" onclick="buyUpgrade('tap')">0</button>
    </div>
    <div class="shop-card">
        <h3 id="lbl-energy-limit">Лимит энергии</h3>
        <p id="desc-energy-limit">+50 макс. энергии</p>
        <button class="btn" id="btn-upgrade-energy" onclick="buyUpgrade('energy')">0</button>
    </div>
    <div style="margin-top: 15px; width:100%;">
        <button class="btn btn-ok" id="btn-bonus" onclick="claimDailyBonus()" style="padding:15px; font-weight:bold; font-size:15px;"></button>
    </div>
</div>

<div class="screen" id="games-scr">
    <div id="games-menu" style="width:100%; display:flex; flex-direction:column; gap:12px;"></div>
    <div id="active-game-container" style="width:100%; display:none;"></div>
</div>

<div class="screen" id="profile-scr">
    <div class="profile-avatar" id="user-avatar">?</div>
    <h2 id="user-name" style="margin-bottom:20px;">User</h2>
    <div class="shop-card" style="text-align:left;">
        <div style="margin-bottom:8px;"><b id="lbl-p-id">Telegram ID:</b> <span id="p-id">-</span></div>
        <div style="margin-bottom:8px;"><b id="lbl-p-click">Сила клика:</b> <span id="p-click">1</span></div>
        <div><b id="lbl-p-maxenergy">Макс. энергия:</b> <span id="p-maxenergy">100</span></div>
    </div>
    <button class="btn btn-danger" id="btn-lang" onclick="toggleLang()" style="margin-top:auto; padding:12px; font-size:14px; font-weight:bold;"></button>
</div>

<div class="nav">
    <div class="nav-item active" id="n-game" onclick="show('game')">
        <div class="nav-glow"></div>
        <svg class="nav-svg" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span id="nv-game">Главная</span>
    </div>
    <div class="nav-item" id="n-shop" onclick="show('shop')">
        <div class="nav-glow"></div>
        <svg class="nav-svg" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 14H4v-4h11v4zm0-5H4V9h11v4zm5 5h-4V9h4v9z"/></svg>
        <span id="nv-shop">Магазин</span>
    </div>
    <div class="nav-item" id="n-games" onclick="show('games')">
        <div class="nav-glow"></div>
        <svg class="nav-svg" viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
        <span id="nv-games">Мини-игры</span>
    </div>
    <div class="nav-item" id="n-profile" onclick="show('profile')">
        <div class="nav-glow"></div>
        <svg class="nav-svg" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        <span id="nv-profile">Профиль</span>
    </div>
</div>
