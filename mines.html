<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mines</title>
<style>
  body{margin:0;background:#0b132a;color:#e9f0ff;font-family:Inter,system-ui}
  .wrap{max-width:520px;margin:0 auto;padding:12px}
  .top{display:flex;justify-content:space-between;align-items:center;margin:6px 0 12px}
  .panel{background:#0f1b39;border:1px solid #1a2c59;border-radius:12px;padding:10px}
  .grid{display:grid;grid-template-columns:repeat(5,52px);gap:8px;justify-content:center;margin:12px 0}
  .cell{width:52px;height:52px;border-radius:8px;background:#111f45;border:1px solid #1b2f67;display:grid;place-items:center;cursor:pointer;font-weight:700}
  .cell.open{background:#153a6e}
  .cell.mine{background:#5b1630}
  .controls{display:flex;gap:10px;justify-content:center}
  button{background:#17306a;color:#dce6ff;border:1px solid #2b55cc;border-radius:10px;padding:10px 12px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="panel">Баланс: <span id="bal">0</span></div>
    <div class="panel">Ставка: <input id="bet" type="number" min="1" value="10" style="width:80px;background:#0e1836;color:#fff;border:1px solid #284aa0;border-radius:8px;padding:6px"></div>
    <div class="panel">x<span id="mult">1.00</span></div>
  </div>
  <div class="controls"><button id="start">Старт</button><button id="cashout" disabled>Забрать</button></div>
  <div class="grid" id="grid"></div>
</div>
<script>
  // postMessage helpers
  function send(msg){ parent.postMessage(msg,'*'); }
  let balance=0; send({type:'getBalance'});
  window.addEventListener('message',e=>{ if(e.data?.type==='balance'){ balance=e.data.value; document.getElementById('bal').textContent=balance; } });

  const grid=document.getElementById('grid');
  const multEl=document.getElementById('mult');
  const betEl=document.getElementById('bet');
  const startBtn=document.getElementById('start');
  const cashBtn=document.getElementById('cashout');

  const size=5, minesCount=5;
  let cells=[], playing=false, opened=0, mult=1, bet=10, cashed=0;

  function build(){
    grid.innerHTML=''; cells=[];
    for(let i=0;i<size*size;i++){
      const d=document.createElement('div'); d.className='cell'; d.dataset.i=i;
      d.addEventListener('click',()=>open(i));
      grid.appendChild(d); cells.push({el:d, mine:false, open:false});
    }
  }
  function placeMines(){
    let left=[...Array(size*size).keys()];
    for(let m=0;m<minesCount;m++){
      const k=Math.floor(Math.random()*left.length);
      const idx=left.splice(k,1)[0];
      cells[idx].mine=true;
    }
  }
  function reset(){
    build(); placeMines(); opened=0; mult=1; cashed=0;
    multEl.textContent=mult.toFixed(2);
    cashBtn.disabled=true;
  }
  function start(){
    bet = Math.max(1, parseInt(betEl.value||1));
    if(bet>balance) return alert('Недостаточно средств');
    send({type:'sub', amount:bet});
    balance-=bet; document.getElementById('bal').textContent=balance;
    playing=true; reset();
    startBtn.disabled=true; cashBtn.disabled=true;
  }
  function open(i){
    if(!playing) return;
    const c=cells[i]; if(c.open) return;
    c.open=true; c.el.classList.add('open');
    if(c.mine){
      c.el.classList.add('mine'); // проигрыш
      playing=false; startBtn.disabled=false; cashBtn.disabled=true;
      mult=0; multEl.textContent='0.00';
      return;
    }
    opened++;
    mult *= 1.25; // рост множителя
    multEl.textContent=mult.toFixed(2);
    c.el.textContent='✓';
    cashBtn.disabled=false;
  }
  function cashout(){
    if(!playing) return;
    const win = Math.floor(bet*mult);
    send({type:'add', amount:win});
    balance+=win; document.getElementById('bal').textContent=balance;
    playing=false; startBtn.disabled=false; cashBtn.disabled=true;
  }

  startBtn.onclick=start;
  cashBtn.onclick=cashout;
  build();
</script>
</body>
</html>
