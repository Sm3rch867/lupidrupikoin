<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Plinko</title>
<style>
  body{margin:0;background:#0b132a;color:#e9f0ff;font-family:Inter,system-ui}
  .wrap{max-width:520px;margin:0 auto;padding:14px}
  .panel{background:#0f1b39;border:1px solid #1a2c59;border-radius:12px;padding:12px;margin-bottom:10px}
  .row{display:flex;gap:10px;align-items:center;justify-content:space-between}
  button{background:#17306a;border:1px solid #2b55cc;color:#e9f0ff;border-radius:10px;padding:10px 14px;cursor:pointer}
  canvas{width:100%;height:360px;background:linear-gradient(180deg,#10224a,#0c1733);border:1px solid #1a2c59;border-radius:12px}
  input{background:#0e1836;color:#fff;border:1px solid #284aa0;border-radius:8px;padding:8px}
</style></head>
<body>
<div class="wrap">
  <div class="panel row">
    <div>Баланс: <span id="bal">0</span></div>
    <div>Ставка: <input id="bet" type="number" min="1" value="10" style="width:90px"></div>
    <button id="drop">Пустить шар</button>
  </div>
  <div class="panel"><canvas id="cv"></canvas></div>
</div>
<script>
  function send(m){ parent.postMessage(m,'*'); }
  let balance=0; send({type:'getBalance'});
  window.addEventListener('message',e=>{ if(e.data?.type==='balance'){ balance=e.data.value; bal.textContent=balance; }});
  const bal=document.getElementById('bal');
  const betEl=document.getElementById('bet');
  const cv=document.getElementById('cv'); const ctx=cv.getContext('2d');

  function resize(){ cv.width=cv.clientWidth; cv.height=cv.clientHeight; draw(); }
  window.addEventListener('resize',resize); resize();

  const rows=7, cols=8, pegs=[];
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      if(r%2===1 && c===cols-1) continue;
      pegs.push({r,c:x(c,r)});
    }
  }
  function x(c,r){ return c + (r%2?0.5:0); }

  let ball=null; // {x,y,vx,vy}
  function startBall(){
    const bet=Math.max(1,parseInt(betEl.value||1));
    if(bet>balance) return alert('Недостаточно средств');
    send({type:'sub',amount:bet}); balance-=bet; bal.textContent=balance;

    ball={x:cv.width/2,y:20,vx:(Math.random()-.5)*2,vy:0};
  }

  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    // пеги
    ctx.fillStyle='#2d4f9a';
    const gapX=cv.width/(cols+1), gapY=cv.height/(rows+2);
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        if(r%2===1 && c===cols-1) continue;
        const px = (c+1 + (r%2?0.5:0))*gapX;
        const py = (r+1)*gapY;
        ctx.beginPath(); ctx.arc(px,py,4,0,Math.PI*2); ctx.fill();
      }
    }
    // лунки
    const mults=[0.5,0.8,1,1.5,2,1.5,1,0.8,0.5];
    ctx.fillStyle='#17306a'; ctx.strokeStyle='#2b55cc';
    for(let i=0;i<mults.length;i++){
      const x=(i+0.75)*cv.width/mults.length; const y=cv.height-20;
      ctx.strokeRect(x-22,y-16,44,18);
      ctx.fillText('x'+mults[i], x-10, y-4);
    }
    // шар
    if(ball){
      // физика
      ball.vy += 0.2; ball.x += ball.vx; ball.y += ball.vy;
      // столкновения со стенами
      if(ball.x<10){ ball.x=10; ball.vx*=-0.6; }
      if(ball.x>cv.width-10){ ball.x=cv.width-10; ball.vx*=-0.6; }
      // столкновения с пегами (приближённо)
      for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
          if(r%2===1 && c===cols-1) continue;
          const px=(c+1+(r%2?0.5:0))*gapX, py=(r+1)*gapY;
          const dx=ball.x-px, dy=ball.y-py;
          const dist=Math.hypot(dx,dy);
          if(dist<7){ // отскок
            const nx=dx/dist, ny=dy/dist;
            const dot=ball.vx*nx + ball.vy*ny;
            ball.vx -= 2*dot*nx; ball.vy -= 2*dot*ny;
            ball.vx*=0.9; ball.vy*=0.9;
          }
        }
      }
      // приземление
      if(ball.y>cv.height-22){
        const slot=Math.min(mults.length-1, Math.max(0, Math.floor(ball.x/(cv.width/mults.length))));
        const k=mults[slot];
        const bet=parseInt(betEl.value||1);
        const prize=Math.floor(bet*k);
        send({type:'add',amount:prize}); balance+=prize; bal.textContent=balance;
        alert('x'+k+'  Выигрыш: '+prize);
        ball=null;
      }
      ctx.fillStyle='#aee2ff';
      ctx.beginPath(); ctx.arc(ball.x,ball.y,8,0,Math.PI*2); ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
  document.getElementById('drop').onclick=startBall;
</script>
</body></html>
