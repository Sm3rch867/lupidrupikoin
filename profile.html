<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Профиль</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Только стили для профиля и диалога */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; user-select: none; }
        body { background: linear-gradient(135deg, #020617 0%, #0b1e3d 100%); color: white; min-height: 100vh; padding: 20px; }
        .custom-dialog-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(2,6,23,0.85); display: none; justify-content: center; align-items: center; z-index: 100; padding: 20px; backdrop-filter: blur(4px); }
        .custom-dialog-overlay.open { display: flex; }
        .custom-dialog-box { background: #0d1527; border: 1px solid rgba(255,255,255,0.08); width: 100%; max-width: 320px; border-radius: 24px; padding: 24px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: zoomIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .result-dialog-text { font-size: 16px; font-weight: bold; color: white; line-height: 1.5; margin-bottom: 20px; }
        .result-dialog-btn { background: #2563eb; color: white; border: none; width: 100%; padding: 12px; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; }
        .profile-header { display: flex; align-items: center; gap: 15px; width: 100%; padding: 14px 18px; background: rgba(13,19,32,0.4); border-radius: 16px; border: 1px solid rgba(255,255,255,0.02); margin-bottom: 20px; }
        .profile-avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; background: #131f37; border: 1px solid rgba(255,255,255,0.1); }
        .profile-meta h3 { font-size: 16px; font-weight: 700; color: white; }
        .profile-meta p { font-size: 11px; color: #475467; margin-top: 2px; }
        .lang-switch { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; width: 100%; background: rgba(13,19,32,0.4); padding: 5px; border-radius: 12px; margin-bottom: 20px; }
        .lang-btn { background: transparent; border: none; color: #4f5b70; padding: 11px; font-weight: 700; font-size: 13px; border-radius: 10px; cursor: pointer; transition: all 0.3s ease; }
        .lang-btn.active { background: #1e3a8a; color: white; box-shadow: 0 0 15px rgba(37,99,235,0.6); }
        .stats-container-card { width: 100%; background: #070d19; border: 1px solid rgba(255,255,255,0.04); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .stats-container-card h3 { font-size: 16px; font-weight: 700; color: white; margin-bottom: 16px; }
        .stats-list { width: 100%; display: flex; flex-direction: column; }
        .stats-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #64748b; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .stats-row:last-child { border-bottom: none; }
        .stats-row span:last-child { font-weight: 600; color: #ffffff; display: flex; align-items: center; gap: 6px; text-align: right; }
        .stats-row .win-color { color: #22c55e !important; }
        .coin-mini-icon { width: 16px; height: 16px; border-radius: 50%; object-fit: contain; display: inline-block; vertical-align: middle; }
        .leaderboard-card { width: 100%; background: #0d1626; border-radius: 14px; padding: 14px 18px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.02); }
        .leaderboard-info { display: flex; flex-direction: column; gap: 3px; }
        .leaderboard-name { font-size: 14px; font-weight: 700; color: white; }
        .leaderboard-uid { font-size: 11px; color: #475467; }
        .leaderboard-score { font-size: 14px; font-weight: 700; color: #2563eb; display: flex; align-items: center; gap: 6px; }
        .admin-panel { display: none; background: #070d19; border: 1px solid #ef4444; border-radius: 16px; padding: 16px; margin-bottom: 20px; width: 100%; text-align: left; }
        .admin-title { color: #ef4444; font-weight: 700; font-size: 13px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; text-transform: uppercase; }
        .admin-input-field { width: 100%; background: #0d1626; border: 1px solid rgba(255,255,255,0.05); color: white; padding: 10px 12px; border-radius: 10px; margin-bottom: 10px; font-size: 13px; outline: none; }
        .admin-input-field:focus { border-color: #ef4444; }
        .admin-btn-action { width: 100%; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 13px; border: none; color: white; cursor: pointer; text-transform: uppercase; }
        .admin-btn-action.give { background: #22c55e; margin-bottom: 10px; }
        .admin-btn-action.wipe { background: #ef4444; }
        .shop-section-title { width: 100%; text-align: left; font-size: 15px; font-weight: 700; margin: 10px 0 12px 0; color: white; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="custom-dialog-overlay" id="result-dialog">
        <div class="custom-dialog-box">
            <div class="result-dialog-text" id="result-dialog-msg">---</div>
            <button class="result-dialog-btn" onclick="closeCustomResultDialog()">OK</button>
        </div>
    </div>

    <!-- Блок профиля -->
    <div class="profile-header">
        <img src="assets/avatar.jpg" class="profile-avatar" id="user-avatar" onerror="this.src='avatar.jpg'; this.onerror=function(){this.src='https://ui-avatars.com/api/?name=Lupi&background=2563eb&color=fff'}">
        <div class="profile-meta">
            <h3 id="user-username">Игрок</h3>
            <p id="user-joined">Загрузка данных...</p>
        </div>
    </div>

    <div class="lang-switch">
        <button class="lang-btn active" id="lang-ru" onclick="setLanguage('ru')">Русский</button>
        <button class="lang-btn" id="lang-en" onclick="setLanguage('en')">English</button>
    </div>

    <div class="stats-container-card">
        <h3 id="lbl-stats-header">Статистика</h3>
        <div class="stats-list">
            <div class="stats-row"><span id="st-coins">Количество монет</span><span><span id="stat-coins-val">0</span><img src="assets/coin.jpg" class="coin-mini-icon" onerror="this.src='coin.jpg'"></span></div>
            <div class="stats-row"><span id="st-taps">Количество тапов</span><span id="stat-taps-val">0</span></div>
            <div class="stats-row"><span id="st-won">Выиграно в мини играх</span><span><span id="stat-won-val" class="win-color">0</span><img src="assets/coin.jpg" class="coin-mini-icon" onerror="this.src='coin.jpg'"></span></div>
            <div class="stats-row"><span id="st-profit">Прибыль</span><span><span id="stat-profit-val" class="win-color">+0</span><img src="assets/coin.jpg" class="coin-mini-icon" onerror="this.src='coin.jpg'"></span></div>
            <div class="stats-row"><span id="st-streak">Стрик наград</span><span><span id="stat-streak-val">0</span> дней</span></div>
            <div class="stats-row"><span id="st-wheel">Прокрутил колесо фортуны</span><span id="stat-wheel-val">0</span></div>
        </div>
    </div>

    <div class="admin-panel" id="admin-area">
        <div class="admin-title">♡ АДМИН-МЕНЮ</div>
        <input type="text" id="target-id" class="admin-input-field" placeholder="ID игрока">
        <input type="number" id="amount-give" class="admin-input-field" placeholder="Добавить монет" value="100000">
        <button class="admin-btn-action give" onclick="adminGive()">ВЫДАТЬ РЕСУРСЫ</button>
        <button class="admin-btn-action wipe" onclick="adminWipe()">◯ СБРОС ИГРОКА</button>
    </div>

    <div class="shop-section-title" id="lbl-lead-title" style="margin-top: 10px;">ТОП ИГРОКОВ 🏆</div>
    <div id="leaderboard" style="width:100%; padding-bottom: 20px;">Загрузка топа...</div>

    <script>
        // ТОЛЬКО НУЖНЫЙ JS ДЛЯ ПРОФИЛЯ

        const langData = {
            ru: {
                nv_game: "Главная", nv_shop: "Магазин", nv_games: "Мини-игры", nv_profile: "Профиль",
                top_title: "ТОП ИГРОКОВ 🏆", day: "День",
                st_1: "Количество монет", st_2: "Количество тапов", st_3: "Выиграно в мини играх",
                st_4: "Прибыль", st_5: "Стрик наград", st_6: "Прокрутил колесо фортуны"
            },
            en: {
                nv_game: "Main", nv_shop: "Shop", nv_games: "Mini-Games", nv_profile: "Profile",
                top_title: "TOP PLAYERS 🏆", day: "Day",
                st_1: "Coins balance", st_2: "Total taps", st_3: "Won in mini games",
                st_4: "Net profit", st_5: "Reward streak", st_6: "Wheel spins completed"
            }
        };

        let currentLang = localStorage.getItem('cc_lang') || 'ru';
        let coins = parseInt(localStorage.getItem('cc_coins')) || 0;
        let totalTaps = parseInt(localStorage.getItem('cc_total_taps')) || 0;
        let miniGamesWon = parseInt(localStorage.getItem('cc_games_won')) || 0;
        let miniGamesProfit = parseInt(localStorage.getItem('cc_games_profit')) || 0;
        let rewardStreak = parseInt(localStorage.getItem('cc_reward_streak')) || 0;
        let wheelSpins = parseInt(localStorage.getItem('cc_wheel_spins')) || 0;

        const firebaseConfig = { databaseURL: "https://lupidrupikoin-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let tgUser = { id: "local_dev", first_name: "Игрок", username: "player" };
        let isAdmin = false;
        if (window.Telegram && window.Telegram.WebApp) {
            const webapp = window.Telegram.WebApp;
            webapp.ready();
            webapp.expand();
            if (webapp.initDataUnsafe && webapp.initDataUnsafe.user) {
                tgUser = webapp.initDataUnsafe.user;
            }
        }
        isAdmin = tgUser.id == "5932857353";
        const userRef = db.ref('users/' + tgUser.id);

        userRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                coins = data.coins !== undefined ? data.coins : coins;
                totalTaps = data.totalTaps !== undefined ? data.totalTaps : totalTaps;
                miniGamesWon = data.miniGamesWon !== undefined ? data.miniGamesWon : miniGamesWon;
                miniGamesProfit = data.miniGamesProfit !== undefined ? data.miniGamesProfit : miniGamesProfit;
                rewardStreak = data.rewardStreak !== undefined ? data.rewardStreak : rewardStreak;
                wheelSpins = data.wheelSpins !== undefined ? data.wheelSpins : wheelSpins;
                isAdmin = (data.isAdmin || tgUser.id == "5932857353");
                localStorage.setItem('cc_coins', coins);
                localStorage.setItem('cc_total_taps', totalTaps);
                localStorage.setItem('cc_games_won', miniGamesWon);
                localStorage.setItem('cc_games_profit', miniGamesProfit);
                localStorage.setItem('cc_reward_streak', rewardStreak);
                localStorage.setItem('cc_wheel_spins', wheelSpins);
                document.getElementById('admin-area').style.display = isAdmin ? 'block' : 'none';
                updateUI();
                initTelegramProfile();
            } else {
                saveToFirebase();
            }
        });

        function saveToFirebase() {
            userRef.update({
                uid: tgUser.id,
                name: tgUser.first_name + (tgUser.last_name ? " " + tgUser.last_name : ""),
                username: tgUser.username || "none",
                coins: coins,
                totalTaps: totalTaps,
                miniGamesWon: miniGamesWon,
                miniGamesProfit: miniGamesProfit,
                rewardStreak: rewardStreak,
                wheelSpins: wheelSpins
            });
        }

        function initTelegramProfile() {
            const nameEl = document.getElementById('user-username');
            const joinedEl = document.getElementById('user-joined');
            const avatarEl = document.getElementById('user-avatar');
            const fullName = tgUser.first_name + (tgUser.last_name ? " " + tgUser.last_name : "");
            const handle = tgUser.username ? ` (@${tgUser.username})` : "";
            nameEl.innerText = fullName + handle;
            joinedEl.innerText = `ID: ${tgUser.id}`;
            if (tgUser.photo_url) avatarEl.src = tgUser.photo_url;
        }

        function updateUI() {
            document.getElementById('stat-coins-val').innerText = coins.toLocaleString();
            document.getElementById('stat-taps-val').innerText = totalTaps.toLocaleString();
            document.getElementById('stat-won-val').innerText = miniGamesWon.toLocaleString();
            const pSign = miniGamesProfit >= 0 ? "+" : "";
            const pEl = document.getElementById('stat-profit-val');
            if (pEl) {
                pEl.innerText = pSign + miniGamesProfit.toLocaleString();
                pEl.className = miniGamesProfit >= 0 ? "win-color" : "lose-color";
            }
            document.getElementById('stat-streak-val').innerText = rewardStreak;
            document.getElementById('stat-wheel-val').innerText = wheelSpins;
        }

        function showCustomResultDialog(htmlText) {
            document.getElementById('result-dialog-msg').innerHTML = htmlText;
            document.getElementById('result-dialog').classList.add('open');
        }
        function closeCustomResultDialog() {
            document.getElementById('result-dialog').classList.remove('open');
        }

        function adminGive() {
            if (!isAdmin) return;
            const tId = document.getElementById('target-id').value;
            const amt = parseInt(document.getElementById('amount-give').value) || 0;
            if (!tId) return;
            db.ref('users/' + tId).once('value', (s) => {
                if (s.exists()) {
                    const oldC = s.val().coins || 0;
                    db.ref('users/' + tId).update({ coins: oldC + amt });
                    showCustomResultDialog(`Ресурсы успешно отправлены пользователю ${tId}!`);
                } else {
                    showCustomResultDialog("Игрок с таким ID не обнаружен.");
                }
            });
        }

        function adminWipe() {
            if (!isAdmin) return;
            const tId = document.getElementById('target-id').value;
            if (!tId) return;
            if (confirm("Вы действительно хотите полностью обнулить этого игрока?")) {
                db.ref('users/' + tId).update({
                    coins: 0, totalTaps: 0, miniGamesWon: 0, miniGamesProfit: 0, rewardStreak: 0, wheelSpins: 0
                });
                showCustomResultDialog(`Данные игрока ${tId} были успешно сброшены.`);
            }
        }

        function loadLeaderboard() {
            const lContainer = document.getElementById('leaderboard');
            db.ref('users').orderByChild('coins').limitToLast(50).once('value', (snapshot) => {
                let list = [];
                snapshot.forEach(child => {
                    const userData = child.val();
                    if (userData.totalTaps && userData.totalTaps > 0) list.push(userData);
                });
                list.reverse();
                list = list.slice(0, 10);
                lContainer.innerHTML = "";
                if (list.length === 0) {
                    lContainer.innerHTML = "<div style='color:#64748b; font-size:13px; text-align:center;'>В топе пока нет активных игроков</div>";
                    return;
                }
                list.forEach((u, i) => {
                    const uName = u.name || "Без имени";
                    const uCoins = u.coins !== undefined ? u.coins : 0;
                    let uHandle = u.username && u.username !== "none" ? ` (@${u.username})` : "";
                    let uidHtml = "";
                    if (isAdmin && u.uid) uidHtml = `<div class="leaderboard-uid">ID: ${u.uid}</div>`;
                    lContainer.innerHTML += `
                        <div class="leaderboard-card">
                            <div class="leaderboard-info">
                                <div class="leaderboard-name">${i+1}. ${uName}${uHandle}</div>
                                ${uidHtml}
                            </div>
                            <div class="leaderboard-score">${uCoins.toLocaleString()} <img src="assets/coin.jpg" class="coin-mini-icon" onerror="this.src='coin.jpg'"></div>
                        </div>
                    `;
                });
            });
        }

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('cc_lang', lang);
            document.getElementById('lang-ru').classList.toggle('active', lang === 'ru');
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            document.getElementById('lbl-stats-header').innerText = lang === 'ru' ? "Статистика" : "Statistics";
            document.getElementById('lbl-lead-title').innerText = langData[lang].top_title;
            document.getElementById('st-coins').innerText = langData[lang].st_1;
            document.getElementById('st-taps').innerText = langData[lang].st_2;
            document.getElementById('st-won').innerText = langData[lang].st_3;
            document.getElementById('st-profit').innerText = langData[lang].st_4;
            document.getElementById('st-streak').innerText = langData[lang].st_5;
            document.getElementById('st-wheel').innerText = langData[lang].st_6;
            updateUI();
            initTelegramProfile();
        }

        // Загрузка топа при старте
        loadLeaderboard();
        // Установка языка
        setLanguage(currentLang);
    </script>
</body>
</html>
