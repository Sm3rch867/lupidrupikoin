<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЛУПИДРУПИКОИН: 9 SECTORS</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #facc15; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        .screen { display: none; flex-direction: column; align-items: center; height: calc(100vh - 80px); padding: 20px; overflow-y: auto; }
        .active { display: flex; }

        #coins { font-size: 48px; font-weight: bold; color: var(--primary); text-shadow: 0 0 20px rgba(250, 204, 21, 0.4); margin-top: 20px; }
        .stats { font-size: 14px; color: #94a3b8; display: flex; gap: 15px; margin-bottom: 20px; }

        .coin-btn {
            width: 260px; height: 260px; border-radius: 50%; border: 8px solid #1e293b;
            background: url('coin.png') center/cover; margin: 10px 0;
            box-shadow: 0 0 40px rgba(0,0,0,0.5); transition: transform 0.05s; touch-action: manipulation;
        }
        .coin-btn:active { transform: scale(0.92); }

        .energy-bar { width: 100%; height: 12px; background: #1e293b; border-radius: 10px; overflow: hidden; margin-top: 8px; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #facc15, #fbbf24); transition: 0.3s; }

        .wheel-box { position: relative; width: 280px; height: 280px; margin: 15px 0; }
        .wheel-pointer { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-top: 30px solid #ef4444; z-index: 10;
        }

        .nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: #1e293b; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #334155; }
        .nav-item { text-align: center; font-size: 11px; opacity: 0.5; color: white; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--primary); }

        .btn { background: var(--primary); color: #000; border: none; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn:disabled { background: #334155; color: #94a3b8; cursor: not-allowed; }
        
        .chance-text { font-size: 10px; color: #64748b; margin-top: 8px; text-align: center; line-height: 1.4; }

        .admin-panel { display: none; background: #1e293b; padding: 15px; border-radius: 15px; margin-bottom: 20px; width: 100%; border: 2px solid #ef4444; }
        .plus-one { position: absolute; color: var(--primary); font-size: 24px; font-weight: bold; pointer-events: none; animation: floatUp 0.8s forwards; }
        @keyframes floatUp { to { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="game-scr" class="screen active">
        <div id="coins">0</div>
        <div class="stats">
            <span>➕ <span id="click-val">1</span>/клик</span>
            <span>🎰 Спины: <span id="spins-top">0</span></span>
        </div>
        <button class="coin-btn" id="coin-tap"></button>
        <div style="width: 100%; max-width: 300px; margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; font-size: 14px;">
                <span>⚡ Энергия</span>
                <span><span id="e-text">1000</span>/1000</span>
            </div>
            <div class="energy-bar"><div id="energy-fill"></div></div>
        </div>
    </div>

    <div id="bonus-scr" class="screen">
        <div style="background: var(--card); padding: 15px; border-radius: 15px; width: 100%; margin-bottom: 20px;">
            <h3 id="d-title">Следующая награда</h3>
            <p id="d-desc" style="font-size: 13px; color: #94a3b8; margin: 5px 0 10px;">Заходи каждый день!</p>
            <button class="btn" id="claim-btn" onclick="claimDaily()">ЗАБРАТЬ БОНУС</button>
        </div>

        <div class="wheel-box">
            <div class="wheel-pointer"></div>
            <canvas id="wheel-canvas" width="280" height="280"></canvas>
        </div>
        <button class="btn" id="spin-btn" onclick="startSpin()">КРУТИТЬ (Спины: <span id="s-btn-val">0</span>)</button>
        
        <div class="chance-text">
            Джекпот 11.1% | x2 (10м) 22.2% | ∞ Энергия 22.2% | Кеш 44.4%<br>
            9 секторов — еще больше шансов на буст!
        </div>
    </div>

    <div id="top-scr" class="screen">
        <h2 style="margin-bottom: 20px;">ТОП ИГРОКОВ 🏆</h2>
        <div id="leaderboard" style="width: 100%;">Загрузка...</div>
    </div>

    <div class="nav">
        <div class="nav-item active" id="n-game" onclick="show('game')">💰<br>Главная</div>
        <div class="nav-item" id="n-bonus" onclick="show('bonus')">🎁<br>Бонусы</div>
        <div class="nav-item" id="n-top" onclick="show('top')">🏆<br>Топ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const spinSound = new Audio('spin.mp3');
        const winSound = new Audio('win.mp3');
        let audioUnlocked = false;

        const firebaseConfig = {
            apiKey: "AIzaSyDSWXC6HPW0QJu73BWDD4rzHdzb6rP7yg",
            authDomain: "lupidrupikoin.firebaseapp.com",
            databaseURL: "https://lupidrupikoin-default-rtdb.firebaseio.com",
            projectId: "lupidrupikoin",
            storageBucket: "lupidrupikoin.firebasestorage.app",
            messagingSenderId: "71547438259",
            appId: "1:71547438259:web:807e88ddf21799511e7aa6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let coins = parseInt(localStorage.getItem('c')) || 0;
        let energy = parseInt(localStorage.getItem('e')) || 1000;
        let spins = parseInt(localStorage.getItem('s')) || 0;
        let lastClaim = parseInt(localStorage.getItem('lc')) || 0;
        
        let boost = 1;
        let infE = false;
        let spinning = false;

        // --- КОЛЕСО: 9 СЕКТОРОВ ---
        const sectors = [
            { n: "+5% Кеш", c: "#1e293b" }, 
            { n: "Множитель x2", c: "#a855f7" },
            { n: "∞ Энергия", c: "#3b82f6" },
            { n: "+5% Кеш", c: "#1e293b" }, 
            { n: "ДЖЕКПОТ", c: "#facc15" },
            { n: "+5% Кеш", c: "#1e293b" },
            { n: "Множитель x2", c: "#a855f7" },
            { n: "∞ Энергия", c: "#3b82f6" },
            { n: "+5% Кеш", c: "#1e293b" }
        ];

        function syncWithDB() {
            if(tg.initDataUnsafe?.user?.id) {
                db.ref('users/' + tg.initDataUnsafe.user.id).once('value', s => {
                    if(s.exists()){
                        const d = s.val();
                        coins = d.coins || 0; spins = d.spins || 0; lastClaim = d.lastClaim || 0;
                        updateUI(); saveLocal();
                    }
                });
            }
        }

        function updateTimer() {
            const btn = document.getElementById('claim-btn');
            const now = Date.now();
            const timeLeft = (lastClaim + 86400000) - now;
            if (timeLeft > 0) {
                btn.disabled = true;
                const h = Math.floor(timeLeft / 3600000);
                const m = Math.floor((timeLeft % 3600000) / 60000);
                const s = Math.floor((timeLeft % 60000) / 1000);
                btn.innerText = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            } else {
                btn.disabled = false; btn.innerText = "ЗАБРАТЬ БОНУС";
            }
        }
        setInterval(updateTimer, 1000);

        function claimDaily() {
            const now = Date.now();
            if (now - lastClaim < 86400000) return;
            coins += 5000; spins += 1; lastClaim = now;
            tg.showAlert("Бонус: +5,000 монет и 1 Спин!");
            saveAll(); updateUI();
        }

        function unlockAudio() {
            if (!audioUnlocked) {
                spinSound.play().then(() => { spinSound.pause(); spinSound.currentTime = 0; }).catch(()=>null);
                winSound.play().then(() => { winSound.pause(); winSound.currentTime = 0; }).catch(()=>null);
                audioUnlocked = true;
            }
        }

        const tapArea = document.getElementById('coin-tap');
        const handleTap = (e) => {
            if (e.cancelable) e.preventDefault();
            unlockAudio();
            if (energy <= 0 && !infE) return;
            coins += boost; if (!infE) energy--;
            
            const clientX = e.touches ? e.touches[0].pageX : e.clientX;
            const clientY = e.touches ? e.touches[0].pageY : e.clientY;
            const p = document.createElement('div');
            p.className = 'plus-one'; p.innerText = `+${boost}`;
            p.style.left = clientX + 'px'; p.style.top = clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
            updateUI(); saveAll();
            tg.HapticFeedback.impactOccurred('medium');
        };

        tapArea.addEventListener('touchstart', handleTap, {passive: false});
        tapArea.addEventListener('mousedown', handleTap);

        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');

        function drawWheel(angle = 0) {
            const arc = (Math.PI * 2) / sectors.length;
            ctx.clearRect(0,0,280,280);
            sectors.forEach((s, i) => {
                const a = angle + i * arc;
                ctx.beginPath(); ctx.fillStyle = s.c; ctx.moveTo(140,140);
                ctx.arc(140,140,135,a,a+arc); ctx.fill();
                ctx.save(); ctx.translate(140,140); ctx.rotate(a+arc/2);
                ctx.fillStyle="white"; ctx.font="bold 9px Arial"; ctx.fillText(s.n, 55, 5); ctx.restore();
            });
        }

        function startSpin() {
            if (spins <= 0 || spinning) return tg.showAlert("Нет спинов!");
            unlockAudio(); spinning = true; spins--; updateUI(); saveAll(); 
            spinSound.currentTime = 0; spinSound.loop = true; spinSound.play().catch(()=>null);
            
            let angle = Math.random() * Math.PI * 2; 
            let speed = 0.35 + Math.random() * 0.15; 
            const anim = () => {
                angle += speed; speed *= 0.986; drawWheel(angle);
                if (speed < 0.005) {
                    spinning = false; spinSound.pause();
                    winSound.currentTime = 0; winSound.play().catch(()=>null);
                    const final = (angle % (Math.PI * 2));
                    const idx = sectors.length - 1 - Math.floor(final / ((Math.PI * 2) / sectors.length)) % sectors.length;
                    finishSpin(idx);
                } else { requestAnimationFrame(anim); }
            };
            anim();
        }

        function finishSpin(idx) {
            const p = sectors[idx].n;
            if (p === "ДЖЕКПОТ") {
                coins += 100000; tg.showAlert("🔥🔥🔥 ДЖЕКПОТ! +100k!");
            } else if (p.includes("Кеш")) {
                let win = Math.max(500, Math.floor(coins * 0.05));
                coins += win; tg.showAlert(`Выпало: +5% Кеш (${win.toLocaleString()})`);
            } else if (p === "Множитель x2") {
                activateBoost(2, 600); tg.showAlert("Множитель x2 на 10 минут!");
            } else if (p === "∞ Энергия") {
                activateInfE(600); tg.showAlert("∞ Энергия на 10 минут!");
            }
            updateUI(); saveAll();
        }

        function activateBoost(m, t) { boost = m; setTimeout(() => { boost = 1; updateUI(); }, t * 1000); }
        function activateInfE(t) { infE = true; updateUI(); setTimeout(() => { infE = false; updateUI(); }, t * 1000); }

        function show(scr) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(scr+'-scr').classList.add('active');
            document.getElementById('n-'+scr).classList.add('active');
            if(scr === 'top') loadTop();
        }

        function loadTop() {
            db.ref('users').orderByChild('coins').limitToLast(15).once('value', s => {
                let html = ''; let players = [];
                s.forEach(u => { const v = u.val(); v.id = u.key; players.push(v); });
                players.reverse().forEach((p, i) => {
                    html += `<div class="leader-item"><div class="leader-row"><b>${i+1}. ${p.username || 'Аноним'}</b> <span>${p.coins.toLocaleString()} 💰</span></div></div>`;
                });
                document.getElementById('leaderboard').innerHTML = html;
            });
        }

        function updateUI() {
            document.getElementById('coins').innerText = coins.toLocaleString();
            document.getElementById('spins-top').innerText = spins;
            document.getElementById('s-btn-val').innerText = spins;
            document.getElementById('e-text').innerText = energy;
            document.getElementById('energy-fill').style.width = (energy/10)+'%';
            document.getElementById('energy-fill').style.background = infE ? "#3b82f6" : "linear-gradient(90deg, #facc15, #fbbf24)";
            document.getElementById('click-val').innerText = boost;
        }

        function saveLocal() {
            localStorage.setItem('c', coins); localStorage.setItem('e', energy);
            localStorage.setItem('s', spins); localStorage.setItem('lc', lastClaim);
        }

        function saveAll() {
            saveLocal();
            if(tg.initDataUnsafe?.user?.id) {
                db.ref('users/' + tg.initDataUnsafe.user.id).update({
                    coins: coins, username: tg.initDataUnsafe.user.first_name, 
                    spins: spins, lastClaim: lastClaim
                });
            }
        }

        setInterval(() => { if(energy < 1000 && !infE) { energy++; updateUI(); } }, 2000);
        syncWithDB(); drawWheel(); updateUI();
    </script>
</body>
</html>
