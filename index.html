<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЛУПИДРУПИКОИН: BIG COIN EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --primary: #facc15; 
            --bg: #090d16; 
            --card: rgba(17, 24, 39, 0.75); 
            --boost: #ef4444; 
            --energy: #3b82f6; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        
        body { 
            background: 
                radial-gradient(circle at 50% 20%, rgba(59, 130, 246, 0.18) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(250, 204, 21, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 10% 60%, rgba(239, 68, 68, 0.08) 0%, transparent 40%),
                var(--bg);
            color: white; 
            height: 100vh; 
            overflow: hidden; 
        }

        .screen { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            height: calc(100vh - 80px); 
            padding: 20px; 
            overflow-y: auto; 
            backdrop-filter: blur(10px);
        }
        .active { display: flex; }

        #coins { font-size: 46px; font-weight: bold; color: var(--primary); text-shadow: 0 0 25px rgba(250, 204, 21, 0.5); margin-top: 15px; }
        .stats { font-size: 14px; color: #94a3b8; display: flex; gap: 15px; margin: 8px 0; justify-content: center; font-weight: 500; }

        /* Огромный красивый коин */
        .coin-btn {
            width: 280px; height: 280px; border-radius: 50%; border: 6px solid rgba(255, 255, 255, 0.08);
            background: url('coin.png') center/cover; margin: 25px 0;
            box-shadow: 0 0 60px rgba(250, 204, 21, 0.25), inset 0 0 20px rgba(0,0,0,0.6); 
            transition: transform 0.05s; touch-action: manipulation;
        }
        .coin-btn:active { transform: scale(0.94); }

        .energy-bar { width: 100%; height: 14px; background: rgba(30, 41, 59, 0.8); border-radius: 10px; overflow: hidden; margin-top: 8px; border: 1px solid rgba(255,255,255,0.05); }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #facc15, #3b82f6); transition: 0.3s; }

        .shop-item { 
            background: var(--card); 
            width: 100%; 
            padding: 14px; 
            border-radius: 16px; 
            margin-bottom: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .shop-info h4 { font-size: 16px; font-weight: 600; }
        .shop-info p { font-size: 12px; color: #94a3b8; margin-top: 2px; }
        .buy-btn { background: #22c55e; color: white; border: none; padding: 10px 16px; border-radius: 12px; font-weight: bold; font-size: 13px; box-shadow: 0 4px 10px rgba(34, 197, 94, 0.3); }
        .buy-btn:disabled { background: #334155; opacity: 0.4; cursor: not-allowed; box-shadow: none; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: rgba(15, 23, 42, 0.85); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); z-index: 1000; }
        .nav-item { text-align: center; font-size: 11px; opacity: 0.4; color: white; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 5px 10px; border-radius: 12px; }
        .nav-item.active { opacity: 1; color: var(--primary); transform: translateY(-10px) scale(1.1); text-shadow: 0 0 15px rgba(250, 204, 21, 0.6); }

        .btn { background: var(--primary); color: #000; border: none; padding: 14px; border-radius: 14px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(250, 204, 21, 0.3); }
        .btn:disabled { background: #334155; color: #94a3b8; cursor: not-allowed; box-shadow: none; }
        
        .plus-one { position: absolute; color: var(--primary); font-size: 26px; font-weight: bold; pointer-events: none; animation: floatUp 0.8s forwards; text-shadow: 0 2px 10px rgba(250,204,21,0.5); z-index: 1000; }
        @keyframes floatUp { to { transform: translateY(-120px); opacity: 0; } }
        
        .admin-panel { display: none; background: rgba(30, 41, 59, 0.9); padding: 15px; border-radius: 15px; width: 100%; border: 2px solid #ef4444; margin-bottom: 20px;}
        .admin-input { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 8px; outline: none; }
    </style>
</head>
<body>

    <div id="game-scr" class="screen active">
        <div id="coins">0</div>
        <div class="stats">
            <span>👆 <span id="click-val">1</span>/клик</span>
            <span>💤 <span id="ps-val">0</span>/5с</span>
        </div>
        <button class="coin-btn" id="coin-tap"></button>
        <div style="width: 100%; max-width: 300px; margin-top: 10px;">
            <div style="display: flex; justify-content: space-between; font-size: 13px; font-weight: 500; margin-bottom: 4px;">
                <span style="color: #94a3b8;">⚡ Энергия</span>
                <span><span id="e-text">100</span> / <span id="max-e-text">100</span></span>
            </div>
            <div class="energy-bar"><div id="energy-fill"></div></div>
        </div>
    </div>

    <div id="shop-scr" class="screen">
        <h2 style="margin-bottom: 20px; text-shadow: 0 0 15px rgba(255,255,255,0.2);">МАГАЗИН 🛒</h2>
        <div id="shop-list" style="width: 100%;"></div>
    </div>

    <div id="bonus-scr" class="screen">
        <button class="btn" id="daily-btn" onclick="claimDaily()" style="margin-bottom: 25px;">ЗАБРАТЬ БОНУС</button>
        <p style="color: #94a3b8; margin-bottom: 15px; font-weight: 500;">Колесо удачи:</p>
        <canvas id="wheel-canvas" width="280" height="280"></canvas>
        <button class="btn" id="spin-btn" onclick="startSpin()" style="margin-top: 20px;">КРУТИТЬ</button>
    </div>

    <div id="top-scr" class="screen">
        <h2 style="margin-bottom: 20px; text-shadow: 0 0 15px rgba(255,255,255,0.2);">ЛИДЕРЫ 🏆</h2>
        <div id="admin-box" class="admin-panel">
            <h4 style="color:#ef4444; margin-bottom:10px">🛡 АДМИН-МЕНЮ</h4>
            <input type="text" id="target-id" class="admin-input" placeholder="ID игрока">
            <input type="number" id="add-coins" class="admin-input" placeholder="Добавить монет">
            <input type="number" id="add-spins" class="admin-input" placeholder="Добавить спинов">
            <button class="btn" style="background:#22c55e; color:white; margin-bottom:10px;" onclick="adminGive()">ВЫДАТЬ РЕСУРСЫ</button>
            <button class="btn" style="background:#ef4444; color:white;" onclick="adminWipe()">🛑 СБРОС ИГРОКА (ПОЛНЫЙ СБРОС)</button>
        </div>
        <div id="leaderboard" style="width:100%">Загрузка...</div>
    </div>

    <div class="nav">
        <div class="nav-item active" id="n-game" onclick="show('game')">💰<br>Игра</div>
        <div class="nav-item" id="n-shop" onclick="show('shop')">🛒<br>Магазин</div>
        <div class="nav-item" id="n-bonus" onclick="show('bonus')">🎁<br>Бонусы</div>
        <div class="nav-item" id="n-top" onclick="show('top')">🏆<br>Топ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const ADMIN_ID = 5932857353;

        // Firebase 
        const firebaseConfig = {
            apiKey: "AIzaSyDSWXC6HPW0QJu73BWDD4rzHdzb6rP7yg",
            authDomain: "lupidrupikoin.firebaseapp.com",
            databaseURL: "https://lupidrupikoin-default-rtdb.firebaseio.com",
            projectId: "lupidrupikoin",
            appId: "1:71547438259:web:807e88ddf21799511e7aa6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Переменные состояния
        let coins = parseFloat(localStorage.getItem('c')) || 0;
        let energy = parseInt(localStorage.getItem('e')) || 100;
        let spins = parseInt(localStorage.getItem('s')) || 0;
        let lvlC = parseInt(localStorage.getItem('l_c')) || 1;
        let lvlE = parseInt(localStorage.getItem('l_e')) || 1;
        let lvlP = parseInt(localStorage.getItem('l_p')) || 1;
        let lastClaim = parseInt(localStorage.getItem('lc')) || 0;
        let lastTime = parseInt(localStorage.getItem('lt')) || Date.now();

        let spinning = false, currentAngle = 0;

        // ИДЕАЛЬНЫЙ МАТЕМАТИЧЕСКИЙ БАЛАНС
        const getClickPower = (l) => Math.floor(Math.pow(1.15, l - 1));
        const getClickCost = (l) => Math.floor(150 * Math.pow(1.1784, l - 1));

        const getPassPower = (l) => Math.floor(Math.pow(1.15, l - 1));
        const getPassCost = (l) => Math.floor(500 * Math.pow(1.158, l)); 

        const getEnergyMax = (l) => 100 + (l - 1) * 100;
        const getEnergyCost = (l) => {
            // Исправлено: Массив цен теперь соответствует уровням со 2-го по 5-й правильно
            const costs = [0, 25000, 250000, 1250000, 5000000];
            return costs[l] || 5000000;
        };

        const sectors = [
            { n: "+10% Кеш", c: "#1e293b" }, { n: "+20% Кеш", c: "#334155" }, 
            { n: "X2 Клик",  c: "#ef4444" }, { n: "Безлимит", c: "#3b82f6" },  
            { n: "+10% Кеш", c: "#1e293b" }, { n: "+20% Кеш", c: "#334155" }, 
            { n: "X2 Клик",  c: "#ef4444" }, { n: "Безлимит", c: "#3b82f6" },  
            { n: "ДЖЕКПОТ 50%", c: "#facc15" } 
        ];

        function initOffline() {
            const now = Date.now();
            const secondsPassed = Math.floor((now - lastTime) / 1000);
            if (secondsPassed >= 5) {
                const periods = Math.floor(secondsPassed / 5);
                const earned = periods * getPassPower(lvlP);
                coins += earned;
                if(earned > 0) {
                    tg.showAlert(`Пока тебя не было, пассивный доход принес: +${earned.toLocaleString()} 💰`);
                }
            }
            lastTime = now;
            saveAll();
        }

        function updateUI() {
            document.getElementById('coins').innerText = Math.floor(coins).toLocaleString();
            document.getElementById('click-val').innerText = getClickPower(lvlC).toLocaleString();
            document.getElementById('ps-val').innerText = getPassPower(lvlP).toLocaleString();
            document.getElementById('e-text').innerText = energy;
            const maxE = getEnergyMax(lvlE);
            document.getElementById('max-e-text').innerText = maxE;
            document.getElementById('energy-fill').style.width = (energy / maxE * 100) + '%';

            const dailyBtn = document.getElementById('daily-btn');
            const now = Date.now();
            const wait = 86400000 - (now - lastClaim);
            if(wait > 0) {
                dailyBtn.disabled = true;
                let s = Math.floor(wait / 1000);
                let h = Math.floor(s / 3600);
                let m = Math.floor((s % 3600) / 60);
                let sec = s % 60;
                dailyBtn.innerText = `До бонуса: ${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
            } else {
                dailyBtn.disabled = false;
                dailyBtn.innerText = "ЗАБРАТЬ ЕЖЕДНЕВНЫЙ БОНУС";
            }

            if(document.getElementById('shop-scr').classList.contains('active')) renderShop();
        }

        function renderShop() {
            const list = document.getElementById('shop-list');
            const items = [
                { id: 'c', name: 'Сила клика', l: lvlC, max: 100, cost: getClickCost(lvlC), next: getClickPower(lvlC+1) },
                { id: 'e', name: 'Лимит энергии', l: lvlE, max: 5, cost: getEnergyCost(lvlE), next: getEnergyMax(lvlE+1) },
                { id: 'p', name: 'Пассив (5 сек)', l: lvlP, max: 100, cost: getPassCost(lvlP), next: getPassPower(lvlP+1) }
            ];
            list.innerHTML = items.map(i => `
                <div class="shop-item">
                    <div class="shop-info">
                        <h4>${i.name} [${i.l}/${i.max}]</h4>
                        <p>${i.l >= i.max ? 'МАКСИМУМ' : 'След: ' + i.next.toLocaleString()}</p>
                    </div>
                    <button class="buy-btn" ${i.l >= i.max || coins < i.cost ? 'disabled' : ''} onclick="buy('${i.id}')">
                        ${i.l >= i.max ? 'MAX' : i.cost.toLocaleString() + ' 💰'}
                    </button>
                </div>
            `).join('');
        }

        function buy(id) {
            if(id === 'c' && lvlC < 100 && coins >= getClickCost(lvlC)) { coins -= getClickCost(lvlC); lvlC++; }
            if(id === 'e' && lvlE < 5 && coins >= getEnergyCost(lvlE)) { coins -= getEnergyCost(lvlE); lvlE++; energy = getEnergyMax(lvlE); }
            if(id === 'p' && lvlP < 100 && coins >= getPassCost(lvlP)) { coins -= getPassCost(lvlP); lvlP++; }
            saveAll(); updateUI();
        }

        function handleTap(e) {
            if (energy <= 0) return;
            const p = getClickPower(lvlC);
            coins += p; energy--;
            
            const x = e.touches ? e.touches[0].pageX : e.clientX;
            const y = e.touches ? e.touches[0].pageY : e.clientY;
            const div = document.createElement('div');
            div.className = 'plus-one'; div.innerText = `+${p}`;
            div.style.left = x + 'px'; div.style.top = y + 'px';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 700);

            updateUI(); saveAll();
            tg.HapticFeedback.impactOccurred('light');
        }

        document.getElementById('coin-tap').addEventListener('touchstart', handleTap);

        function drawWheel(angle = 0) {
            const canvas = document.getElementById('wheel-canvas'); if(!canvas) return;
            const ctx = canvas.getContext('2d'); const arc = (Math.PI * 2) / sectors.length;
            ctx.clearRect(0, 0, 280, 280);
            sectors.forEach((s, i) => {
                const sectorAngle = angle + i * arc - Math.PI / 2;
                ctx.beginPath(); ctx.fillStyle = s.c; ctx.moveTo(140, 140);
                ctx.arc(140, 140, 135, sectorAngle, sectorAngle + arc); ctx.fill();
                ctx.save(); ctx.translate(140, 140); ctx.rotate(sectorAngle + arc / 2);
                ctx.textAlign = "right"; ctx.fillStyle = s.c === "#facc15" ? "black" : "white";
                ctx.font = "bold 11px Arial"; ctx.fillText(s.n, 125, 4); ctx.restore();
            });
        }

        function startSpin() {
            if (spins <= 0 || spinning) return tg.showAlert("Нет спинов!");
            spinning = true; spins--; updateUI();
            let targetIdx = Math.floor(Math.random() * sectors.length);
            const sectorDeg = 360 / sectors.length;
            const finalAngle = 360 - (targetIdx * sectorDeg) - (sectorDeg / 2);
            const totalRotation = (360 * 8) + finalAngle; 
            let start = null;
            function animate(now) {
                if (!start) start = now;
                const progress = Math.min((now - start) / 4000, 1);
                const ease = 1 - Math.pow(1 - progress, 4);
                drawWheel(((ease * totalRotation) * Math.PI) / 180);
                if (progress < 1) requestAnimationFrame(animate);
                else { spinning = false; currentAngle = (finalAngle * Math.PI) / 180; finishSpin(targetIdx); }
            }
            requestAnimationFrame(animate);
        }

        function finishSpin(idx) {
            const prize = sectors[idx].n;
            if (prize.includes("10%")) coins += Math.max(100, Math.floor(coins * 0.1));
            else if (prize.includes("20%")) coins += Math.max(200, Math.floor(coins * 0.2));
            else if (prize.includes("50%")) coins += Math.max(2000, Math.floor(coins * 0.5));
            tg.showAlert(`🎰 Выпало: ${prize}`);
            saveAll(); updateUI();
        }

        function claimDaily() {
            const now = Date.now();
            if (now - lastClaim < 86400000) return;
            coins += 5000; spins += 1; lastClaim = now;
            updateUI(); saveAll();
            tg.showAlert("Получено 5,000 монет и 1 Спин!");
        }

        function adminGive() {
            const tid = String(document.getElementById('target-id').value.trim());
            const aC = parseInt(document.getElementById('add-coins').value) || 0;
            const aS = parseInt(document.getElementById('add-spins').value) || 0;
            if(!tid) return tg.showAlert("ID игрока?");
            db.ref('users/' + tid).once('value').then(snap => {
                if(snap.exists()){
                    let d = snap.val();
                    let nC = (Number(d.coins) || 0) + aC;
                    let nS = (Number(d.spins) || 0) + aS;
                    db.ref('users/' + tid).update({ coins: nC, spins: nS }).then(() => {
                        tg.showAlert("Успешно добавлено!");
                        if(tid === String(tg.initDataUnsafe?.user?.id)) { coins=nC; spins=nS; updateUI(); }
                    });
                } else tg.showAlert("ID не найден");
            });
        }

        function adminWipe() {
            const tid = String(document.getElementById('target-id').value.trim());
            if(!tid) return tg.showAlert("Введите ID!");
            if(confirm(`Сбросить игрока ${tid}?`)) {
                db.ref('users/' + tid).update({ coins: 0, lvlC: 1, lvlE: 1, lvlP: 1 }).then(() => {
                    tg.showAlert(`Игрок ${tid} сброшен!`);
                    if(tid === String(tg.initDataUnsafe?.user?.id)) {
                        coins = 0; lvlC = 1; lvlE = 1; lvlP = 1; energy = 100;
                        localStorage.clear(); updateUI();
                    }
                });
            }
        }

        function show(s) {
            document.querySelectorAll('.screen').forEach(scr => scr.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(s + '-scr').classList.add('active');
            document.getElementById('n-' + s).classList.add('active');
            if (s === 'bonus') drawWheel(currentAngle);
            if (s === 'top') {
                loadTop();
                if(String(tg.initDataUnsafe?.user?.id) === String(ADMIN_ID)) {
                    document.getElementById('admin-box').style.display = 'block';
                }
            }
            updateUI();
        }

        function saveAll() {
            localStorage.setItem('c', coins);
            localStorage.setItem('e', energy);
            localStorage.setItem('l_c', lvlC);
            localStorage.setItem('l_e', lvlE);
            localStorage.setItem('l_p', lvlP);
            localStorage.setItem('lc', lastClaim);
            localStorage.setItem('lt', Date.now());
            const uid = tg.initDataUnsafe?.user?.id;
            if (uid) {
                db.ref('users/' + uid).update({
                    coins, lvlC, username: tg.initDataUnsafe.user.first_name || "Игрок"
                });
            }
        }

        function loadTop() {
            db.ref('users').orderByChild('coins').limitToLast(15).once('value', s => {
                let html = ''; let arr = [];
                s.forEach(u => { const d = u.val(); d.id = u.key; arr.push(d); });
                arr.reverse().forEach((p, i) => {
                    html += `<div class="shop-item"><div><b>${i+1}. ${p.username}</b><br><small>ID: ${p.id}</small></div> <span>${Math.floor(p.coins).toLocaleString()} 💰</span></div>`;
                });
                document.getElementById('leaderboard').innerHTML = html;
            });
        }

        setInterval(() => {
            const maxE = getEnergyMax(lvlE);
            if (energy < maxE) energy++;
            coins += (getPassPower(lvlP) / 5); 
            updateUI();
            saveAll();
        }, 1000);

        initOffline();
        updateUI();
    </script>
</body>
</html>
