<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUPIDRUPI: ADMIN & TOP FIX</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #facc15; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        .screen { display: none; flex-direction: column; align-items: center; height: calc(100vh - 80px); padding: 20px; overflow-y: auto; }
        .active { display: flex; }

        #coins { font-size: 42px; font-weight: bold; color: var(--primary); text-shadow: 0 0 20px rgba(250, 204, 21, 0.4); }
        .stats { font-size: 13px; color: #94a3b8; display: flex; gap: 10px; margin-bottom: 10px; }

        .coin-btn {
            width: 200px; height: 200px; border-radius: 50%; border: 8px solid #1e293b;
            background: url('coin.png') center/cover; margin: 15px 0; touch-action: manipulation;
        }

        .energy-box { width: 100%; max-width: 300px; }
        .energy-bar { width: 100%; height: 12px; background: #1e293b; border-radius: 10px; overflow: hidden; }
        #energy-fill { width: 100%; height: 100%; background: var(--primary); transition: 0.3s; }

        .item-card { background: var(--card); width: 100%; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: var(--primary); color: #000; border: none; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        .buy-btn { background: var(--primary); color: #000; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: #1e293b; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { text-align: center; font-size: 10px; opacity: 0.5; color: white; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--primary); }
        #admin-nav { display: none; } /* Скрыт по умолчанию */

        .leader-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; margin-bottom: 5px; width: 100%; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <!-- Экраны -->
    <div id="game-scr" class="screen active">
        <div id="coins">0</div>
        <div class="stats"><span>➕ <span id="click-val">1</span></span><span>⏳ <span id="passive-val">0</span></span></div>
        <button class="coin-btn" id="coin-tap"></button>
        <div class="energy-box">
            <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px;">
                <span>Энергия</span><span id="e-info">100/100</span>
            </div>
            <div class="energy-bar"><div id="energy-fill"></div></div>
        </div>
    </div>

    <div id="shop-scr" class="screen">
        <h2>МАГАЗИН 🛒</h2><br>
        <div class="item-card"><div><h4>Клик</h4><p>Lvl <span id="l-c-txt">1</span></p></div><button class="buy-btn" onclick="buy('click')"><span id="p-c-txt">1000</span> 💰</button></div>
        <div class="item-card"><div><h4>Запас энергии</h4><p>Lvl <span id="l-e-txt">1</span></p></div><button class="buy-btn" onclick="buy('energy')"><span id="p-e-txt">2000</span> 💰</button></div>
        <div class="item-card"><div><h4>Пассивный доход</h4><p>Lvl <span id="l-p-txt">0</span></p></div><button class="buy-btn" onclick="buy('passive')"><span id="p-p-txt">5000</span> 💰</button></div>
    </div>

    <div id="bonus-scr" class="screen">
        <button class="btn" onclick="claimDaily()">ЕЖЕДНЕВНЫЙ БОНУС</button>
        <div style="margin: 20px 0;">
            <canvas id="wheel-canvas" width="260" height="260"></canvas>
        </div>
        <button class="btn" id="spin-btn" onclick="startSpin()">КРУТИТЬ (<span id="s-val">0</span>)</button>
    </div>

    <div id="top-scr" class="screen">
        <h2>ТОП 10 🏆</h2><br>
        <div id="leaderboard" style="width: 100%;"></div>
    </div>

    <div id="admin-scr" class="screen">
        <h2>АДМИН ПАНЕЛЬ 🛠</h2><br>
        <button class="btn" onclick="addRes('c', 1000000)" style="margin-bottom:10px">+1M Монет</button>
        <button class="btn" onclick="addRes('s', 10)" style="margin-bottom:10px">+10 Спинов</button>
        <button class="btn" onclick="localStorage.clear(); location.reload();" style="background: #ef4444; color: white;">СБРОС ДАННЫХ</button>
    </div>

    <!-- Меню -->
    <div class="nav">
        <div class="nav-item active" onclick="show('game')">💰<br>Игра</div>
        <div class="nav-item" onclick="show('shop')">🛒<br>Магазин</div>
        <div class="nav-item" onclick="show('bonus')">🎁<br>Бонусы</div>
        <div class="nav-item" onclick="show('top')">🏆<br>Топ</div>
        <div class="nav-item" id="admin-nav" onclick="show('admin')">🛠<br>Админ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const ADMIN_ID = 123456789; // ТВОЙ ТЕЛЕГРАМ ID СЮДА
        
        // Звуки
        const spinSound = new Audio('spin.mp3');
        const winSound = new Audio('win.mp3');

        let coins = parseInt(localStorage.getItem('c')) || 0;
        let energy = parseInt(localStorage.getItem('e')) || 1000;
        let spins = parseInt(localStorage.getItem('s')) || 0;
        let lvlC = parseInt(localStorage.getItem('l_c')) || 1;
        let lvlE = parseInt(localStorage.getItem('l_e')) || 1;
        let lvlP = parseInt(localStorage.getItem('l_p')) || 0;
        
        // Проверка админа
        if(tg.initDataUnsafe?.user?.id === ADMIN_ID) {
            document.getElementById('admin-nav').style.display = 'block';
        }

        function updateUI() {
            const maxE = 1000 + (lvlE - 1) * 500;
            document.getElementById('coins').innerText = Math.floor(coins).toLocaleString();
            document.getElementById('click-val').innerText = lvlC;
            document.getElementById('passive-val').innerText = lvlP * 10;
            document.getElementById('e-info').innerText = `${energy}/${maxE}`;
            document.getElementById('energy-fill').style.width = (energy/maxE*100) + '%';
            document.getElementById('s-val').innerText = spins;
            
            document.getElementById('l-c-txt').innerText = lvlC;
            document.getElementById('l-e-txt').innerText = lvlE;
            document.getElementById('l-p-txt').innerText = lvlP;
            document.getElementById('p-c-txt').innerText = (lvlC * 1000).toLocaleString();
            document.getElementById('p-e-txt').innerText = (lvlE * 2000).toLocaleString();
            document.getElementById('p-p-txt').innerText = ((lvlP+1) * 5000).toLocaleString();
        }

        function buy(type) {
            if(type === 'click' && coins >= lvlC * 1000) { coins -= lvlC * 1000; lvlC++; }
            if(type === 'energy' && coins >= lvlE * 2000) { coins -= lvlE * 2000; lvlE++; energy += 500; }
            if(type === 'passive' && coins >= (lvlP+1) * 5000) { coins -= (lvlP+1) * 5000; lvlP++; }
            save(); updateUI();
        }

        function addRes(type, val) {
            if(type === 'c') coins += val;
            if(type === 's') spins += val;
            save(); updateUI();
        }

        function startSpin() {
            if(spins <= 0) return;
            spins--; spinSound.currentTime = 0; spinSound.play();
            // ... анимация колеса ...
            setTimeout(() => { spinSound.pause(); winSound.play(); }, 3000);
            save(); updateUI();
        }

        function show(scr) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(scr+'-scr').classList.add('active');
            if(scr === 'top') loadTop();
        }

        function loadTop() {
            // Заглушка, если Firebase не подключен
            document.getElementById('leaderboard').innerHTML = '<div class="leader-item"><span>Ты</span><b>'+coins+'</b></div>';
        }

        function save() {
            localStorage.setItem('c', coins); localStorage.setItem('e', energy);
            localStorage.setItem('s', spins); localStorage.setItem('l_c', lvlC);
            localStorage.setItem('l_e', lvlE); localStorage.setItem('l_p', lvlP);
        }

        document.getElementById('coin-tap').onclick = () => {
            if(energy > 0) { coins += lvlC; energy--; updateUI(); save(); }
        };

        setInterval(() => { if(lvlP > 0) { coins += (lvlP * 10); updateUI(); } }, 3000);
        setInterval(() => { 
            const maxE = 1000 + (lvlE - 1) * 500;
            if(energy < maxE) { energy++; updateUI(); }
        }, 1500);

        updateUI();
    </script>
</body>
</html>
