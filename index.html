<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЛУПИДРУПИКОИН</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0f172a;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .energy-container {
            font-size: 20px;
            color: #94a3b8;
            margin-bottom: 40px;
        }

        #energy {
            color: #facc15;
            font-weight: bold;
        }

        /* КНОПКА-МОНЕТА */
        .coin-btn {
            width: 280px;
            height: 280px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background-color: transparent;
            
            /* Ссылка на твой файл, который ты переименовал */
            background-image: url('coin.png'); 
            
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            transition: transform 0.05s;
            touch-action: manipulation;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .coin-btn:active {
            transform: scale(0.92);
        }

        .title-footer {
            margin-top: 30px;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(to bottom, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .regen-text {
            margin-top: 10px;
            color: #22c55e;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>💰 <span id="coins">0</span></h1>

        <div class="energy-container">
            ⚡ Энергия: <span id="energy">100</span>/100
        </div>

        <button class="coin-btn" id="coin"></button>

        <div class="title-footer">ЛУПИДРУПИКОИН</div>
        <div class="regen-text">энергия восстанавливается автоматически</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let coins = Number(localStorage.getItem("coins")) || 0;
        let energy = Number(localStorage.getItem("energy")) || 100;

        const coinsDisplay = document.getElementById("coins");
        const energyDisplay = document.getElementById("energy");
        const btn = document.getElementById("coin");

        function updateUI() {
            coinsDisplay.innerText = coins.toLocaleString();
            energyDisplay.innerText = energy;
            btn.style.opacity = energy <= 0 ? "0.4" : "1";
        }

        btn.addEventListener('pointerdown', (e) => {
            if (energy <= 0) return;

            coins++;
            energy--;

            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }

            updateUI();
            save();
        });

        function save() {
            localStorage.setItem("coins", coins);
            localStorage.setItem("energy", energy);
        }

        setInterval(() => {
            if (energy < 100) {
                energy++;
                updateUI();
                save();
            }
        }, 1500);

        updateUI();
    </script>
</body>
</html>
