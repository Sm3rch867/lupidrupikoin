<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUPI DRUPI COIN</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --primary: #facc15; 
            --bg: #060913; 
            --card: rgba(17, 24, 39, 0.75); 
            --energy: #3b82f6; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        
        body { 
            background: var(--bg);
            color: white; 
            height: 100vh; 
            overflow: hidden; 
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            width: 300px; height: 300px;
            background: #2563eb;
            filter: blur(80px);
            opacity: 0.2;
            top: -50px; left: -50px;
            z-index: -1;
        }

        /* ИСПРАВЛЕННЫЕ ЭКРАНЫ СО СКРОЛЛОМ */
        .screen { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            height: calc(100vh - 75px); /* Высота до панели навигации */
            padding: 20px; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            padding-bottom: 120px; /* Отступ, чтобы нижние кнопки не перекрывались панелью */
        }
        .screen::-webkit-scrollbar { display: none; }
        .active { display: flex; }

        .header { 
            padding: 15px; 
            text-align: center; 
            background: rgba(6, 9, 19, 0.8); 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: relative;
            z-index: 10;
        }
        #coins { font-size: 38px; font-weight: bold; color: var(--primary); text-shadow: 0 0 15px rgba(250, 204, 21, 0.3); }
        
        .energy-box { width: 100%; max-width: 300px; margin: 5px auto 0; }
        .energy-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 4px; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #facc15, #3b82f6); transition: 0.3s; }

        .buffs-container { display: flex; gap: 5px; margin-top: 5px; justify-content: center; min-height: 18px; }
        .buff-badge { font-size: 9px; padding: 2px 7px; border-radius: 10px; font-weight: bold; display: none; color: white; }
        .buff-x2 { background: #10b981; }
        .buff-infe { background: #3b82f6; }

        .coin-btn {
            width: 260px; height: 260px; border-radius: 50%; border: 8px solid rgba(255, 255, 255, 0.05);
            background: url('coin.png') center/cover; margin: 40px 0;
            box-shadow: 0 0 40px rgba(250, 204, 21, 0.1);
            transition: transform 0.05s; touch-action: manipulation;
            flex-shrink: 0;
        }
        .coin-btn:active { transform: scale(0.92); }

        .shop-section-title { width: 100%; text-align: left; font-size: 16px; font-weight: bold; margin: 20px 0 10px; color: var(--primary); }
        
        .upgrade-card {
            background: var(--card); border-radius: 16px; padding: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; width: 100%; flex-shrink: 0;
        }

        .cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; }
        .card-item {
            background: var(--card); border-radius: 20px; padding: 12px;
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .card-img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; object-fit: cover; margin-bottom: 10px; }

        .btn { background: var(--primary); color: #000; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .action-btn { width: 100%; padding: 10px; border-radius: 10px; border: none; font-weight: bold; color: white; margin-bottom: 5px; }
        .buy { background: #22c55e; }
        .collect { background: #3b82f6; }

        .wheel-wrapper { position: relative; width: 280px; height: 280px; margin: 20px 0; flex-shrink: 0; }
        #wheel-canvas { width: 100%; height: 100%; }
        .wheel-arrow { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); font-size: 24px; z-index: 5; color: var(--primary); }

        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(6, 9, 19, 0.95); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); z-index: 100; }
        .nav-item { text-align: center; font-size: 11px; opacity: 0.5; color: #fff; flex: 1; padding-top: 10px; }
        .nav-item.active { opacity: 1; color: var(--primary); }

        .plus-one { position: absolute; color: var(--primary); font-size: 28px; font-weight: bold; pointer-events: none; animation: floatUp 0.7s forwards; z-index: 100; }
        @keyframes floatUp { to { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <div class="header">
        <div id="coins">0</div>
        <div class="energy-box">
            <div style="display: flex; justify-content: space-between; font-size: 11px; color: #94a3b8;">
                <span>⚡ Энергия</span>
                <span><span id="e-text">100</span> / <span id="max-e-text">100</span></span>
            </div>
            <div class="energy-bar"><div id="energy-fill"></div></div>
            <div class="buffs-container">
                <span id="buff-x2-ui" class="buff-badge buff-x2">x2 Клик</span>
                <span id="buff-infe-ui" class="buff-badge buff-infe">∞ Энергия</span>
            </div>
        </div>
    </div>

    <div id="game-scr" class="screen active">
        <div style="font-size: 14px; margin-top: 10px;">Сила клика: <span id="click-val">1</span></div>
        <button class="coin-btn" id="coin-tap"></button>
    </div>

    <div id="shop-scr" class="screen">
        <div class="shop-section-title">ПРОКАЧКА</div>
        <div class="upgrade-card">
            <div>
                <div style="font-weight:bold">Клик</div>
                <div id="click-cost-text" style="font-size:12px; color:#94a3b8">Цена: 500</div>
            </div>
            <button class="btn" id="btn-up-click" onclick="buyUpgrade('click')">Улучшить</button>
        </div>
        <div class="shop-section-title">ИНВЕСТИЦИИ</div>
        <div class="cards-grid" id="cards-container"></div>
    </div>

    <div id="bonus-scr" class="screen">
        <div class="shop-section-title">БОНУС 24Ч</div>
        <button class="btn" id="daily-btn" onclick="claimDaily()" style="width:100%; flex-shrink:0;">ЗАБРАТЬ ПОДАРОК</button>
        <div id="daily-status-text" style="font-size:12px; margin-top:5px; color:#94a3b8; margin-bottom: 20px;"></div>
        
        <div class="shop-section-title">РУЛЕТКА</div>
        <div class="wheel-wrapper">
            <div class="wheel-arrow">▼</div>
            <canvas id="wheel-canvas" width="300" height="300"></canvas>
        </div>
        <button class="btn" id="spin-btn" onclick="startSpin()" style="width:100%; flex-shrink:0;">КРУТИТЬ (Спины: <span id="spins-count">0</span>)</button>
    </div>

    <div id="top-scr" class="screen">
        <div class="shop-section-title">ЛИДЕРЫ 🏆</div>
        <div id="leaderboard" style="width:100%">Загрузка...</div>
    </div>

    <div class="nav">
        <div class="nav-item active" id="n-game" onclick="show('game')">💰<br>Игра</div>
        <div class="nav-item" id="n-shop" onclick="show('shop')">🛒<br>Магазин</div>
        <div class="nav-item" id="n-bonus" onclick="show('bonus')">🎁<br>Бонусы</div>
        <div class="nav-item" id="n-top" onclick="show('top')">🏆<br>Топ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const MY_ADMIN_ID = "5932857353"; // Твой ID

        const firebaseConfig = {
            apiKey: "AIzaSyDSWXC6HPW0QJu73BWDD4rzHdzb6rP7yg",
            authDomain: "lupidrupikoin.firebaseapp.com",
            databaseURL: "https://lupidrupikoin-default-rtdb.firebaseio.com",
            projectId: "lupidrupikoin",
            appId: "1:71547438259:web:807e88ddf21799511e7aa6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const CARDS_DATA = {
            'lupi_67': { name: '67 LUPI', img: '67lupi.png', cost: 670000, income: 67000 },
            'lupi_drupi': { name: 'LUPI DRUPI', img: 'lupidrupi.jpg', cost: 1000000, income: 20000 },
            'delo_lupi': { name: 'DELO LUPI', img: 'delovolupi.png', cost: 5000000, income: 50000 }
        };

        let coins = parseFloat(localStorage.getItem('c_coins')) || 0;
        let energy = parseInt(localStorage.getItem('c_energy')) || 100;
        let spins = parseInt(localStorage.getItem('c_spins')) || 0;
        let lvlC = parseInt(localStorage.getItem('c_lvlC')) || 1;
        let lastClaim = parseInt(localStorage.getItem('c_lastClaim')) || 0;
        let buffX2 = parseInt(localStorage.getItem('c_bX2')) || 0;
        let buffInfE = parseInt(localStorage.getItem('c_bIE')) || 0;
        let userCards = JSON.parse(localStorage.getItem('c_cards')) || {};
        Object.keys(CARDS_DATA).forEach(id => { if(!userCards[id]) userCards[id] = { bought: false, last: 0 }; });

        const sectors = [
            { text: "+10000", weight: 15, act: () => { coins += 10000; } },
            { text: "x2 Клик", weight: 10, act: () => { buffX2 = Date.now() + 600000; } },
            { text: "+10000", weight: 15, act: () => { coins += 10000; } },
            { text: "x2 Клик", weight: 10, act: () => { buffX2 = Date.now() + 600000; } },
            { text: "∞ Энергия", weight: 10, act: () => { buffInfE = Date.now() + 600000; } },
            { text: "+10000", weight: 15, act: () => { coins += 10000; } },
            { text: "∞ Энергия", weight: 10, act: () => { buffInfE = Date.now() + 600000; } },
            { text: "+500000", weight: 8, act: () => { coins += 500000; } },
            { text: "ДЖЕКПОТ", weight: 7, act: () => { coins += 1000000; } }
        ];

        function getClickPower() {
            let base = Math.floor(Math.pow(1.15, lvlC - 1));
            if (base < 1) base = 1;
            return Date.now() < buffX2 ? base * 2 : base;
        }

        function getClickCost() { return Math.floor(500 * Math.pow(1.2, lvlC - 1)); }

        function updateUI() {
            document.getElementById('coins').innerText = Math.floor(coins).toLocaleString();
            document.getElementById('click-val').innerText = getClickPower().toLocaleString();
            document.getElementById('e-text').innerText = energy;
            document.getElementById('energy-fill').style.width = (energy / 100 * 100) + '%';
            document.getElementById('spins-count').innerText = spins;
            document.getElementById('click-cost-text').innerText = `Цена: ${getClickCost().toLocaleString()}`;
            document.getElementById('btn-up-click').disabled = coins < getClickCost();

            const now = Date.now();
            document.getElementById('buff-x2-ui').style.display = now < buffX2 ? 'block' : 'none';
            document.getElementById('buff-infe-ui').style.display = now < buffInfE ? 'block' : 'none';

            const wait = 86400000 - (now - lastClaim);
            if(wait > 0) {
                document.getElementById('daily-btn').disabled = true;
                document.getElementById('daily-status-text').innerText = `Доступно через ${Math.ceil(wait/3600000)}ч`;
            } else {
                document.getElementById('daily-btn').disabled = false;
                document.getElementById('daily-status-text').innerText = `Подарок ждет!`;
            }
            if(document.getElementById('shop-scr').classList.contains('active')) renderCards();
        }

        function renderCards() {
            const cont = document.getElementById('cards-container');
            cont.innerHTML = Object.keys(CARDS_DATA).map(id => {
                const c = CARDS_DATA[id]; const u = userCards[id];
                if(!u.bought) {
                    return `<div class="card-item"><img src="${c.img}" class="card-img"><div style="font-size:12px;font-weight:bold;margin-bottom:5px">${c.name}</div><button class="action-btn buy" onclick="buyCard('${id}')" ${coins < c.cost ? 'disabled' : ''}>${c.cost.toLocaleString()}</button></div>`;
                } else {
                    const farm = Math.floor((Date.now() - u.last) / 5000) * c.income;
                    return `<div class="card-item"><img src="${c.img}" class="card-img"><div style="font-size:12px;font-weight:bold;margin-bottom:5px">${c.name}</div><button class="action-btn collect" onclick="collectCard('${id}')" ${farm <= 0 ? 'disabled' : ''}>Взять ${farm.toLocaleString()}</button></div>`;
                }
            }).join('');
        }

        function buyCard(id) {
            if(coins >= CARDS_DATA[id].cost) {
                coins -= CARDS_DATA[id].cost; userCards[id].bought = true; userCards[id].last = Date.now();
                save(); updateUI();
            }
        }

        function collectCard(id) {
            const farm = Math.floor((Date.now() - userCards[id].last) / 5000) * CARDS_DATA[id].income;
            if(farm > 0) {
                coins += farm; userCards[id].last = Date.now();
                save(); updateUI(); tg.HapticFeedback.impactOccurred('medium');
            }
        }

        function buyUpgrade(t) {
            if(t === 'click' && coins >= getClickCost()) {
                coins -= getClickCost(); lvlC++; save(); updateUI();
            }
        }

        function handleTap(e) {
            if(energy <= 0 && Date.now() > buffInfE) return;
            const p = getClickPower(); coins += p;
            if(Date.now() > buffInfE) energy--;
            const x = e.touches ? e.touches[0].pageX : e.clientX;
            const y = e.touches ? e.touches[0].pageY : e.clientY;
            const d = document.createElement('div');
            d.className = 'plus-one'; d.innerText = `+${p}`;
            d.style.left = x + 'px'; d.style.top = y + 'px';
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 600);
            save(); updateUI(); tg.HapticFeedback.impactOccurred('light');
        }
        document.getElementById('coin-tap').addEventListener('touchstart', handleTap);

        function drawWheel(angle = 0) {
            const canvas = document.getElementById('wheel-canvas'); const ctx = canvas.getContext('2d');
            const arc = (Math.PI * 2) / sectors.length; ctx.clearRect(0, 0, 300, 300);
            sectors.forEach((s, i) => {
                const a = angle + i * arc - Math.PI/2;
                ctx.beginPath(); ctx.fillStyle = i % 2 ? "#1e293b" : "#0f172a";
                ctx.moveTo(150, 150); ctx.arc(150, 150, 140, a, a + arc); ctx.fill();
                ctx.save(); ctx.translate(150, 150); ctx.rotate(a + arc/2);
                ctx.fillStyle = "white"; ctx.font = "bold 10px Arial"; ctx.fillText(s.text, 70, 5); ctx.restore();
            });
        }

        function startSpin() {
            if(spins <= 0) return;
            spins--;
            let total = sectors.reduce((a, b) => a + b.weight, 0);
            let rnd = Math.random() * total; let target = 0;
            for(let i=0; i<sectors.length; i++) { rnd -= sectors[i].weight; if(rnd <= 0) { target = i; break; } }
            const deg = 360 / sectors.length; const final = 360 * 5 + (360 - (target * deg) - deg/2);
            let start = null;
            function anim(now) {
                if(!start) start = now;
                let progress = Math.min((now - start) / 3000, 1);
                let ease = 1 - Math.pow(1 - progress, 3);
                drawWheel(ease * final * Math.PI / 180);
                if(progress < 1) requestAnimationFrame(anim);
                else { sectors[target].act(); save(); updateUI(); tg.showAlert("Выпало: " + sectors[target].text); }
            }
            requestAnimationFrame(anim);
        }

        function claimDaily() {
            coins += 5000; spins += 1; lastClaim = Date.now(); save(); updateUI();
            tg.showAlert("Вы получили 5,000💰 и 1 Спин!");
        }

        function save() {
            localStorage.setItem('c_coins', coins); localStorage.setItem('c_energy', energy);
            localStorage.setItem('c_spins', spins); localStorage.setItem('c_lvlC', lvlC);
            localStorage.setItem('c_lastClaim', lastClaim); localStorage.setItem('c_bX2', buffX2);
            localStorage.setItem('c_bIE', buffInfE); localStorage.setItem('c_cards', JSON.stringify(userCards));
            const uid = tg.initDataUnsafe?.user?.id;
            if(uid) db.ref('users/' + uid).update({ coins, username: tg.initDataUnsafe.user.first_name || "User", id: uid });
        }

        function show(s) {
            document.querySelectorAll('.screen').forEach(scr => scr.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(s + '-scr').classList.add('active');
            document.getElementById('n-' + s).classList.add('active');
            if(s === 'bonus') drawWheel();
            if(s === 'top') loadTop();
            updateUI();
        }

        function loadTop() {
            const currentUserId = String(tg.initDataUnsafe?.user?.id);
            db.ref('users').orderByChild('coins').limitToLast(15).once('value', s => {
                let h = ''; let a = [];
                s.forEach(u => a.push(u.val()));
                a.reverse().forEach((p, i) => {
                    // ID показывается ТОЛЬКО тебе
                    const idInfo = (currentUserId === MY_ADMIN_ID) ? ` <small style="opacity:0.6; font-size:9px;">(ID: ${p.id || '?'})</small>` : '';
                    h += `<div style="background:var(--card); padding:12px; margin-bottom:8px; border-radius:12px; display:flex; justify-content:space-between; align-items:center;">
                        <span><b style="color:var(--primary)">${i+1}.</b> ${p.username}${idInfo}</span> 
                        <b style="font-size:14px;">${Math.floor(p.coins).toLocaleString()} 💰</b>
                    </div>`;
                });
                document.getElementById('leaderboard').innerHTML = h;
            });
        }

        setInterval(() => {
            if(energy < 100 && Date.now() > buffInfE) energy++;
            updateUI();
        }, 2000);

        updateUI();
    </script>
</body>
</html>
