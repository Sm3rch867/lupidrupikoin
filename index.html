<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LupiDrupiKoin</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #facc15; --bg: #0b1120; --card: #1e293b; --text-dim: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        .screen { display: none; flex-direction: column; align-items: center; height: calc(100vh - 80px); padding: 20px; overflow-y: auto; width: 100%; }
        .active { display: flex; }

        /* Фикс навигации: кнопки жестко зафиксированы и не прыгают */
        .nav { 
            position: fixed; bottom: 0; width: 100%; height: 80px; 
            background: #111827; display: flex; align-items: center; 
            border-top: 1px solid #1f2937; z-index: 100;
        }
        .nav-item { 
            flex: 1; text-align: center; font-size: 11px; color: #64748b; 
            cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        .nav-item span { font-size: 20px; margin-bottom: 4px; }

        /* Стили игры */
        #coins { font-size: 48px; font-weight: bold; color: var(--primary); margin-top: 10px; }
        .coin-btn { 
            width: 220px; height: 220px; border-radius: 50%; 
            background: radial-gradient(circle, #fde047, #facc15); 
            border: 8px solid #1e293b; margin: 30px 0; 
            box-shadow: 0 0 30px rgba(250, 204, 21, 0.2);
            touch-action: manipulation; transition: transform 0.05s;
        }
        .coin-btn:active { transform: scale(0.92); }

        .energy-bar-bg { width: 100%; max-width: 300px; height: 14px; background: #1e293b; border-radius: 10px; margin-top: 5px; overflow: hidden; }
        #energy-fill { width: 100%; height: 100%; background: var(--primary); transition: 0.3s; }

        /* Лидерборд */
        .leader-item { 
            background: var(--card); padding: 15px; border-radius: 12px; 
            margin-bottom: 8px; width: 100%; max-width: 400px;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* Магазин */
        .shop-card { background: var(--card); width: 100%; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { background: var(--primary); color: #000; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; }

        /* Колесо */
        #wheel-canvas { width: 280px; height: 280px; border-radius: 50%; border: 5px solid #1e293b; margin: 20px 0; }
        
        #admin-nav { display: none; }
    </style>
</head>
<body>

    <div id="game-scr" class="screen active">
        <div id="coins">0</div>
        <div style="color: var(--text-dim); margin-bottom: 10px;">+<span id="click-val">1</span> за тап</div>
        <button class="coin-btn" onclick="tap()"></button>
        <div style="width: 100%; max-width: 300px;">
            <div style="display: flex; justify-content: space-between; font-size: 14px;">
                <span>⚡ Энергия</span><span id="e-info">100/100</span>
            </div>
            <div class="energy-bar-bg"><div id="energy-fill"></div></div>
        </div>
    </div>

    <div id="shop-scr" class="screen">
        <h2 style="margin-bottom: 20px;">МАГАЗИН 🛒</h2>
        <div class="shop-card"><div><h4>Мульти-клик</h4><p>Lvl <span id="l-c">1</span></p></div><button class="buy-btn" onclick="buy('click')"><span id="p-c">1000</span> 💰</button></div>
        <div class="shop-card"><div><h4>Запас энергии</h4><p>Lvl <span id="l-e">1</span></p></div><button class="buy-btn" onclick="buy('energy')"><span id="p-e">2000</span> 💰</button></div>
        <div class="shop-card"><div><h4>Пассивный доход</h4><p>Lvl <span id="l-p">0</span></p></div><button class="buy-btn" onclick="buy('passive')"><span id="p-p">5000</span> 💰</button></div>
    </div>

    <div id="bonus-scr" class="screen">
        <button style="background: var(--primary); width:100%; padding:15px; border-radius:12px; border:none; font-weight:bold;" onclick="claimDaily()">ЕЖЕДНЕВНЫЙ БОНУС</button>
        <canvas id="wheel-canvas" width="500" height="500"></canvas>
        <button class="buy-btn" style="width: 200px;" onclick="spin()">КРУТИТЬ (<span id="s-val">0</span>)</button>
    </div>

    <div id="top-scr" class="screen">
        <h2 style="margin-bottom: 20px;">ТОП 10 ИГРОКОВ 🏆</h2>
        <div id="leaderboard" style="width: 100%;"></div>
    </div>

    <div id="admin-scr" class="screen">
        <h2>АДМИНКА 🛠</h2><br>
        <button class="buy-btn" onclick="addMoney(1000000)" style="width:100%; margin-bottom:10px;">+1M Монет</button>
        <button class="buy-btn" onclick="localStorage.clear(); location.reload();" style="width:100%; background:#ef4444; color:white;">СБРОСИТЬ ВСЁ</button>
    </div>

    <div class="nav">
        <div class="nav-item active" id="n-game" onclick="show('game')"><span>💰</span>Игра</div>
        <div class="nav-item" id="n-shop" onclick="show('shop')"><span>🛒</span>Магазин</div>
        <div class="nav-item" id="n-bonus" onclick="show('bonus')"><span>🎁</span>Бонусы</div>
        <div class="nav-item" id="n-top" onclick="show('top')"><span>🏆</span>Топ</div>
        <div class="nav-item" id="admin-nav" onclick="show('admin')"><span>🛠</span>Админ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const ADMIN_ID = 123456789; // ЗАМЕНИ НА СВОЙ ID

        // FIREBASE CONFIG - СЮДА СВОИ ДАННЫЕ
        const firebaseConfig = {
            apiKey: "API_KEY",
            databaseURL: "DATABASE_URL",
            projectId: "PROJECT_ID",
            appId: "APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const user = tg.initDataUnsafe?.user || { id: "test", first_name: "Николаевич" };

        if(user.id == ADMIN_ID) document.getElementById('admin-nav').style.display = 'flex';

        let coins = parseInt(localStorage.getItem('c')) || 0;
        let energy = parseInt(localStorage.getItem('e')) || 100;
        let spins = parseInt(localStorage.getItem('s')) || 0;
        let lvlC = parseInt(localStorage.getItem('l_c')) || 1;
        let lvlE = parseInt(localStorage.getItem('l_e')) || 1;
        let lvlP = parseInt(localStorage.getItem('l_p')) || 0;

        function updateUI() {
            const maxE = 100 + (lvlE - 1) * 500;
            document.getElementById('coins').innerText = Math.floor(coins).toLocaleString();
            document.getElementById('click-val').innerText = lvlC;
            document.getElementById('e-info').innerText = `${energy}/${maxE}`;
            document.getElementById('energy-fill').style.width = (energy/maxE*100) + '%';
            document.getElementById('s-val').innerText = spins;
            document.getElementById('l-c').innerText = lvlC;
            document.getElementById('l-e').innerText = lvlE;
            document.getElementById('l-p').innerText = lvlP;
            document.getElementById('p-c').innerText = (lvlC * 1000).toLocaleString();
            document.getElementById('p-e').innerText = (lvlE * 2000).toLocaleString();
            document.getElementById('p-p').innerText = ((lvlP+1) * 5000).toLocaleString();
        }

        function tap() {
            if (energy > 0) {
                coins += lvlC; energy--; updateUI(); save();
            }
        }

        function buy(type) {
            if(type === 'click' && coins >= lvlC * 1000) { coins -= lvlC * 1000; lvlC++; }
            if(type === 'energy' && coins >= lvlE * 2000) { coins -= lvlE * 2000; lvlE++; energy += 500; }
            if(type === 'passive' && coins >= (lvlP+1) * 5000) { coins -= (lvlP+1) * 5000; lvlP++; }
            save(); updateUI();
        }

        function save() {
            localStorage.setItem('c', coins); localStorage.setItem('e', energy);
            localStorage.setItem('s', spins); localStorage.setItem('l_c', lvlC);
            localStorage.setItem('l_e', lvlE); localStorage.setItem('l_p', lvlP);
            db.ref('players/' + user.id).set({ name: user.first_name, coins: coins });
        }

        function loadRealTop() {
            const list = document.getElementById('leaderboard');
            db.ref('players').orderByChild('coins').limitToLast(10).on('value', (s) => {
                let data = [];
                s.forEach(child => { data.push(child.val()); });
                data.sort((a,b) => b.coins - a.coins);
                list.innerHTML = data.map((p, i) => `
                    <div class="leader-item">
                        <span><b>${i+1}.</b> ${p.name}</span>
                        <span style="color:var(--primary)">${p.coins.toLocaleString()}</span>
                    </div>`).join('');
            });
        }

        function show(scr) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(scr+'-scr').classList.add('active');
            document.getElementById('n-'+scr).classList.add('active');
            if(scr === 'top') loadRealTop();
        }

        // Авто-реген энергии и пассивный доход
        setInterval(() => {
            const maxE = 100 + (lvlE - 1) * 500;
            if(energy < maxE) energy++;
            if(lvlP > 0) coins += (lvlP * 5);
            updateUI();
        }, 2000);

        updateUI();
    </script>
</body>
</html>
