<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lupi Tapper</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-color: #0f0f1b;
            --card-bg: #1e1e2e;
            --accent: #ff007a;
            --text: #ffffff;
            --btn-grad: linear-gradient(45deg, #ff007a, #7a00ff);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            user-select: none;
            overflow: hidden;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        .screen {
            flex: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
            padding-bottom: 80px;
        }

        .screen.active { display: flex; }

        /* Navigation */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(30, 30, 46, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 2px solid var(--accent);
            z-index: 1000;
        }

        nav button {
            background: none;
            border: none;
            color: #888;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        nav button.active {
            color: var(--accent);
            transform: scale(1.1);
        }

        /* Home Screen */
        .balance-container {
            font-size: 32px;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 0 10px var(--accent);
        }

        .lupi-tap-area {
            position: relative;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .lupi-tap-area:active { transform: scale(0.95); }

        .lupi-tap-area img {
            width: 200px;
            filter: drop-shadow(0 0 20px rgba(255,0,122,0.5));
        }

        .stats-row {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 15px;
        }

        /* Cards & Shop */
        .cards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .card-item {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            border: 1px solid #333;
        }

        .card-img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .action-btn {
            background: var(--btn-grad);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        .action-btn:disabled { opacity: 0.5; filter: grayscale(1); }

        .card-counter {
            font-size: 11px;
            margin-top: 5px;
            color: #aaa;
        }

        /* Leaderboard */
        .leader-item {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 10px;
            background: #252538;
            margin-bottom: 5px;
            border-radius: 8px;
        }

        .admin-controls {
            margin-top: 20px;
            padding: 15px;
            border: 1px dashed var(--accent);
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div id="app">
    <!-- Home -->
    <div id="screen-home" class="screen active">
        <div class="balance-container"><span id="user-balance">0</span> 💰</div>
        <div class="lupi-tap-area" onclick="handleTap(event)">
            <img src="lupi.png" alt="Lupi">
        </div>
        <div class="stats-row">
            <div>⚡ <span id="user-energy">0</span>/<span id="max-energy">0</span></div>
            <div>💪 +<span id="tap-power">0</span></div>
        </div>
    </div>

    <!-- Shop -->
    <div id="screen-shop" class="screen">
        <h2>Магазин Лупи</h2>
        <div id="cards-container" class="cards-grid"></div>
        
        <h3 style="margin-top:30px">Улучшения</h3>
        <div class="cards-grid">
            <div class="card-item">
                <h4>Сила клика</h4>
                <p id="click-lvl-info">Lvl 1</p>
                <button class="action-btn" onclick="upgradeClick()" id="btn-up-click">Купить за 500</button>
            </div>
            <div class="card-item">
                <h4>Энергия</h4>
                <p id="energy-lvl-info">Lvl 1</p>
                <button class="action-btn" onclick="upgradeEnergy()" id="btn-up-energy">Купить за 1000</button>
            </div>
        </div>
    </div>

    <!-- Leaderboard -->
    <div id="screen-top" class="screen">
        <h2>Топ Лупиков</h2>
        <div id="leaderboard-list" style="width: 100%;"></div>
        <div id="admin-panel" style="display: none;" class="admin-controls"></div>
    </div>

    <nav>
        <button onclick="showScreen('home')" id="nav-home" class="active">🏠 Домой</button>
        <button onclick="showScreen('shop')" id="nav-shop">🛒 Магазин</button>
        <button onclick="showScreen('top')" id="nav-top">🏆 Топ</button>
    </nav>
</div>

<script>
    // --- КОНФИГУРАЦИЯ ---
    const firebaseConfig = {
        apiKey: "AIzaSy...", // Твой ключ
        authDomain: "lupi-tapper.firebaseapp.com",
        databaseURL: "https://lupi-tapper-default-rtdb.firebaseio.com",
        projectId: "lupi-tapper",
        storageBucket: "lupi-tapper.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    tg.expand();

    const ADMIN_ID = 5932857353; // Твой ID

    // Данные карточек
    const CARDS_DATA = {
        lupi_67: { img: 'lupi67.jpg', cost: 670000, income: 67000 },
        lupi_drupi: { img: 'lupidrupi_2.jpg', cost: 1000000, income: 20000 }, // ИСПРАВЛЕНО ИМЯ ФАЙЛА
        delo_lupi: { img: 'delolupi.jpg', cost: 5000000, income: 50000 }
    };

    // --- СОСТОЯНИЕ ИГРОКА ---
    let user = {
        id: tg.initDataUnsafe?.user?.id || 12345,
        name: tg.initDataUnsafe?.user?.first_name || "Lupi Player",
        coins: 0,
        clickLvl: 1,
        energyLvl: 1,
        energy: 100,
        lastEnergyUpdate: Date.now(),
        userCards: {}, // { id: lastCollectedTime }
        spins: 0
    };

    // --- ЛОГИКА ---

    function init() {
        // Загрузка из Firebase
        db.ref('users/' + user.id).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                user = { ...user, ...data };
            }
            updateStats();
            renderCards();
            if (user.id === ADMIN_ID) renderAdmin();
            
            // Запуск цикла регенерации
            setInterval(regenEnergy, 1000);
            setInterval(updateStats, 1000);
        });
    }

    function save() {
        db.ref('users/' + user.id).set(user);
        localStorage.setItem('lupi_data', JSON.stringify(user));
    }

    function regenEnergy() {
        const maxE = 100 * user.energyLvl;
        if (user.energy < maxE) {
            user.energy++;
            updateStats();
        }
    }

    function handleTap(e) {
        if (user.energy <= 0) return;
        
        const power = Math.floor(Math.pow(1.15, user.clickLvl - 1));
        user.coins += power;
        user.energy--;
        
        tg.HapticFeedback.impactOccurred('light');
        showTapAnim(e, `+${power}`);
        updateStats();
    }

    function showTapAnim(e, text) {
        const el = document.createElement('div');
        el.innerText = text;
        el.style.position = 'absolute';
        el.style.left = `${e.clientX}px`;
        el.style.top = `${e.clientY}px`;
        el.style.color = 'var(--accent)';
        el.style.fontWeight = 'bold';
        el.style.pointerEvents = 'none';
        el.style.animation = 'float 0.8s ease-out forwards';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    function updateStats() {
        document.getElementById('user-balance').innerText = Math.floor(user.coins).toLocaleString();
        document.getElementById('user-energy').innerText = user.energy;
        document.getElementById('max-energy').innerText = 100 * user.energyLvl;
        document.getElementById('tap-power').innerText = Math.floor(Math.pow(1.15, user.clickLvl - 1));

        // Магазин апгрейдов
        const cCost = Math.floor(500 * Math.pow(1.2, user.clickLvl - 1));
        document.getElementById('click-lvl-info').innerText = `Lvl ${user.clickLvl}`;
        document.getElementById('btn-up-click').innerText = `Купить за ${cCost}`;
        document.getElementById('btn-up-click').disabled = user.coins < cCost;

        const eCost = user.energyLvl >= 10 ? 'MAX' : Math.floor(1000 * Math.pow(1.5, user.energyLvl - 1));
        document.getElementById('energy-lvl-info').innerText = `Lvl ${user.energyLvl}`;
        document.getElementById('btn-up-energy').innerText = eCost === 'MAX' ? 'MAX' : `Купить за ${eCost}`;
        document.getElementById('btn-up-energy').disabled = (user.coins < eCost || eCost === 'MAX');

        renderCards(); // Перерисовка карточек для обновления таймеров дохода
    }

    // --- КАРТОЧКИ ---

    function renderCards() {
        const container = document.getElementById('cards-container');
        if (!container) return;
        
        container.innerHTML = Object.keys(CARDS_DATA).map(id => {
            const cfg = CARDS_DATA[id];
            const isOwned = !!user.userCards[id];
            
            if (!isOwned) {
                return `
                    <div class="card-item">
                        <img src="${cfg.img}" class="card-img">
                        <p>Доход: +${cfg.income} / 5с</p>
                        <button class="action-btn" ${user.coins < cfg.cost ? 'disabled' : ''} onclick="buyCard('${id}')">
                            ${cfg.cost.toLocaleString()} 💰
                        </button>
                    </div>
                `;
            } else {
                const last = user.userCards[id];
                const diff = Date.now() - last;
                const currentFarm = Math.floor(diff / 5000) * cfg.income;
                
                return `
                    <div class="card-item">
                        <img src="${cfg.img}" class="card-img">
                        <button class="action-btn" ${currentFarm <= 0 ? 'disabled' : ''} onclick="collectCard('${id}')">
                            Получить
                        </button>
                        <div class="card-counter">${currentFarm.toLocaleString()} 💰</div>
                    </div>
                `; // УДАЛЕНО СЛОВО "СНИЗУ"
            }
        }).join('');
    }

    function buyCard(id) {
        const cfg = CARDS_DATA[id];
        if (user.coins >= cfg.cost) {
            user.coins -= cfg.cost;
            user.userCards[id] = Date.now();
            save();
            updateStats();
            tg.HapticFeedback.notificationOccurred('success');
        }
    }

    function collectCard(id) {
        const cfg = CARDS_DATA[id];
        const last = user.userCards[id];
        const diff = Date.now() - last;
        const cycles = Math.floor(diff / 5000);
        
        if (cycles > 0) {
            const reward = cycles * cfg.income;
            user.coins += reward;
            user.userCards[id] = last + (cycles * 5000);
            save();
            updateStats();
            tg.HapticFeedback.impactOccurred('medium');
        }
    }

    // --- УЛУЧШЕНИЯ ---

    function upgradeClick() {
        const cost = Math.floor(500 * Math.pow(1.2, user.clickLvl - 1));
        if (user.coins >= cost) {
            user.coins -= cost;
            user.clickLvl++;
            save();
            updateStats();
        }
    }

    function upgradeEnergy() {
        const cost = Math.floor(1000 * Math.pow(1.5, user.energyLvl - 1));
        if (user.coins >= cost && user.energyLvl < 10) {
            user.coins -= cost;
            user.energyLvl++;
            save();
            updateStats();
        }
    }

    // --- НАВИГАЦИЯ ---

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        
        document.getElementById('screen-' + screenId).classList.add('active');
        document.getElementById('nav-' + screenId).classList.add('active');

        if (screenId === 'top') loadLeaderboard();
        save();
    }

    function loadLeaderboard() {
        db.ref('users').orderByChild('coins').limitToLast(10).once('value', (snapshot) => {
            const list = [];
            snapshot.forEach(child => { list.push(child.val()); });
            list.reverse();
            
            const html = list.map((u, i) => `
                <div class="leader-item">
                    <span>${i+1}. ${u.name}</span>
                    <span>${Math.floor(u.coins).toLocaleString()} 💰</span>
                </div>
            `).join('');
            document.getElementById('leaderboard-list').innerHTML = html;
        });
    }

    function renderAdmin() {
        const panel = document.getElementById('admin-panel');
        panel.style.display = 'block';
        panel.innerHTML = `
            <h4>Админка</h4>
            <input type="text" id="target-id" placeholder="User ID">
            <button onclick="adminAddCoins()">+1M Монет</button>
            <button onclick="adminReset()">Сбросить игрока</button>
        `;
    }

    function adminAddCoins() {
        const tid = document.getElementById('target-id').value;
        if (!tid) return;
        db.ref('users/' + tid + '/coins').transaction(c => (c || 0) + 1000000);
        alert('Done');
    }

    init();
</script>

<style>
    @keyframes float {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(-50px); opacity: 0; }
    }
</style>

</body>
</html>
