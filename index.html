<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЛУПИДРУПИКОИН SKINS</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #facc15;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        .screen { display: none; flex-direction: column; align-items: center; height: calc(100vh - 90px); width: 100%; padding: 20px; overflow-y: auto; transition: all 0.3s ease; }
        .active { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ИГРА */
        .header { text-align: center; margin: 20px 0; }
        .header h1 { font-size: 50px; text-shadow: 0 0 15px rgba(250, 204, 21, 0.3); }
        .coin-btn { 
            width: 250px; height: 250px; border: none; border-radius: 50%; 
            background: url('coin.png') no-repeat center/cover;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: transform 0.1s; touch-action: manipulation; margin: 20px 0;
        }
        .coin-btn:active { transform: scale(0.95); }

        /* МАГАЗИН И КАРТОЧКИ */
        .section-title { width: 100%; text-align: left; margin: 15px 0 10px; font-size: 14px; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; }
        .card { 
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 20px; width: 100%; padding: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            transition: background 0.3s;
        }
        .card:active { background: rgba(255,255,255,0.05); }
        .item-info b { font-size: 16px; display: block; }
        .item-info span { font-size: 12px; color: #94a3b8; }

        .buy-btn { 
            background: var(--primary); color: #000; border: none; padding: 10px 15px; 
            border-radius: 12px; font-weight: bold; min-width: 80px; transition: 0.2s;
        }
        .buy-btn.bought { background: #22c55e; color: white; }
        .buy-btn:disabled { opacity: 0.5; filter: grayscale(1); }

        /* НАВИГАЦИЯ */
        .navbar { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; }
        .nav-item { opacity: 0.4; transition: 0.3s; text-align: center; font-size: 11px; }
        .active-nav { opacity: 1; color: var(--primary); }

        .plus-one { position: absolute; color: var(--primary); font-size: 30px; font-weight: bold; pointer-events: none; animation: up 0.7s forwards; }
        @keyframes up { to { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="game-screen" class="screen active">
        <div class="header">
            <h1 id="coins">0</h1>
            <p style="color: #94a3b8;">⚡ <span id="energy">100</span> / <span id="max-energy">100</span></p>
        </div>
        <button class="coin-btn" id="coin"></button>
        <p style="font-size: 12px; color: var(--primary)">Доход: +1 монета каждые 5 сек</p>
    </div>

    <div id="shop-screen" class="screen">
        <div class="section-title">Улучшения</div>
        <div class="card">
            <div class="item-info"><b>Мультитап</b><span id="multi-lvl">Lvl 1</span></div>
            <button class="buy-btn" onclick="buy('multi')" id="cost-multi">100</button>
        </div>

        <div class="section-title">Скины (Внешний вид)</div>
        <div class="card">
            <div class="item-info"><b>Золотой Слиток</b><span>Престижный вид</span></div>
            <button class="buy-btn" onclick="buySkin('gold', 5000)" id="skin-gold">5000</button>
        </div>
        <div class="card">
            <div class="item-info"><b>Алмаз</b><span>Для легенд</span></div>
            <button class="buy-btn" onclick="buySkin('diamond', 50000)" id="skin-diamond">50000</button>
        </div>
    </div>

    <div id="top-screen" class="screen">
        <div class="section-title">Рейтинг</div>
        <div id="leaderboard" style="width:100%"></div>
    </div>

    <div class="navbar">
        <div class="nav-item active-nav" id="n-game" onclick="show('game')">💰<br>Игра</div>
        <div class="nav-item" id="n-shop" onclick="show('shop')">🛒<br>Магазин</div>
        <div class="nav-item" id="n-top" onclick="show('top')">🏆<br>Топ</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDSWXC6HPW0QJu73BWDD4rzHdzb6rP7yg",
            authDomain: "lupidrupikoin.firebaseapp.com",
            databaseURL: "https://lupidrupikoin-default-rtdb.firebaseio.com",
            projectId: "lupidrupikoin",
            storageBucket: "lupidrupikoin.firebasestorage.app",
            messagingSenderId: "71547438259",
            appId: "1:71547438259:web:807e88ddf21799511e7aa6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;

        let coins = parseInt(localStorage.getItem("c")) || 0;
        let energy = parseInt(localStorage.getItem("e")) || 100;
        let multi = parseInt(localStorage.getItem("m")) || 1;
        let skin = localStorage.getItem("skin") || 'coin.png';
        let boughtSkins = JSON.parse(localStorage.getItem("bs")) || [];

        function show(s) {
            document.querySelectorAll('.screen').forEach(scr => scr.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            document.getElementById(s + '-screen').classList.add('active');
            document.getElementById('n-' + s).classList.add('active-nav');
            if(s === 'top') loadTop();
        }

        function buy(type) {
            let price = multi * 200;
            if(coins >= price) {
                coins -= price; multi++;
                save(); update();
            }
        }

        function buySkin(name, price) {
            if(boughtSkins.includes(name)) {
                skin = name + '.png'; 
                localStorage.setItem("skin", skin);
                update();
                return;
            }
            if(coins >= price) {
                coins -= price;
                boughtSkins.push(name);
                skin = name + '.png';
                save(); update();
            }
        }

        function save() {
            localStorage.setItem("c", coins); localStorage.setItem("m", multi);
            localStorage.setItem("e", energy); localStorage.setItem("skin", skin);
            localStorage.setItem("bs", JSON.stringify(boughtSkins));
            if(tg.initDataUnsafe?.user?.id) {
                db.ref('users/' + tg.initDataUnsafe.user.id).set({
                    username: tg.initDataUnsafe.user.first_name || "User",
                    coins: coins
                });
            }
        }

        function update() {
            document.getElementById("coins").innerText = coins.toLocaleString();
            document.getElementById("energy").innerText = energy;
            document.getElementById("cost-multi").innerText = multi * 200;
            document.getElementById("multi-lvl").innerText = "Lvl " + multi;
            document.getElementById("coin").style.backgroundImage = `url('${skin}')`;
            
            // Обновление кнопок скинов
            const skins = ['gold', 'diamond'];
            skins.forEach(s => {
                const btn = document.getElementById("skin-" + s);
                if(boughtSkins.includes(s)) {
                    btn.innerText = (skin === s + '.png') ? "Выбрано" : "Выбрать";
                    btn.classList.add('bought');
                }
            });
        }

        document.getElementById("coin").addEventListener('click', (e) => {
            if(energy <= 0) return;
            coins += multi; energy--;
            const p = document.createElement('div');
            p.className = 'plus-one'; p.innerText = '+' + multi;
            p.style.left = e.pageX + 'px'; p.style.top = e.pageY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
            update(); save();
        });

        // ПАССИВНЫЙ ДОХОД
        setInterval(() => {
            coins += 1;
            update();
        }, 5000);

        // РЕГЕН ЭНЕРГИИ
        setInterval(() => { if(energy < 100) { energy++; update(); } }, 2000);

        function loadTop() {
            db.ref('users').orderByChild('coins').limitToLast(10).once('value', s => {
                let html = '';
                let arr = [];
                s.forEach(u => arr.push(u.val()));
                arr.reverse().forEach(u => {
                    html += `<div class="card"><b>${u.username}</b><span>${u.coins.toLocaleString()} 💰</span></div>`;
                });
                document.getElementById("leaderboard").innerHTML = html;
            });
        }

        update();
    </script>
</body>
</html>
