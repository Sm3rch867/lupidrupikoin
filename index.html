<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUPI DRUPI COIN</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --primary: #2563eb;
            --primary-glow: rgba(37, 99, 235, 0.6);
            --bg: linear-gradient(135deg, #020617 0%, #0b1e3d 100%); 
            --card: #0d1626; 
            --text-muted: #566175;
            --ok: #22c55e;
            --warn: #ffb020;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; user-select: none; }
        
        body { background: var(--bg); background-attachment: fixed; color: white; height: 100vh; overflow: hidden; position: relative; }

        /* Стили для HUD (Верхняя и нижняя панели) */
        .header { position: fixed; top: 0; left: 0; right: 0; padding: 15px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(180deg, rgba(2,6,23,0.95) 80%, rgba(2,6,23,0) 100%); z-index: 10; pointer-events: none; }
        .stat-badge { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 8px 14px; border-radius: 99px; display: flex; align-items: center; font-size: 18px; font-weight: 700; backdrop-filter: blur(5px); pointer-events: auto; }
        #coins { font-size: 24px; font-weight: 800; color: white; letter-spacing: -0.5px; }

        .screen { display: none; flex-direction: column; align-items: center; height: 100vh; padding: 85px 20px 95px 20px; overflow-y: auto; }
        .screen.active { display: flex; }

        /* Главный Кликер */
        .coin-btn { width: 220px; height: 220px; border-radius: 50%; border: 6px solid rgba(255,255,255,0.03); margin: auto 0; box-shadow: 0 0 40px var(--primary-glow); overflow: hidden; background: transparent; display: flex; justify-content: center; align-items: center; transition: transform 0.05s; touch-action: manipulation; padding: 0; cursor: pointer; -webkit-tap-highlight-color: transparent; outline: none; }
        .coin-btn:active { transform: scale(0.95); }
        .coin-btn img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        
        .plus-one { position: absolute; color: white; font-size: 28px; font-weight: 900; pointer-events: none; animation: floatUp 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards; text-shadow: 0 0 8px var(--primary); z-index: 1000; }
        @keyframes floatUp { to { transform: translateY(-80px) scale(0.8); opacity: 0; } }

        /* Энергия */
        .energy-box { width: 100%; max-width: 320px; margin-top: auto; }
        .energy-text { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 6px; }
        .energy-bar { width: 100%; height: 10px; background: rgba(255,255,255,0.05); border-radius: 99px; overflow: hidden; border: 1px solid rgba(255,255,255,0.02); }
        .energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #2563eb, #3b82f6); border-radius: 99px; transition: width 0.1s ease; }

        /* Навигация */
        .nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: rgba(2, 6, 23, 0.9); border-top: 1px solid rgba(255, 255, 255, 0.04); display: grid; grid-template-columns: repeat(4, 1fr); align-items: center; z-index: 20; backdrop-filter: blur(10px); }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #475467; cursor: pointer; font-size: 11px; font-weight: bold; height: 100%; position: relative; transition: color 0.2s; }
        .nav-item.active { color: #2563eb; }
        .nav-svg { width: 22px; height: 22px; fill: currentColor; margin-bottom: 4px; }
        .nav-glow { position: absolute; top: -1px; width: 80px; height: 45px; background: radial-gradient(circle, rgba(37, 99, 235, 0.45) 0%, rgba(37, 99, 235, 0) 70%); filter: blur(5px); pointer-events: none; opacity: 0; transition: all 0.3s ease; transform: translateY(-50%); }
        .nav-item.active .nav-glow { opacity: 1; }

        /* Карточки, кнопки и формы мини-игр */
        .shop-card, .game-card { background: var(--card); border: 1px solid rgba(255,255,255,0.03); border-radius: 16px; padding: 16px; width: 100%; text-align: center; margin-bottom: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .shop-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        .shop-card p { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
        
        .btn { width: 100%; padding: 10px; background: #1e293b; border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; color: white; font-weight: 600; cursor: pointer; transition: background 0.2s; outline: none; }
        .btn:active { opacity: 0.8; }
        .btn-primary { background: var(--primary); border: none; }
        .btn-ok { background: var(--ok); border: none; }
        .btn-danger { background: var(--danger); border: none; }
        
        .input-group { display: flex; background: #020617; border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        .input-group span { padding: 10px 12px; font-size: 12px; color: var(--text-muted); font-weight: bold; background: rgba(255,255,255,0.01); border-right: 1px solid rgba(255,255,255,0.05); }
        .input-group input { background: transparent; border: none; padding: 10px; color: white; width: 100%; outline: none; font-weight: bold; }

        /* Инструменты для мини-игр */
        .grid-5x5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin: 15px 0; }
        .cell { aspect-ratio: 1; background: #1e293b; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; transition: background 0.2s, transform 0.1s; }
        .cell:active { transform: scale(0.92); }
        .cell.opened-gem { background: var(--ok) !important; color: white; }
        .cell.opened-mine { background: var(--danger) !important; color: white; }

        .dice-box { background: #020617; border-radius: 12px; padding: 25px; font-size: 48px; font-weight: 800; margin: 15px 0; border: 1px solid rgba(255,255,255,0.03); color: var(--primary); letter-spacing: 2px; text-shadow: 0 0 15px var(--primary-glow); }
        .crypto-chart { height: 100px; background: #020617; border-radius: 10px; margin: 12px 0; display: flex; align-items: flex-end; padding: 10px; gap: 3px; border: 1px solid rgba(255,255,255,0.03); overflow: hidden; }
        .chart-bar { flex: 1; background: #1e293b; min-height: 4px; border-radius: 2px; transition: height 0.3s ease, background 0.3s; }
        
        .plinko-canvas-wrap { background: #020617; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03); overflow: hidden; margin: 12px 0; width: 100%; position: relative; display: flex; justify-content: center; }
        canvas { display: block; background: #020617; max-width: 100%; }

        .doors-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; width: 100%; }
        .door-btn { background: #1e293b; border: 2px solid rgba(255,255,255,0.05); padding: 30px 10px; border-radius: 12px; font-size: 24px; cursor: pointer; transition: all 0.2s; font-weight: bold; color: #64748b; }
        .door-btn:active { transform: scale(0.95); }
        .door-btn.door-win { background: var(--ok); border-color: #4ade80; color: white; }
        .door-btn.door-lose { background: var(--danger); border-color: #f87171; color: white; }

        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(45deg, var(--primary), #3b82f6); display: flex; justify-content: center; align-items: center; font-size: 32px; font-weight: bold; color: white; margin-bottom: 12px; box-shadow: 0 0 20px var(--primary-glow); }
        .game-status-text { margin-bottom: 10px; font-size: 13px; font-weight: bold; min-height: 18px; }
    </style>
</head>
<body>

    <div id="hud-container"></div>

    <script>
        // ИНИЦИАЛИЗАЦИЯ ДАННЫХ ИГРОКА
        let coins = parseInt(localStorage.getItem('cc_coins')) || 0;
        let energy = parseInt(localStorage.getItem('cc_energy')) || 100;
        let maxEnergy = parseInt(localStorage.getItem('cc_max_energy')) || 100;
        let tapUpgrade = parseInt(localStorage.getItem('cc_upg_tap')) || 0;
        let energyUpgrade = parseInt(localStorage.getItem('cc_upg_energy')) || 0;
        let tgId = "LocalUser";
        let tgName = "Player";
        let lang = localStorage.getItem('cc_lang') || 'ru';
        let isFirebaseOk = false;
        let db = null;

        // ЯЗЫКОВЫЕ ПАКЕТЫ (ЛОКАЛИЗАЦИЯ)
        const langPack = {
            ru: {
                main: "Главная", shop: "Магазин", games: "Мини-игры", profile: "Профиль",
                energy: "Энергия", multi: "Мультитап", multiDesc: "+1 монет за клик",
                elim: "Лимит энергии", elimDesc: "+50 макс. энергии", pId: "Telegram ID:",
                pClick: "Сила клика:", pMaxE: "Макс. энергия:", bClaim: "Забрать бонус",
                bClaimed: "Бонус собран", bWait: "Ждать: ", lBtn: "Язык: RU",
                bet: "Ставка:", mines: "Мини:", play: "Играть", cashout: "Забрать",
                win: "Вы выиграли!", lose: "Вы проиграли!", next: "Следующий раунд!"
            },
            en: {
                main: "Main", shop: "Shop", games: "Games", profile: "Profile",
                energy: "Energy", multi: "Multitap", multiDesc: "+1 coins per tap",
                elim: "Energy Limit", elimDesc: "+50 max energy", pId: "Telegram ID:",
                pClick: "Tap Power:", pMaxE: "Max Energy:", bClaim: "Claim Bonus",
                bClaimed: "Bonus Claimed", bWait: "Wait: ", lBtn: "Lang: EN",
                bet: "Bet:", mines: "Mines:", play: "Play", cashout: "Cashout",
                win: "You won!", lose: "You lost!", next: "Next Round!"
            }
        };

        // ДИНАМИЧЕСКОЕ ПОДКЛЮЧЕНИЕ HUD.HTML
        window.addEventListener('DOMContentLoaded', () => {
            fetch('HUD.html')
                .then(response => {
                    if (!response.ok) throw new Error("Не удалось загрузить HUD.html. Запустите через локальный сервер!");
                    return response.text();
                })
                .then(html => {
                    document.getElementById('hud-container').innerHTML = html;
                    
                    // Бинд главного кликера после загрузки DOM
                    const clicker = document.getElementById('coin-clicker');
                    if(clicker) {
                        clicker.addEventListener('click', handleTap);
                        clicker.addEventListener('touchstart', (e) => {
                            e.preventDefault();
                            handleTap(e);
                        }, { passive: false });
                    }
                    
                    // Старт всех систем
                    initFirebase();
                    initTelegramProfile();
                    setupGamesMenu();
                    updateUI();
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('hud-container').innerHTML = `<div style="padding:40px; text-align:center; color:red;"><h3>Ошибка загрузки интерфейса</h3><p>${err.message}</p></div>`;
                });
        });

        // ИНИЦИАЛИЗАЦИЯ FIREBASE (Настройки заглушены, замени своими при необходимости)
        function initFirebase() {
            try {
                const firebaseConfig = { databaseURL: "https://YOUR-PROJECT.firebaseio.com" };
                if(firebaseConfig.databaseURL.includes("YOUR-PROJECT")) throw "Заглушка";
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                isFirebaseOk = true;
            } catch(e) {
                console.log("Firebase отключен. Работает локальное сохранение.");
            }
            loadData();
        }

        // ПОДКЛЮЧЕНИЕ TELEGRAM WEB APP API
        function initTelegramProfile() {
            try {
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                    const u = tg.initDataUnsafe.user;
                    tgId = u.id.toString();
                    tgName = u.first_name + (u.last_name ? " " + u.last_name : "");
                    if(u.username) tgName = "@" + u.username;
                }
            } catch (e) { console.log("Запущено вне Telegram"); }
        }

        // СИНХРОНИЗАЦИЯ БАЗЫ ДАННЫХ И ЛОКАЛЬНОЙ ПАМЯТИ
        function loadData() {
            if (isFirebaseOk && tgId !== "LocalUser") {
                db.ref('users/' + tgId).once('value').then((snapshot) => {
                    const d = snapshot.val();
                    if (d) {
                        coins = d.coins || 0;
                        tapUpgrade = d.tapUpgrade || 0;
                        energyUpgrade = d.energyUpgrade || 0;
                        maxEnergy = 100 + (energyUpgrade * 50);
                        
                        // Восстановление энергии по времени простоя
                        let lastTime = d.lastEnergyTime || Date.now();
                        let passed = Math.floor((Date.now() - lastTime) / 1000);
                        energy = Math.min(maxEnergy, (d.energy || 100) + passed);
                        
                        updateUI();
                    }
                });
            } else {
                maxEnergy = 100 + (energyUpgrade * 50);
                let lastTime = parseInt(localStorage.getItem('cc_last_energy_time')) || Date.now();
                let passed = Math.floor((Date.now() - lastTime) / 1000);
                energy = Math.min(maxEnergy, energy + passed);
                updateUI();
            }
        }

        function saveData() {
            localStorage.setItem('cc_coins', coins);
            localStorage.setItem('cc_energy', energy);
            localStorage.setItem('cc_max_energy', maxEnergy);
            localStorage.setItem('cc_upg_tap', tapUpgrade);
            localStorage.setItem('cc_upg_energy', energyUpgrade);
            localStorage.setItem('cc_last_energy_time', Date.now());

            if (isFirebaseOk && tgId !== "LocalUser") {
                db.ref('users/' + tgId).update({
                    coins: coins,
                    energy: energy,
                    tapUpgrade: tapUpgrade,
                    energyUpgrade: energyUpgrade,
                    lastEnergyTime: Date.now(),
                    name: tgName
                });
            }
        }

        // ОБНОВЛЕНИЕ ИНТЕРФЕЙСА (HUD + СТАТИСТИКА)
        function updateUI() {
            const el = (id) => document.getElementById(id);
            if (!el('coins')) return; // Защита, если HUD еще загружается

            el('coins').innerText = coins.toLocaleString();
            el('energy-val').innerText = `${energy}/${maxEnergy}`;
            el('energy-fill').style.width = ((energy / maxEnergy) * 100) + '%';

            let clickPower = 1 + tapUpgrade;
            let costTap = Math.floor(100 * Math.pow(2.5, tapUpgrade));
            let costEnergy = Math.floor(150 * Math.pow(2.2, energyUpgrade));

            // Обновление цен и названий в магазине
            const p = langPack[lang];
            el('nv-game').innerText = p.main;
            el('nv-shop').innerText = p.shop;
            el('nv-games').innerText = p.games;
            el('nv-profile').innerText = p.profile;

            el('lbl-energy').innerText = p.energy;
            el('lbl-multitap').innerText = p.multi;
            el('desc-multitap').innerText = p.multiDesc;
            el('lbl-energy-limit').innerText = p.elim;
            el('desc-energy-limit').innerText = p.elimDesc;

            el('btn-upgrade-tap').innerText = costTap.toLocaleString();
            el('btn-upgrade-energy').innerText = costEnergy.toLocaleString();

            // Профиль
            el('user-name').innerText = tgName;
            el('user-avatar').innerText = tgName.charAt(0).toUpperCase();
            el('p-id').innerText = tgId;
            el('p-click').innerText = clickPower;
            el('p-maxenergy').innerText = maxEnergy;
            
            el('lbl-p-id').innerText = p.pId;
            el('lbl-p-click').innerText = p.pClick;
            el('lbl-p-maxenergy').innerText = p.pMaxE;
            el('btn-lang').innerText = p.lBtn;

            updateBonusButton();
        }

        // ЛОГИКА КЛИКЕРА (КЛИК ПО МОНЕТЕ)
        function handleTap(e) {
            let clickPower = 1 + tapUpgrade;
            if (energy >= clickPower) {
                energy -= clickPower;
                coins += clickPower;
                updateUI();
                saveData();

                // Эффект +X текста в точке клика
                let x = window.innerWidth / 2;
                let y = window.innerHeight / 2;
                if(e && e.clientX) { x = e.clientX; y = e.clientY; }
                else if(e && e.changedTouches && e.changedTouches[0]) { x = e.changedTouches[0].clientX; y = e.changedTouches[0].clientY; }

                const p = document.createElement('div');
                p.className = 'plus-one';
                p.innerText = '+' + clickPower;
                p.style.left = (x - 12) + 'px';
                p.style.top = (y - 20) + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }
        }

        // РЕГЕНЕРАЦИЯ ЭНЕРГИИ ТАЙМЕРОМ
        setInterval(() => {
            if (energy < maxEnergy) {
                energy++;
                const fill = document.getElementById('energy-fill');
                const val = document.getElementById('energy-val');
                if(fill && val) {
                    val.innerText = `${energy}/${maxEnergy}`;
                    fill.style.width = ((energy / maxEnergy) * 100) + '%';
                }
                localStorage.setItem('cc_energy', energy);
            }
            localStorage.setItem('cc_last_energy_time', Date.now());
        }, 1000);

        // ПОКУПКА АПГРЕЙДОВ В МАГАЗИНЕ
        function buyUpgrade(type) {
            if (type === 'tap') {
                let cost = Math.floor(100 * Math.pow(2.5, tapUpgrade));
                if (coins >= cost) { coins -= cost; tapUpgrade++; }
            } else if (type === 'energy') {
                let cost = Math.floor(150 * Math.pow(2.2, energyUpgrade));
                if (coins >= cost) { coins -= cost; energyUpgrade++; }
            }
            maxEnergy = 100 + (energyUpgrade * 50);
            updateUI();
            saveData();
        }

        // ЕЖЕДНЕВНЫЙ БОНУС
        function updateBonusButton() {
            const btn = document.getElementById('btn-bonus');
            if(!btn) return;
            const last = parseInt(localStorage.getItem('cc_last_bonus')) || 0;
            const left = 86400000 - (Date.now() - last);
            const p = langPack[lang];

            if (left > 0) {
                let h = Math.floor(left / 3600000);
                let m = Math.floor((left % 3600000) / 60000);
                btn.innerText = p.bWait + `${h}h ${m}m`;
                btn.className = "btn";
                btn.disabled = true;
            } else {
                btn.innerText = p.bClaim;
                btn.className = "btn btn-ok";
                btn.disabled = false;
            }
        }
        setInterval(updateBonusButton, 60000);

        function claimDailyBonus() {
            const last = parseInt(localStorage.getItem('cc_last_bonus')) || 0;
            if (Date.now() - last >= 86400000) {
                coins += 500;
                localStorage.setItem('cc_last_bonus', Date.now());
                updateUI();
                saveData();
            }
        }

        // ПЕРЕКЛЮЧЕНИЕ НАВИГАЦИОННЫХ ЭКРАНОВ HUD
        function show(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            const scr = document.getElementById(screenId + '-scr');
            const nav = document.getElementById('n-' + screenId);
            if(scr) scr.classList.add('active');
            if(nav) nav.classList.add('active');

            // Сброс активных мини-игр при выходе из меню игр
            if(screenId !== 'games') closeActiveGame();
        }

        function toggleLang() {
            lang = (lang === 'ru') ? 'en' : 'ru';
            localStorage.setItem('cc_lang', lang);
            updateUI();
            setupGamesMenu();
        }

        /**************************************************************
         * БЛОК МИНИ-ИГР (Вся логика полностью сохранена и интегрирована)
         **************************************************************/
        const gamesList = [
            { id: 'mines', nameRu: "💣 Мины (Mines)", nameEn: "💣 Mines" },
            { id: 'crypto', nameRu: "📈 Крипто Тренажер", nameEn: "📈 Crypto Trader" },
            { id: 'dice', nameRu: "🎲 Кости (Dice)", nameEn: "🎲 Dice" },
            { id: 'plinko', nameRu: "🟢 Плинко (Plinko)", nameEn: "🟢 Plinko" },
            { id: 'doors', nameRu: "🚪 Три Двери", nameEn: "🚪 Three Doors" }
        ];

        function setupGamesMenu() {
            const menu = document.getElementById('games-menu');
            if(!menu) return;
            menu.innerHTML = '';
            gamesList.forEach(g => {
                const b = document.createElement('button');
                b.className = 'btn btn-primary';
                b.style.padding = '16px';
                b.style.fontSize = '15px';
                b.innerText = (lang === 'ru') ? g.nameRu : g.nameEn;
                b.onclick = () => launchGame(g.id);
                menu.appendChild(b);
            });
        }

        function launchGame(gameId) {
            document.getElementById('games-menu').style.display = 'none';
            const box = document.getElementById('active-game-container');
            box.style.display = 'block';
            box.innerHTML = '';

            // Кнопка возврата
            const backBtn = document.createElement('button');
            backBtn.className = 'btn';
            backBtn.style.marginBottom = '15px';
            backBtn.innerText = (lang === 'ru') ? "← Назад к играм" : "← Back to Games";
            backBtn.onclick = closeActiveGame;
            box.appendChild(backBtn);

            // Создаем контейнер-карточку для игры
            const gCard = document.createElement('div');
            gCard.className = 'game-card';
            box.appendChild(gCard);

            // Фабрика инициализации игр
            if (gameId === 'mines') initMinesGame(gCard);
            if (gameId === 'crypto') initCryptoGame(gCard);
            if (gameId === 'dice') initDiceGame(gCard);
            if (gameId === 'plinko') initPlinkoGame(gCard);
            if (gameId === 'doors') initDoorsGame(gCard);
        }

        function closeActiveGame() {
            const menu = document.getElementById('games-menu');
            const box = document.getElementById('active-game-container');
            if(menu && box) {
                menu.style.display = 'flex';
                box.style.display = 'none';
                box.innerHTML = '';
            }
            // Сброс Plinko таймера если активен
            if(window.plinkoLoop) { cancelAnimationFrame(window.plinkoLoop); window.plinkoLoop = null; }
        }

        // ИГРА 1: МИНЫ
        function initMinesGame(container) {
            let active = false, bet = 10, mineCount = 3, multiplier = 1.0, mineArray = [], openedCount = 0;
            const p = langPack[lang];

            container.innerHTML = `
                <div class="input-group"><span>${p.bet}</span><input type="number" id="m-bet" value="10"></div>
                <div class="input-group"><span>${p.mines}</span><input type="number" id="m-count" value="3" min="1" max="24"></div>
                <div class="game-status-text" id="m-status" style="color:var(--warn)"></div>
                <div class="grid-5x5" id="m-grid"></div>
                <button class="btn btn-primary" id="m-action">${p.play}</button>
            `;

            const grid = document.getElementById('m-grid');
            const action = document.getElementById('m-action');
            const status = document.getElementById('m-status');

            for (let i = 0; i < 25; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = '?';
                cell.onclick = () => clickCell(i, cell);
                grid.appendChild(cell);
            }

            action.onclick = () => {
                if (!active) {
                    bet = parseInt(document.getElementById('m-bet').value) || 0;
                    mineCount = parseInt(document.getElementById('m-count').value) || 3;
                    if (bet <= 0 || coins < bet) return;
                    if (mineCount < 1 || mineCount > 24) return;

                    coins -= bet; active = true; openedCount = 0; multiplier = 1.0;
                    updateUI(); saveData();

                    mineArray = Array(25).fill(false);
                    let placed = 0;
                    while(placed < mineCount) {
                        let idx = Math.floor(Math.random() * 25);
                        if(!mineArray[idx]) { mineArray[idx] = true; placed++; }
                    }

                    Array.from(grid.children).forEach(c => { c.className = 'cell'; c.innerText = '?'; });
                    action.className = "btn btn-warn"; action.innerText = `${p.cashout} (1.00x)`;
                    status.innerText = ""; status.style.color = "var(--warn)";
                } else {
                    let win = Math.floor(bet * multiplier);
                    coins += win; active = false;
                    status.innerText = `${p.win} +${win}`; status.style.color = "var(--ok)";
                    action.className = "btn btn-primary"; action.innerText = p.play;
                    revealAll(); updateUI(); saveData();
                }
            };

            function clickCell(idx, cellEl) {
                if (!active || cellEl.classList.contains('opened-gem') || cellEl.classList.contains('opened-mine')) return;
                if (mineArray[idx]) {
                    active = false; status.innerText = p.lose; status.style.color = "var(--danger)";
                    action.className = "btn btn-primary"; action.innerText = p.play;
                    revealAll(); updateUI(); saveData();
                } else {
                    openedCount++;
                    cellEl.classList.add('opened-gem'); cellEl.innerText = '💎';
                    multiplier += (mineCount * 0.12);
                    action.innerText = `${p.cashout} (${multiplier.toFixed(2)}x)`;
                    if (openedCount === (25 - mineCount)) action.click();
                }
            }

            function revealAll() {
                Array.from(grid.children).forEach((c, i) => {
                    if(mineArray[i]) { c.classList.add('opened-mine'); c.innerText = '💣'; }
                    else if(!c.classList.contains('opened-gem')) { c.innerText = '💎'; }
                });
            }
        }

        // ИГРА 2: КРИПТО ТРЕЙДЕР
        function initCryptoGame(container) {
            let bet = 10, currentPrice = 100, isLong = true, history = [50, 60, 45, 70, 80, 65, 90, 100];
            const p = langPack[lang];

            container.innerHTML = `
                <div class="input-group"><span>${p.bet}</span><input type="number" id="c-bet" value="10"></div>
                <div class="crypto-chart" id="c-chart"></div>
                <div class="game-status-text" id="c-status" style="font-size:18px;">$100.00</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button class="btn btn-ok" id="c-up">▲ GREEN</button>
                    <button class="btn btn-danger" id="c-down">▼ RED</button>
                </div>
            `;

            const chart = document.getElementById('c-chart');
            const status = document.getElementById('c-status');
            const renderChart = () => {
                chart.innerHTML = '';
                let max = Math.max(...history);
                history.forEach(v => {
                    let h = (v / max) * 100;
                    let bar = document.createElement('div');
                    bar.className = 'chart-bar';
                    bar.style.height = `${h}%`;
                    if(v === currentPrice) bar.style.background = 'var(--primary)';
                    chart.appendChild(bar);
                });
            };
            renderChart();

            const trade = (longChosen) => {
                bet = parseInt(document.getElementById('c-bet').value) || 0;
                if(bet <= 0 || coins < bet) return;
                coins -= bet;

                let change = (Math.random() * 30 + 5) * (Math.random() > 0.48 ? 1 : -1);
                let newPrice = Math.max(10, currentPrice + change);
                let win = (change > 0 && longChosen) || (change < 0 && !longChosen);

                history.push(newPrice); if(history.length > 22) history.shift();
                currentPrice = newPrice;
                renderChart();

                if (win) {
                    let reward = Math.floor(bet * 1.9); coins += reward;
                    status.innerText = `$${currentPrice.toFixed(2)} (+${change.toFixed(2)}) 🎉`;
                    status.style.color = "var(--ok)";
                } else {
                    status.innerText = `$${currentPrice.toFixed(2)} (${change.toFixed(2)}) 📉`;
                    status.style.color = "var(--danger)";
                }
                updateUI(); saveData();
            };

            document.getElementById('c-up').onclick = () => trade(true);
            document.getElementById('c-down').onclick = () => trade(false);
        }

        // ИГРА 3: КОСТИ (DICE)
        function initDiceGame(container) {
            const p = langPack[lang];
            container.innerHTML = `
                <div class="input-group"><span>${p.bet}</span><input type="number" id="d-bet" value="10"></div>
                <div class="dice-box" id="d-box">00</div>
                <div class="game-status-text" id="d-status"></div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button class="btn btn-primary" id="d-under">≤ 50 (2.0x)</button>
                    <button class="btn btn-primary" id="d-over">&gt; 50 (2.0x)</button>
                </div>
            `;
            const box = document.getElementById('d-box');
            const status = document.getElementById('d-status');

            const roll = (isOver) => {
                let bet = parseInt(document.getElementById('d-bet').value) || 0;
                if(bet <= 0 || coins < bet) return;
                coins -= bet;

                let res = Math.floor(Math.random() * 100) + 1;
                box.innerText = res < 10 ? '0' + res : res;
                let win = (isOver && res > 50) || (!isOver && res <= 50);

                if (win) {
                    let r = bet * 2; coins += r;
                    status.innerText = `${p.win} +${r}`; status.style.color = "var(--ok)";
                } else {
                    status.innerText = p.lose; status.style.color = "var(--danger)";
                }
                updateUI(); saveData();
            };
            document.getElementById('d-under').onclick = () => roll(false);
            document.getElementById('d-over').onclick = () => roll(true);
        }

        // ИГРА 4: ПЛИНКО
        function initPlinkoGame(container) {
            const p = langPack[lang];
            container.innerHTML = `
                <div class="input-group"><span>${p.bet}</span><input type="number" id="p-bet" value="10"></div>
                <div class="plinko-canvas-wrap"><canvas id="plinko-cv" width="300" height="260"></canvas></div>
                <button class="btn btn-primary" id="p-drop">${p.play}</button>
            `;
            const cv = document.getElementById('plinko-cv');
            const ctx = cv.getContext('2d');
            const rows = 8, pins = [], balls = [], buckets = [2, 0.5, 0.2, 1.5, 0.2, 0.5, 2];

            for (let r = 2; r <= rows; r++) {
                let y = 35 + (r * 22);
                for (let i = 0; i <= r; i++) {
                    pins.push({ x: 150 - (r * 11) + (i * 22), y: y });
                }
            }

            function draw() {
                ctx.clearRect(0, 0, 300, 260);
                ctx.fillStyle = '#475467';
                pins.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill(); });

                // Рендер ведер мультипликаторов
                let bw = 300 / buckets.length;
                buckets.forEach((b, i) => {
                    ctx.fillStyle = b >= 1.5 ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.1)';
                    ctx.fillRect(i * bw + 2, 240, bw - 4, 18);
                    ctx.fillStyle = b >= 1.5 ? '#22c55e' : '#94a3b8';
                    ctx.font = 'bold 9px Arial'; ctx.textAlign = 'center';
                    ctx.fillText(b+'x', i*bw + bw/2, 252);
                });

                // Движение шаров
                ctx.fillStyle = '#2563eb';
                for (let i = balls.length - 1; i >= 0; i--) {
                    let b = balls[i]; b.y += 2.5;
                    let currRow = Math.floor((b.y - 45) / 22) + 2;
                    if(currRow !== b.lastRow && currRow <= rows) {
                        b.lastRow = currRow; b.x += (Math.random() > 0.5 ? 11 : -11);
                    }
                    ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI*2); ctx.fill();

                    if (b.y >= 238) {
                        let bucketIdx = Math.floor(b.x / bw);
                        bucketIdx = Math.max(0, Math.min(buckets.length - 1, bucketIdx));
                        let w = Math.floor(b.bet * buckets[bucketIdx]);
                        coins += w; updateUI(); saveData();
                        balls.splice(i, 1);
                    }
                }
                window.plinkoLoop = requestAnimationFrame(draw);
            }
            if(window.plinkoLoop) cancelAnimationFrame(window.plinkoLoop);
            draw();

            document.getElementById('p-drop').onclick = () => {
                let bet = parseInt(document.getElementById('p-bet').value) || 0;
                if(bet <= 0 || coins < bet) return;
                coins -= bet; updateUI(); saveData();
                balls.push({ x: 150, y: 30, lastRow: 1, bet: bet });
            };
        }

        // ИГРА 5: ТРИ ДВЕРИ
        function initDoorsGame(container) {
            const p = langPack[lang];
            container.innerHTML = `
                <div class="input-group"><span>${p.bet}</span><input type="number" id="dr-bet" value="10"></div>
                <div class="game-status-text" id="dr-status" style="color:var(--warn)">Выбери дверь!</div>
                <div class="doors-container">
                    <button class="door-btn" onclick="window.chooseDoor(0)">1</button>
                    <button class="door-btn" onclick="window.chooseDoor(1)">2</button>
                    <button class="door-btn" onclick="window.chooseDoor(2)">3</button>
                </div>
            `;
            const status = document.getElementById('dr-status');
            const btns = container.querySelectorAll('.door-btn');

            window.chooseDoor = (idx) => {
                let bet = parseInt(document.getElementById('dr-bet').value) || 0;
                if(bet <= 0 || coins < bet) return;
                coins -= bet;

                let prizeIdx = Math.floor(Math.random() * 3);
                btns.forEach((b, i) => {
                    b.disabled = true;
                    if(i === prizeIdx) b.classList.add('door-win');
                    else b.classList.add('door-lose');
                });

                if (idx === prizeIdx) {
                    let r = bet * 2.8; coins += Math.floor(r);
                    status.innerText = `${p.win} +${Math.floor(r)}`; status.style.color = "var(--ok)";
                } else {
                    status.innerText = p.lose; status.style.color = "var(--danger)";
                }
                updateUI(); saveData();

                setTimeout(() => {
                    btns.forEach(b => { b.disabled = false; b.className = 'door-btn'; });
                    status.innerText = (lang === 'ru') ? "Следующий раунд! Выбери дверь" : "Next round! Choose a door";
                    status.style.color = "var(--warn)";
                }, 1800);
            };
        }
    </script>
