<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUPI DRUPI COIN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020617; height: 100vh; display: flex; flex-direction: column; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #hud-container { flex-shrink: 0; }
        #app-frame { flex: 1; width: 100%; border: none; background: #0b1e3d; }
    </style>
</head>
<body>

    <div id="hud-container"></div>
    <iframe id="app-frame" src="home.html"></iframe>

    <script>
        fetch('HUD.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('hud-container').innerHTML = html;
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.addEventListener('click', function(e) {
                        const id = this.id;
                        let page = '';
                        if (id === 'n-game') page = 'home.html';
                        else if (id === 'n-shop') page = 'shop.html';
                        else if (id === 'n-games') page = 'minigames.html';
                        else if (id === 'n-profile') page = 'profile.html';
                        if (page) {
                            document.getElementById('app-frame').src = page;
                            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                            this.classList.add('active');
                        }
                    });
                });
                document.getElementById('n-game').classList.add('active');
            })
            .catch(err => console.error('Ошибка загрузки HUD:', err));
    </script>
</body>
</html>
