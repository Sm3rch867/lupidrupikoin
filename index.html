<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЛУПИДРУПИКОИН - ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #facc15;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.5);
            --accent: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        .screen { display: none; flex-direction: column; align-items: center; height: calc(100vh - 90px); width: 100%; padding: 20px; overflow-y: auto; }
        .active { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ИГРА */
        .header { text-align: center; margin: 20px 0; }
        .header h1 { font-size: 50px; text-shadow: 0 0 15px rgba(250, 204, 21, 0.3); transition: 0.3s; }
        .coin-btn { 
            width: 220px; height: 220px; border: none; border-radius: 50%; 
            background: url('coin.png') no-repeat center/cover;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: transform 0.1s, filter 0.3s; touch-action: manipulation; margin: 20px 0;
            position: relative;
        }
        .coin-btn:active { transform: scale(0.95); }
        .ultra-mode { filter: hue-rotate(90deg) brightness(1.5) drop-shadow(0 0 20px gold) !important; animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: rotate(1deg); } 50% { transform: rotate(-1deg); } 100% { transform: rotate(1deg); } }

        /* ЭНЕРГИЯ */
        .energy-container { width: 100%; background: #1e293b; height: 12px; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        #energy-fill { background: var(--primary); height: 100%; width: 100%; transition: width 0.2s, background 0.3s; }
        .inf-energy { background: linear-gradient(90deg, #facc15, #3b82f6) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }

        /* КАРТОЧКИ */
        .section-title { width: 100%; text-align: left; margin: 15px 0 10px; font-size: 14px; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; }
        .card { 
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 20px; width: 100%; padding: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .buy-btn { 
            background: var(--primary); color: #000; border: none; padding: 10px 15px; 
            border-radius: 12px; font-weight: bold; min-width: 80px;
        }
        .buy-btn:disabled { opacity: 0.5; }

        /* НАВИГАЦИЯ */
        .navbar { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; padding-bottom: 10px; }
        .nav-item { opacity: 0.4; transition: 0.3s; text-align: center; font-size: 11px; color: white; cursor: pointer; }
        .active-nav { opacity: 1; color: var(--primary); }

        .plus-one { position: absolute; color: var(--primary); font-size: 30px; font-weight: bold; pointer-events: none; animation: up 0.7s forwards; z-index: 100; }
        @keyframes up { to { transform: translateY(-100px); opacity: 0; } }

        #timer { color: #f87171; font-weight: bold; display: none; margin-top: 5px; }
    </style>
</head>
<body>

    <!-- ЭКРАН ИГРЫ -->
    <div id="game-screen" class="screen active">
        <div class="header">
            <h1 id="coins">0</h1>
            <div id="timer">БОНУС: 00:00</div>
            <div class="energy-container"><div id="energy-fill"></div></div>
            <p style="color: #94a3b8;">⚡ <span id="energy-text">100</span> / 100</p>
        </div>
        <button class="coin-btn" id="coin"></button>
        <p style="font-size: 12px; color: var(--primary)" id="passive-info">Доход: +1/5 сек</p>
    </div>

    <!-- ЭКРАН БОНУСОВ -->
    <div id="bonus-screen" class="screen">
        <div class="section-title">Ежедневная награда (Цикл 30 дней)</div>
        <div class="card">
            <div style="display:flex; flex-direction:column">
                <b id="streak-text">День: 0</b>
                <span id="next-reward">След. награда: 500 коинов</span>
            </div>
            <button class="buy-btn" onclick="claimDaily()" id="claim-btn">Забрать</button>
        </div>
        
        <div class="section-title">Колесо Фортуны</div>
        <div class="card">
            <div><b>Спины: <span id="spins-count">0</span></b></div>
            <button class="buy-btn" onclick="spinWheel()" id="spin-btn">Крутить</button>
        </div>
    </div>

    <!-- ЭКРАН МАГАЗИНА -->
    <div id="shop-screen" class="screen">
        <div class="section-title">Улучшения</div>
        <div class="card">
            <div><b>Мультитап</b><br><span id="multi-lvl">Lvl 1</span></div>
            <button class="buy-btn" onclick="buyMulti()" id="cost-multi">100</button>
        </div>
    </div>

    <!-- ЭКРАН ТОПА -->
    <div id="top-screen" class="screen">
        <div class="section-title">Мировой Рейтинг</div>
        <div id="leaderboard" style="width:100%"></div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <div class="navbar">
        <div class="nav-item active-nav" id="n-game" onclick="show('game')">💰<br>Игра</div>
        <div class="nav-item" id="n-bonus" onclick="show('bonus')">🎁<br>Бонусы</div>
        <div class="nav-item" id="n-shop" onclick="show('shop')">🛒<br>Магазин</div>
        <div class="nav-item" id="n-top" onclick="show('top')">🏆<br>Топ</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDSWXC6HPW0QJu73BWDD4rzHdzb6rP7yg",
            authDomain: "lupidrupikoin.firebaseapp.com",
            databaseURL: "https://lupidrupikoin-default-rtdb.firebaseio.com",
            projectId: "lupidrupikoin",
            storageBucket: "lupidrupikoin.firebasestorage.app",
            messagingSenderId: "71547438259",
            appId: "1:71547438259:web:807e88ddf21799511e7aa6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Данные игрока
        let coins = parseInt(localStorage.getItem("c")) || 0;
        let energy = parseInt(localStorage.getItem("e")) || 100;
        let multi = parseInt(localStorage.getItem("m")) || 1;
        let streak = parseInt(localStorage.getItem("streak")) || 0;
        let lastClaim = localStorage.getItem("lastClaim") || "";
        let spins = parseInt(localStorage.getItem("spins")) || 0;
        let isInfinite = false;

        function show(s) {
            document.querySelectorAll('.screen').forEach(scr => scr.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            document.getElementById(s + '-screen').classList.add('active');
            document.getElementById('n-' + s).classList.add('active-nav');
            if(s === 'top') loadTop();
        }

        // КЛИК
        document.getElementById("coin").addEventListener('click', (e) => {
            if(!isInfinite && energy <= 0) return;
            
            coins += multi;
            if(!isInfinite) energy--;

            // Анимация текста
            const p = document.createElement('div');
            p.className = 'plus-one'; p.innerText = '+' + multi;
            p.style.left = e.pageX + 'px'; p.style.top = e.pageY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);

            update(); save();
        });

        // ЕЖЕДНЕВНЫЙ БОНУС
        function claimDaily() {
            const now = new Date().toDateString();
            if(lastClaim === now) return alert("Заходи завтра!");

            if(lastClaim) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                if(new Date(lastClaim).toDateString() !== yesterday.toDateString()) {
                    streak = 0; // Сброс при пропуске
                }
            }

            streak++;
            if(streak > 30) streak = 1;

            let reward = 0;
            if(streak === 1) reward = 500;
            else if(streak === 5) { reward = 7000; spins++; }
            else if(streak === 10) { reward = 50000; spins++; activateBoost(10, 600); }
            else if(streak === 20) { reward = 500000; spins++; activateBoost(20, 300); }
            else if(streak === 30) { reward = 10000000; spins++; }
            else { reward = streak * 1000; }

            coins += reward;
            lastClaim = now;
            save(); update();
            alert(`День ${streak}: +${reward.toLocaleString()} коинов!`);
        }

        // КОЛЕСО ФОРТУНЫ
        function spinWheel() {
            if(spins <= 0) return alert("Нет спинов!");
            spins--;
            const variants = ["coins", "energy", "mega"];
            const res = variants[Math.floor(Math.random() * variants.length)];
            
            if(res === "coins") { coins += 50000; alert("Выиграно 50,000!"); }
            else if(res === "energy") { activateBoost(1, 300); alert("БЕСКОНЕЧНАЯ ЭНЕРГИЯ (5 мин)!"); }
            else { multi += 5; setTimeout(() => multi -= 5, 60000); alert("+5 к клику на минуту!"); }
            
            save(); update();
        }

        // БУСТЫ
        function activateBoost(m, sec) {
            const originalMulti = multi;
            multi *= m;
            isInfinite = true;
            
            document.getElementById("coin").classList.add("ultra-mode");
            document.getElementById("energy-fill").classList.add("inf-energy");
            document.getElementById("timer").style.display = "block";

            let timeLeft = sec;
            const timerInt = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                document.getElementById("timer").innerText = `БОНУС: ${m}:${s < 10 ? '0'+s : s}`;
                if(timeLeft <= 0) {
                    clearInterval(timerInt);
                    multi = originalMulti;
                    isInfinite = false;
                    document.getElementById("coin").classList.remove("ultra-mode");
                    document.getElementById("energy-fill").classList.remove("inf-energy");
                    document.getElementById("timer").style.display = "none";
                    update();
                }
            }, 1000);
        }

        function buyMulti() {
            let price = multi * 200;
            if(coins >= price) { coins -= price; multi++; save(); update(); }
        }

        function save() {
            localStorage.setItem("c", coins);
            localStorage.setItem("m", multi);
            localStorage.setItem("e", energy);
            localStorage.setItem("streak", streak);
            localStorage.setItem("lastClaim", lastClaim);
            localStorage.setItem("spins", spins);
            
            db.ref('users/' + tg.initDataUnsafe?.user?.id).set({
                username: tg.initDataUnsafe?.user?.first_name || "LupiPlayer",
                coins: coins
            });
        }

        function update() {
            document.getElementById("coins").innerText = coins.toLocaleString();
            document.getElementById("energy-text").innerText = energy;
            document.getElementById("energy-fill").style.width = isInfinite ? "100%" : energy + "%";
            document.getElementById("cost-multi").innerText = (multi * 200).toLocaleString();
            document.getElementById("multi-lvl").innerText = "Lvl " + multi;
            document.getElementById("streak-text").innerText = "День: " + streak;
            document.getElementById("spins-count").innerText = spins;
            
            const now = new Date().toDateString();
            document.getElementById("claim-btn").disabled = (lastClaim === now);
        }

        // РЕГЕН И ПАССИВКА
        setInterval(() => { if(!isInfinite && energy < 100) { energy++; update(); } }, 2000);
        setInterval(() => { coins += 1; update(); }, 5000);

        function loadTop() {
            db.ref('users').orderByChild('coins').limitToLast(10).once('value', s => {
                let html = '';
                s.forEach(u => {
                    html += `<div class="card"><b>${u.val().username}</b><span>${u.val().coins.toLocaleString()} 💰</span></div>`;
                });
                document.getElementById("leaderboard").innerHTML = html;
            });
        }

        update();
    </script>
</body>
</html>
