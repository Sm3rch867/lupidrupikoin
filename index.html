<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUPIDRUPIKOIN: FINAL FIX</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #facc15; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --accent: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        .screen { display: none; flex-direction: column; align-items: center; height: calc(100vh - 80px); padding: 20px; overflow-y: auto; }
        .active { display: flex; }

        #coins { font-size: 48px; font-weight: bold; color: var(--primary); text-shadow: 0 0 20px rgba(250, 204, 21, 0.4); margin-top: 20px; }
        .stats { font-size: 14px; color: #94a3b8; display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }

        .coin-btn {
            width: 240px; height: 240px; border-radius: 50%; border: 8px solid #1e293b;
            background: url('coin.png') center/cover; margin: 10px 0;
            box-shadow: 0 0 40px rgba(0,0,0,0.5); transition: transform 0.05s; touch-action: manipulation;
        }
        .coin-btn:active { transform: scale(0.92); }

        .energy-bar { width: 100%; height: 12px; background: #1e293b; border-radius: 10px; overflow: hidden; margin-top: 8px; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #facc15, #fbbf24); transition: 0.3s; }

        /* Shop Styles */
        .shop-item { background: var(--card); width: 100%; padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
        .shop-info h4 { color: var(--primary); font-size: 16px; }
        .shop-info p { font-size: 12px; color: #94a3b8; }
        .buy-btn { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .buy-btn:disabled { background: #334155; opacity: 0.5; }

        /* Wheel Styles */
        .wheel-box { position: relative; width: 280px; height: 280px; margin: 15px 0; }
        .wheel-pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #ef4444; z-index: 10; }

        .leader-item { background: var(--card); width: 100%; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; flex-direction: column; }
        .admin-panel { display: none; background: #1e293b; padding: 15px; border-radius: 15px; margin-bottom: 20px; width: 100%; border: 2px solid #ef4444; }
        .admin-input { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: #1e293b; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #334155; }
        .nav-item { text-align: center; font-size: 11px; opacity: 0.5; color: white; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--primary); }

        .btn { background: var(--primary); color: #000; border: none; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        .plus-one { position: absolute; color: var(--primary); font-size: 24px; font-weight: bold; pointer-events: none; animation: floatUp 0.8s forwards; }
        @keyframes floatUp { to { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="game-scr" class="screen active">
        <div id="coins">0</div>
        <div class="stats">
            <span>➕ <span id="click-val">1</span>/клик</span>
            <span>🏠 <span id="passive-val">0</span>/5сек</span>
            <span>🎰 Спины: <span id="spins-top">0</span></span>
        </div>
        <button class="coin-btn" id="coin-tap"></button>
        <div style="width: 100%; max-width: 300px; margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; font-size: 14px;">
                <span>⚡ Энергия</span>
                <span><span id="e-text">100</span>/<span id="max-e-text">100</span></span>
            </div>
            <div class="energy-bar"><div id="energy-fill"></div></div>
        </div>
    </div>

    <div id="shop-scr" class="screen">
        <h2 style="margin-bottom: 20px;">МАГАЗИН 🛒</h2>
        <div class="shop-item">
            <div class="shop-info"><h4>Сила клика</h4><p id="lvl-click">Ур: 1</p></div>
            <button class="buy-btn" onclick="buyUpgrade('click')"><span id="price-click">150</span> 💰</button>
        </div>
        <div class="shop-item">
            <div class="shop-info"><h4>Энергия</h4><p id="lvl-energy">Ур: 1</p></div>
            <button class="buy-btn" onclick="buyUpgrade('energy')"><span id="price-energy">200</span> 💰</button>
        </div>
        <div class="shop-item">
            <div class="shop-info"><h4>Пассивный доход</h4><p id="lvl-passive">Ур: 0</p></div>
            <button class="buy-btn" onclick="buyUpgrade('passive')"><span id="price-passive">500</span> 💰</button>
        </div>
    </div>

    <div id="bonus-scr" class="screen">
        <button class="btn" id="claim-btn" onclick="claimDaily()">ЗАБРАТЬ БОНУС</button>
        <div class="wheel-box">
            <div class="wheel-pointer"></div>
            <canvas id="wheel-canvas" width="280" height="280"></canvas>
        </div>
        <button class="btn" id="spin-btn" onclick="startSpin()">КРУТИТЬ (Спины: <span id="s-btn-val">0</span>)</button>
    </div>

    <div id="top-scr" class="screen">
        <h2>ТОП ИГРОКОВ 🏆</h2>
        <div id="admin-box" class="admin-panel">
            <input type="text" id="target-id" class="admin-input" placeholder="ID игрока">
            <input type="number" id="add-coins" class="admin-input" placeholder="Монеты">
            <button class="btn" style="background:#ef4444;color:white" onclick="adminGive()">ВЫДАТЬ</button>
        </div>
        <div id="leaderboard" style="width: 100%;">Загрузка...</div>
    </div>

    <div class="nav">
        <div class="nav-item active" id="n-game" onclick="show('game')">💰<br>Главная</div>
        <div class="nav-item" id="n-shop" onclick="show('shop')">🛒<br>Магазин</div>
        <div class="nav-item" id="n-bonus" onclick="show('bonus')">🎁<br>Бонусы</div>
        <div class="nav-item" id="n-top" onclick="show('top')">🏆<br>Топ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const ADMIN_ID = 5932857353;
        const firebaseConfig = {
            apiKey: "AIzaSyDSWXC6HPW0QJu73BWDD4rzHdzb6rP7yg",
            authDomain: "lupidrupikoin.firebaseapp.com",
            databaseURL: "https://lupidrupikoin-default-rtdb.firebaseio.com",
            projectId: "lupidrupikoin",
            appId: "1:71547438259:web:807e88ddf21799511e7aa6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let coins = parseInt(localStorage.getItem('c')) || 0;
        let energy = parseInt(localStorage.getItem('e')) || 100;
        let spins = parseInt(localStorage.getItem('s')) || 0;
        let lastClaim = parseInt(localStorage.getItem('lc')) || 0;
        let lvlClick = parseInt(localStorage.getItem('l_c')) || 1;
        let lvlEnergy = parseInt(localStorage.getItem('l_e')) || 1;
        let lvlPassive = parseInt(localStorage.getItem('l_p')) || 0;
        
        let infE = false;
        let spinning = false;

        const sectors = [
            { n: "Кеш +5%", c: "#1e293b" }, { n: "∞ Энергия", c: "#3b82f6" },
            { n: "Кеш +5%", c: "#1e293b" }, { n: "x2 Клик", c: "#a855f7" },
            { n: "Кеш +5%", c: "#1e293b" }, { n: "ДЖЕКПОТ", c: "#facc15" },
            { n: "Кеш +5%", c: "#1e293b" }, { n: "∞ Энергия", c: "#3b82f6" }
        ];

        function drawWheel(angle = 0) {
            const canvas = document.getElementById('wheel-canvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            const arc = (Math.PI * 2) / sectors.length;
            ctx.clearRect(0,0,280,280);
            sectors.forEach((s, i) => {
                const a = angle + i * arc;
                ctx.beginPath(); ctx.fillStyle = s.c; ctx.moveTo(140,140);
                ctx.arc(140,140,135,a,a+arc); ctx.fill();
                ctx.save(); ctx.translate(140,140); ctx.rotate(a+arc/2);
                ctx.fillStyle="white"; ctx.font="bold 10px Arial"; ctx.fillText(s.n, 55, 5); ctx.restore();
            });
        }

        function show(scr) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(scr+'-scr').classList.add('active');
            document.getElementById('n-'+scr).classList.add('active');
            if(scr === 'top') loadTop();
            if(scr === 'bonus') drawWheel();
            if(scr === 'top' && tg.initDataUnsafe?.user?.id == ADMIN_ID) document.getElementById('admin-box').style.display = 'block';
        }

        function loadTop() {
            db.ref('users').orderByChild('coins').limitToLast(15).once('value', s => {
                let html = ''; let players = [];
                s.forEach(u => { const v = u.val(); v.id = u.key; players.push(v); });
                players.reverse().forEach((p, i) => {
                    html += `<div class="leader-item">
                        <b>${i+1}. ${p.username || 'Аноним'}</b>
                        <div>${Math.floor(p.coins || 0).toLocaleString()} 💰 | ID: ${p.id}</div>
                    </div>`;
                });
                document.getElementById('leaderboard').innerHTML = html || 'Нет данных';
            });
        }

        function buyUpgrade(type) {
            if (type === 'click' && lvlClick < 1000) {
                let cost = lvlClick * 150;
                if (coins >= cost) { coins -= cost; lvlClick++; }
            } else if (type === 'energy' && lvlEnergy < 100) {
                let cost = lvlEnergy * 200;
                if (coins >= cost) { coins -= cost; lvlEnergy++; energy += 100; }
            } else if (type === 'passive' && lvlPassive < 101) {
                let cost = (lvlPassive + 1) * 500;
                if (coins >= cost) { coins -= cost; lvlPassive++; }
            }
            saveAll(); updateUI();
        }

        function updateUI() {
            const maxE = lvlEnergy * 100;
            const passive = lvlPassive === 0 ? 0 : (lvlPassive === 1 ? 1 : (lvlPassive - 1) * 10);
            document.getElementById('coins').innerText = Math.floor(coins).toLocaleString();
            document.getElementById('click-val').innerText = lvlClick;
            document.getElementById('passive-val').innerText = passive;
            document.getElementById('e-text').innerText = energy;
            document.getElementById('max-e-text').innerText = maxE;
            document.getElementById('spins-top').innerText = spins;
            document.getElementById('s-btn-val').innerText = spins;
            document.getElementById('energy-fill').style.width = (energy/maxE*100)+'%';
            
            document.getElementById('price-click').innerText = lvlClick * 150;
            document.getElementById('price-energy').innerText = lvlEnergy * 200;
            document.getElementById('price-passive').innerText = (lvlPassive + 1) * 500;
            document.getElementById('lvl-click').innerText = `Ур: ${lvlClick}`;
            document.getElementById('lvl-energy').innerText = `Ур: ${lvlEnergy}`;
            document.getElementById('lvl-passive').innerText = `Ур: ${lvlPassive}`;
        }

        const handleTap = (e) => {
            if (e.cancelable) e.preventDefault();
            if (energy <= 0 && !infE) return;
            coins += lvlClick;
            if (!infE) energy--;
            const clientX = e.touches ? e.touches[0].pageX : e.clientX;
            const clientY = e.touches ? e.touches[0].pageY : e.clientY;
            const p = document.createElement('div');
            p.className = 'plus-one'; p.innerText = `+${lvlClick}`;
            p.style.left = clientX + 'px'; p.style.top = clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
            updateUI(); saveAll();
            tg.HapticFeedback.impactOccurred('light');
        };

        document.getElementById('coin-tap').addEventListener('touchstart', handleTap, {passive: false});

        function startSpin() {
            if (spins <= 0 || spinning) return;
            spinning = true; spins--; updateUI(); saveAll();
            let angle = Math.random() * Math.PI * 2;
            let speed = 0.4;
            const anim = () => {
                angle += speed; speed *= 0.985; drawWheel(angle);
                if (speed < 0.005) { spinning = false; finishSpin(angle); }
                else requestAnimationFrame(anim);
            };
            anim();
        }

        function finishSpin(angle) {
            const final = (angle % (Math.PI * 2));
            const idx = sectors.length - 1 - Math.floor(final / ((Math.PI * 2) / sectors.length)) % sectors.length;
            tg.showAlert("Выпало: " + sectors[idx].n);
            if(sectors[idx].n === "ДЖЕКПОТ") coins += 50000;
            updateUI(); saveAll();
        }

        function saveAll() {
            localStorage.setItem('c', coins); localStorage.setItem('e', energy);
            localStorage.setItem('s', spins); localStorage.setItem('l_c', lvlClick);
            localStorage.setItem('l_e', lvlEnergy); localStorage.setItem('l_p', lvlPassive);
            if(tg.initDataUnsafe?.user?.id) {
                db.ref('users/' + tg.initDataUnsafe.user.id).update({
                    coins, lvlClick, lvlEnergy, lvlPassive, spins,
                    username: tg.initDataUnsafe.user.first_name
                });
            }
        }

        setInterval(() => {
            let income = lvlPassive === 0 ? 0 : (lvlPassive === 1 ? 1 : (lvlPassive - 1) * 10);
            if(income > 0) { coins += income; updateUI(); saveAll(); }
        }, 5000);

        setInterval(() => {
            if(energy < lvlEnergy * 100) { energy++; updateUI(); }
        }, 1500);

        drawWheel();
        updateUI();
    </script>
</body>
</html>
