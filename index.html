<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЛУПИДРУПИКОИН: SOUND & SHOP FIX</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #facc15; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        .screen { display: none; flex-direction: column; align-items: center; height: calc(100vh - 80px); padding: 20px; overflow-y: auto; }
        .active { display: flex; }

        #coins { font-size: 42px; font-weight: bold; color: var(--primary); text-shadow: 0 0 20px rgba(250, 204, 21, 0.4); margin-top: 10px; }
        .stats { font-size: 13px; color: #94a3b8; display: flex; gap: 10px; margin-bottom: 10px; }

        .coin-btn {
            width: 220px; height: 220px; border-radius: 50%; border: 8px solid #1e293b;
            background: url('coin.png') center/cover; margin: 10px 0;
            box-shadow: 0 0 40px rgba(0,0,0,0.5); transition: transform 0.05s; touch-action: manipulation;
        }
        .coin-btn:active { transform: scale(0.92); }

        /* Энергия */
        .energy-box { width: 100%; max-width: 300px; margin-top: 10px; }
        .energy-bar { width: 100%; height: 12px; background: #1e293b; border-radius: 10px; overflow: hidden; margin: 5px 0; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #facc15, #fbbf24); transition: 0.3s; }

        /* Магазин */
        .shop-item { 
            background: var(--card); width: 100%; padding: 15px; border-radius: 15px; 
            margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .shop-info h4 { font-size: 16px; margin-bottom: 4px; }
        .shop-info p { font-size: 12px; color: #94a3b8; }
        .buy-btn { background: var(--primary); color: #000; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Колесо */
        .wheel-box { position: relative; width: 260px; height: 260px; margin: 10px 0; }
        .wheel-pointer { 
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-top: 25px solid #ef4444; z-index: 10;
        }

        .btn { background: var(--primary); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        
        .nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: #1e293b; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #334155; }
        .nav-item { text-align: center; font-size: 10px; opacity: 0.5; color: white; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--primary); }

        .chance-text { font-size: 10px; color: #64748b; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

    <!-- Главная -->
    <div id="game-scr" class="screen active">
        <div id="coins">0</div>
        <div class="stats">
            <span>➕ <span id="click-val">1</span>/клик</span>
            <span>⏳ <span id="passive-val">0</span>/3сек</span>
        </div>
        <button class="coin-btn" id="coin-tap"></button>
        <div class="energy-box">
            <div style="display: flex; justify-content: space-between; font-size: 14px;">
                <span>⚡ Энергия</span>
                <span><span id="e-text">1000</span>/<span id="e-max">1000</span></span>
            </div>
            <div class="energy-bar"><div id="energy-fill"></div></div>
        </div>
    </div>

    <!-- Магазин -->
    <div id="shop-scr" class="screen">
        <h2 style="margin-bottom: 20px;">МАГАЗИН 🛒</h2>
        <div class="shop-item">
            <div class="shop-info"><h4>Мульти-клик</h4><p>Lvl <span id="lvl-click">1</span> (+1 за тап)</p></div>
            <button class="buy-btn" onclick="buyUpgrade('click')"><span id="price-click">1000</span> 💰</button>
        </div>
        <div class="shop-item">
            <div class="shop-info"><h4>Запас энергии</h4><p>Lvl <span id="lvl-energy">1</span> (+500 макс)</p></div>
            <button class="buy-btn" onclick="buyUpgrade('energy')"><span id="price-energy">2000</span> 💰</button>
        </div>
        <div class="shop-item">
            <div class="shop-info"><h4>Пассивный доход</h4><p>Lvl <span id="lvl-passive">0</span> (+10 в 3 сек)</p></div>
            <button class="buy-btn" onclick="buyUpgrade('passive')"><span id="price-passive">5000</span> 💰</button>
        </div>
    </div>

    <!-- Колесо -->
    <div id="bonus-scr" class="screen">
        <div class="wheel-box">
            <div class="wheel-pointer"></div>
            <canvas id="wheel-canvas" width="260" height="260"></canvas>
        </div>
        <div class="chance-text">Джекпот 11.1% | x2 22.2% | ∞ 22.2% | Кеш 44.4%</div>
        <button class="btn" id="spin-btn" onclick="startSpin()">КРУТИТЬ (<span id="s-btn-val">0</span>)</button>
    </div>

    <!-- Навигация -->
    <div class="nav">
        <div class="nav-item active" id="n-game" onclick="show('game')">💰<br>Главная</div>
        <div class="nav-item" id="n-shop" onclick="show('shop')">🛒<br>Магазин</div>
        <div class="nav-item" id="n-bonus" onclick="show('bonus')">🎁<br>Бонусы</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // Аудио (обязательно укажи правильные пути к файлам)
        const spinSound = new Audio('spin.mp3');
        const winSound = new Audio('win.mp3');
        let audioUnlocked = false;

        let coins = parseInt(localStorage.getItem('c')) || 0;
        let energy = parseInt(localStorage.getItem('e')) || 1000;
        let spins = parseInt(localStorage.getItem('s')) || 0;
        let lvlClick = parseInt(localStorage.getItem('l_c')) || 1;
        let lvlEnergy = parseInt(localStorage.getItem('l_e')) || 1;
        let lvlPassive = parseInt(localStorage.getItem('l_p')) || 0;
        
        let spinning = false;

        function unlockAudio() {
            if (!audioUnlocked) {
                spinSound.play().then(() => { spinSound.pause(); spinSound.currentTime = 0; });
                winSound.play().then(() => { winSound.pause(); winSound.currentTime = 0; });
                audioUnlocked = true;
            }
        }

        const sectors = [
            { n: "+5% Кеш", c: "#1e293b", type: 'cash' }, 
            { n: "Множитель x2", c: "#a855f7", type: 'x2' },
            { n: "∞ Энергия", c: "#3b82f6", type: 'inf' },
            { n: "+5% Кеш", c: "#1e293b", type: 'cash' }, 
            { n: "ДЖЕКПОТ", c: "#facc15", type: 'jack' },
            { n: "+5% Кеш", c: "#1e293b", type: 'cash' },
            { n: "Множитель x2", c: "#a855f7", type: 'x2' },
            { n: "∞ Энергия", c: "#3b82f6", type: 'inf' },
            { n: "+5% Кеш", c: "#1e293b", type: 'cash' }
        ];

        function startSpin() {
            if (spins <= 0 || spinning) return;
            unlockAudio();
            spinning = true; spins--; 
            
            // Запуск звука прокрутки
            spinSound.currentTime = 0;
            spinSound.loop = true;
            spinSound.play().catch(e => console.log("Sound block:", e));

            let angle = 0;
            let speed = 0.4 + Math.random() * 0.1;
            const anim = () => {
                angle += speed; speed *= 0.985;
                drawWheel(angle);
                if (speed < 0.005) {
                    spinning = false;
                    spinSound.pause(); // Стоп звука прокрутки
                    winSound.play();   // Звук выигрыша
                    // ... логика расчета приза ...
                    updateUI();
                } else { requestAnimationFrame(anim); }
            };
            anim();
        }

        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        function drawWheel(angle = 0) {
            const arc = (Math.PI * 2) / sectors.length;
            ctx.clearRect(0,0,260,260);
            sectors.forEach((s, i) => {
                const a = angle + i * arc;
                ctx.beginPath(); ctx.fillStyle = s.c; ctx.moveTo(130,130);
                ctx.arc(130,130,125,a,a+arc); ctx.fill();
                ctx.save(); ctx.translate(130,130); ctx.rotate(a+arc/2);
                ctx.fillStyle="white"; ctx.font="bold 9px Arial"; ctx.fillText(s.n, 50, 5); ctx.restore();
            });
        }

        function buyUpgrade(type) {
            if(type === 'click') {
                let p = lvlClick * 1000;
                if(coins >= p) { coins -= p; lvlClick++; }
            } else if(type === 'energy') {
                let p = lvlEnergy * 2000;
                if(coins >= p) { coins -= p; lvlEnergy++; energy += 500; }
            } else if(type === 'passive') {
                let p = (lvlPassive + 1) * 5000;
                if(coins >= p) { coins -= p; lvlPassive++; }
            }
            saveAll(); updateUI();
        }

        document.getElementById('coin-tap').onclick = () => {
            unlockAudio();
            const maxE = 1000 + (lvlEnergy - 1) * 500;
            if (energy > 0) {
                coins += lvlClick; energy--; updateUI(); saveAll();
            }
        };

        function updateUI() {
            const maxE = 1000 + (lvlEnergy - 1) * 500;
            document.getElementById('coins').innerText = Math.floor(coins).toLocaleString();
            document.getElementById('click-val').innerText = lvlClick;
            document.getElementById('passive-val').innerText = lvlPassive * 10;
            document.getElementById('e-text').innerText = energy;
            document.getElementById('e-max').innerText = maxE;
            document.getElementById('energy-fill').style.width = (energy / maxE * 100) + '%';
            document.getElementById('s-btn-val').innerText = spins;
            
            document.getElementById('price-click').innerText = (lvlClick * 1000).toLocaleString();
            document.getElementById('price-energy').innerText = (lvlEnergy * 2000).toLocaleString();
            document.getElementById('price-passive').innerText = ((lvlPassive + 1) * 5000).toLocaleString();
        }

        function saveAll() {
            localStorage.setItem('c', coins); localStorage.setItem('e', energy);
            localStorage.setItem('s', spins); localStorage.setItem('l_c', lvlClick);
            localStorage.setItem('l_e', lvlEnergy); localStorage.setItem('l_p', lvlPassive);
        }

        function show(scr) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(scr+'-scr').classList.add('active');
            document.getElementById('n-'+scr).classList.add('active');
        }

        setInterval(() => { if(lvlPassive > 0) { coins += (lvlPassive * 10); updateUI(); saveAll(); } }, 3000);
        setInterval(() => { 
            const maxE = 1000 + (lvlEnergy - 1) * 500;
            if(energy < maxE) { energy++; updateUI(); } 
        }, 2000);

        drawWheel(); updateUI();
    </script>
</body>
</html>
