<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUPI DRUPI COIN - PRO EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --primary: #facc15; 
            --bg: #060913; 
            --card: rgba(17, 24, 39, 0.85); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; position: relative; }
        
        /* Неоновый фон */
        body::before {
            content: ""; position: absolute; width: 300px; height: 300px; 
            background: #2563eb; filter: blur(100px); opacity: 0.2; top: -50px; left: -50px; z-index: -1;
        }

        .screen { display: none; flex-direction: column; align-items: center; height: calc(100vh - 80px); padding: 20px; overflow-y: auto; }
        .active { display: flex; }

        /* Хедер */
        .header { padding: 20px; text-align: center; background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); width: 100%; border-bottom: 1px solid rgba(255,255,255,0.05); }
        #coins { font-size: 48px; font-weight: bold; color: var(--primary); text-shadow: 0 0 20px rgba(250, 204, 21, 0.4); }
        
        .energy-container { width: 100%; max-width: 300px; margin: 10px auto; }
        .energy-bar { width: 100%; height: 8px; background: #1e293b; border-radius: 10px; overflow: hidden; margin-top: 5px; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #facc15, #3b82f6); transition: 0.3s; }
        #inf-tag { display: none; color: #22c55e; font-size: 12px; font-weight: bold; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* Кнопка монеты */
        .coin-btn { 
            width: 280px; height: 280px; border-radius: 50%; border: 10px solid rgba(255,255,255,0.05);
            background: url('coin.png') center/cover; margin: auto 0;
            box-shadow: 0 0 40px rgba(0,0,0,0.5); transition: transform 0.05s; touch-action: manipulation;
        }
        .coin-btn:active { transform: scale(0.92); }

        /* Секции магазина */
        .shop-section-title { width: 100%; text-align: left; font-size: 16px; font-weight: bold; margin: 20px 0 10px; color: #94a3b8; border-left: 4px solid var(--primary); padding-left: 10px; }
        .upgrade-card { background: var(--card); border-radius: 16px; padding: 15px; margin-bottom: 10px; width: 100%; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .card-item { background: var(--card); border-radius: 20px; padding: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .card-img { width: 100%; aspect-ratio: 1/1; border-radius: 14px; object-fit: cover; margin-bottom: 8px; }

        /* Рулетка */
        .wheel-container { position: relative; width: 320px; height: 320px; margin: 20px 0; }
        .wheel-pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); z-index: 10; font-size: 30px; color: var(--primary); }
        #wheel-canvas { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #1e293b; }

        /* Кнопки */
        .btn { background: var(--primary); color: #000; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #334155; color: #94a3b8; cursor: not-allowed; }
        .action-btn { width: 100%; padding: 10px; border-radius: 10px; border: none; font-weight: bold; color: white; margin-top: 5px; }

        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: rgba(15, 23, 42, 0.95); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .nav-item { text-align: center; font-size: 12px; color: #64748b; text-decoration: none; }
        .nav-item.active { color: var(--primary); font-weight: bold; }

        .plus-text { position: absolute; color: var(--primary); font-size: 24px; font-weight: bold; pointer-events: none; animation: float 0.7s ease-out forwards; z-index: 100; }
        @keyframes float { to { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <div class="header">
        <div id="coins">0</div>
        <div class="energy-container">
            <div style="display: flex; justify-content: space-between; font-size: 12px;">
                <span>⚡ Энергия <span id="inf-tag">∞ БЕЗЛИМИТ</span></span>
                <span><span id="e-now">100</span> / <span id="e-max">100</span></span>
            </div>
            <div class="energy-bar"><div id="energy-fill"></div></div>
        </div>
    </div>

    <!-- ЭКРАН ИГРЫ -->
    <div id="game-scr" class="screen active">
        <div style="font-size: 14px; color: #94a3b8; margin-top: 10px;">Сила клика: <span id="c-power">1</span></div>
        <button class="coin-btn" id="coin-tap"></button>
    </div>

    <!-- ЭКРАН МАГАЗИНА -->
    <div id="shop-scr" class="screen">
        <div class="shop-section-title">УЛУЧШЕНИЯ</div>
        <div class="upgrade-card">
            <div><h4>Клик</h4><p id="cost-c">500 💰</p></div>
            <button class="btn" onclick="buy('c')">Lvl Up</button>
        </div>
        <div class="upgrade-card">
            <div><h4>Энергия (Max 10)</h4><p id="cost-e">1,000 💰</p></div>
            <button class="btn" id="btn-e" onclick="buy('e')">Lvl Up</button>
        </div>

        <div class="shop-section-title">КАРТОЧКИ</div>
        <div class="cards-grid" id="cards-box"></div>
    </div>

    <!-- ЭКРАН БОНУСОВ -->
    <div id="bonus-scr" class="screen">
        <div class="shop-section-title">ЕЖЕДНЕВНЫЙ БОНУС</div>
        <button class="btn" id="d-btn" onclick="claimDaily()" style="width:100%">ЗАБРАТЬ +5,000 💰</button>

        <div class="shop-section-title">РУЛЕТКА УДАЧИ (10 МИН БОНУСЫ)</div>
        <div class="wheel-container">
            <div class="wheel-pointer">▼</div>
            <canvas id="wheel-canvas" width="500" height="500"></canvas>
        </div>
        <button class="btn" id="s-btn" onclick="spin()" style="width:200px">КРУТИТЬ (Спины: <span id="s-count">0</span>)</button>
    </div>

    <div class="nav">
        <div class="nav-item active" id="n-game" onclick="show('game')">💰<br>Игра</div>
        <div class="nav-item" id="n-shop" onclick="show('shop')">🛒<br>Магазин</div>
        <div class="nav-item" id="n-bonus" onclick="show('bonus')">🎁<br>Бонусы</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Firebase (подставь свои ключи)
        const firebaseConfig = { databaseURL: "https://lupidrupikoin-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Состояние
        let coins = parseFloat(localStorage.getItem('c')) || 0;
        let energy = parseInt(localStorage.getItem('e')) || 100;
        let lvlC = parseInt(localStorage.getItem('lc')) || 1;
        let lvlE = parseInt(localStorage.getItem('le')) || 1;
        let spins = parseInt(localStorage.getItem('s')) || 1;
        let lastD = parseInt(localStorage.getItem('ld')) || 0;
        
        let isSpinning = false;
        let x2Active = false;
        let infActive = false;

        // Данные секторов с твоими шансами (Сумма = 100%)
        const sectors = [
            { label: "+10000", type: "m", val: 10000, chance: 15, color: "#475569" },
            { label: "x2 КЛИК", type: "x2", val: 0, chance: 10, color: "#1e293b" },
            { label: "+10000", type: "m", val: 10000, chance: 15, color: "#475569" },
            { label: "x2 КЛИК", type: "x2", val: 0, chance: 10, color: "#1e293b" },
            { label: "∞ ЭНЕРГИЯ", type: "inf", val: 0, chance: 10, color: "#16a34a" },
            { label: "+10000", type: "m", val: 10000, chance: 15, color: "#475569" },
            { label: "∞ ЭНЕРГИЯ", type: "inf", val: 0, chance: 10, color: "#16a34a" },
            { label: "+500000", type: "m", val: 500000, chance: 8, color: "#9333ea" },
            { label: "JACKPOT", type: "m", val: 1000000, chance: 7, color: "#eab308" }
        ];

        const cards = {
            c1: { cost: 670000, inc: 67000, img: '67lupi.png' },
            c2: { cost: 1000000, inc: 20000, img: 'lupidrupi.jpg' },
            c3: { cost: 5000000, inc: 50000, img: 'delovolupi.png' }
        };
        let uCards = JSON.parse(localStorage.getItem('uc')) || {};

        function getECost(l) { return l >= 10 ? 0 : (l === 9 ? 10000000 : Math.floor(1000 * Math.pow(2.5, l - 1))); }
        function getCCost(l) { return Math.floor(500 * Math.pow(1.2, l - 1)); }
        function getMaxE(l) { return 100 + (l - 1) * 100; }

        function update() {
            document.getElementById('coins').innerText = Math.floor(coins).toLocaleString();
            document.getElementById('e-now').innerText = energy;
            document.getElementById('e-max').innerText = getMaxE(lvlE);
            document.getElementById('e-fill').style.width = (energy / getMaxE(lvlE) * 100) + '%';
            document.getElementById('c-power').innerText = lvlC * (x2Active ? 2 : 1);
            document.getElementById('s-count').innerText = spins;
            document.getElementById('inf-tag').style.display = infActive ? "inline" : "none";
            
            document.getElementById('cost-c').innerText = getCCost(lvlC).toLocaleString() + " 💰";
            if(lvlE >= 10) {
                document.getElementById('cost-e').innerText = "MAX";
                document.getElementById('btn-e').disabled = true;
            } else {
                document.getElementById('cost-e').innerText = getECost(lvlE).toLocaleString() + " 💰";
            }
            save();
        }

        function save() {
            localStorage.setItem('c', coins);
            localStorage.setItem('e', energy);
            localStorage.setItem('lc', lvlC);
            localStorage.setItem('le', lvlE);
            localStorage.setItem('s', spins);
            localStorage.setItem('ld', lastD);
            localStorage.setItem('uc', JSON.stringify(uCards));
            const uid = tg.initDataUnsafe?.user?.id;
            if(uid) db.ref('users/' + uid).update({ coins, username: tg.initDataUnsafe.user.first_name });
        }

        // Клик
        document.getElementById('coin-tap').addEventListener('touchstart', (e) => {
            if (energy <= 0 && !infActive) return;
            let p = lvlC * (x2Active ? 2 : 1);
            coins += p; 
            if(!infActive) energy--;
            
            let t = e.touches[0];
            let n = document.createElement('div');
            n.className = 'plus-text'; n.innerText = `+${p}`;
            n.style.left = t.pageX + 'px'; n.style.top = t.pageY + 'px';
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 700);
            update();
            tg.HapticFeedback.impactOccurred('light');
        });

        // Покупки
        function buy(type) {
            if(type === 'c' && coins >= getCCost(lvlC)) { coins -= getCCost(lvlC); lvlC++; }
            if(type === 'e' && lvlE < 10 && coins >= getECost(lvlE)) { coins -= getECost(lvlE); lvlE++; energy = getMaxE(lvlE); }
            update();
        }

        // Рулетка
        let currentAngle = 0;
        function drawWheel() {
            const canvas = document.getElementById('wheel-canvas');
            const ctx = canvas.getContext('2d');
            const arc = (Math.PI * 2) / sectors.length;
            ctx.clearRect(0,0,500,500);
            sectors.forEach((s, i) => {
                const ang = currentAngle + i * arc;
                ctx.beginPath(); ctx.fillStyle = s.color; ctx.moveTo(250,250);
                ctx.arc(250,250,240, ang, ang + arc); ctx.fill();
                ctx.save(); ctx.translate(250,250); ctx.rotate(ang + arc/2);
                ctx.textAlign="right"; ctx.fillStyle="white"; ctx.font="bold 20px Arial";
                ctx.fillText(s.label, 230, 10); ctx.restore();
            });
        }

        function spin() {
            if(spins <= 0 || isSpinning) return;
            isSpinning = true; spins--; update();

            // Математический выбор по шансам
            let r = Math.random() * 100;
            let sum = 0; let winIdx = 0;
            for(let i=0; i<sectors.length; i++) {
                sum += sectors[i].chance;
                if(r <= sum) { winIdx = i; break; }
            }

            // Анимация
            let arc = (Math.PI * 2) / sectors.length;
            let finalRot = (Math.PI * 2 * 10) + (Math.PI * 2 - (winIdx * arc) - arc/2);
            let start = null;
            function anim(now) {
                if(!start) start = now;
                let progress = (now - start) / 5000;
                if(progress > 1) progress = 1;
                let ease = 1 - Math.pow(1 - progress, 3);
                currentAngle = ease * finalRot;
                drawWheel();
                if(progress < 1) requestAnimationFrame(anim);
                else {
                    isSpinning = false;
                    applyPrize(sectors[winIdx]);
                }
            }
            requestAnimationFrame(anim);
        }

        function applyPrize(p) {
            if(p.type === 'm') coins += p.val;
            if(p.type === 'x2') { x2Active = true; setTimeout(() => { x2Active = false; update(); }, 600000); }
            if(p.type === 'inf') { infActive = true; energy = getMaxE(lvlE); setTimeout(() => { infActive = false; update(); }, 600000); }
            tg.showAlert("Приз: " + p.label + (p.type !== 'm' ? " НА 10 МИНУТ!" : ""));
            update();
        }

        function show(s) {
            document.querySelectorAll('.screen').forEach(x => x.classList.remove('active'));
            document.getElementById(s+'-scr').classList.add('active');
            if(s === 'bonus') drawWheel();
        }

        function claimDaily() {
            if(Date.now() - lastD < 86400000) return tg.showAlert("Еще не время!");
            coins += 5000; lastD = Date.now(); update();
            tg.showAlert("Получено +5,000 💰");
        }

        // Реген энергии
        setInterval(() => {
            if(energy < getMaxE(lvlE) && !infActive) { energy++; update(); }
        }, 1500);

        update();
    </script>
</body>
</html>
