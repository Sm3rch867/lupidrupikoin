<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clicker Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --accent: #10b981;
            --text: #f8fafc;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #app {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .screen.active {
            display: flex;
        }

        .stats-bar {
            background: var(--card-bg);
            padding: 15px;
            display: flex;
            justify-content: space-around;
            border-bottom: 2px solid var(--primary);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-weight: bold;
            font-size: 1.2em;
            color: var(--primary);
        }

        /* Кликалка */
        .click-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .coin-btn {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #fbbf24 0%, #d97706 100%);
            border-radius: 50%;
            border: 8px solid #f59e0b;
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.4);
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            user-select: none;
        }

        .coin-btn:active {
            transform: scale(0.95);
        }

        /* Рулетка */
        .wheel-container {
            position: relative;
            margin: 20px 0;
        }

        #wheel-canvas {
            border: 5px solid var(--primary);
            border-radius: 50%;
            background: #1e293b;
        }

        .wheel-pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ef4444;
            z-index: 10;
        }

        /* Навигация */
        .nav {
            background: var(--card-bg);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #334155;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-size: 0.8em;
            opacity: 0.6;
            cursor: pointer;
        }

        .nav-item.active {
            opacity: 1;
            color: var(--primary);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1em;
            margin: 10px;
            cursor: pointer;
        }

        .btn:disabled {
            background: #475569;
        }

        #top-list {
            width: 100%;
            max-width: 400px;
        }

        .top-user {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: var(--card-bg);
            margin: 5px 0;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div id="app">
    <div class="stats-bar">
        <div class="stat-item">
            <div>Баланс</div>
            <div class="stat-value" id="balance">0</div>
        </div>
        <div class="stat-item">
            <div>Спины</div>
            <div class="stat-value" id="spins-count">0</div>
        </div>
    </div>

    <!-- Экран кликера -->
    <div id="main-scr" class="screen active">
        <div class="click-area">
            <div class="coin-btn" onclick="clickCoin()">💰</div>
        </div>
    </div>

    <!-- Экран рулетки -->
    <div id="bonus-scr" class="screen">
        <h3>Колесо Удачи</h3>
        <div class="wheel-container">
            <div class="wheel-pointer"></div>
            <canvas id="wheel-canvas" width="300" height="300"></canvas>
        </div>
        <button class="btn" id="spin-btn" onclick="startSpin()">Крутить!</button>
        <p>Нужно 1000 кликов для спина</p>
    </div>

    <!-- Экран ТОПа -->
    <div id="top-scr" class="screen">
        <h3>Рейтинг Игроков</h3>
        <div id="top-list">Загрузка...</div>
        <div id="admin-box" style="display:none; margin-top:20px;">
             <button class="btn" style="background:#ef4444" onclick="resetDB()">СБРОС БАЗЫ (ADMIN)</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" id="n-main" onclick="show('main')">🖱 Кликер</div>
        <div class="nav-item" id="n-bonus" onclick="show('bonus')">🎡 Бонус</div>
        <div class="nav-item" id="n-top" onclick="show('top')">🏆 ТОП</div>
    </nav>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // КОНФИГУРАЦИЯ FIREBASE (Твоя)
    const firebaseConfig = {
        apiKey: "AIzaSyD-твоя-инфа",
        authDomain: "твой-проект.firebaseapp.com",
        databaseURL: "https://твой-проект-default-rtdb.firebaseio.com",
        projectId: "твой-проект",
        storageBucket: "твой-проект.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:12345:web:abcdef"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const ADMIN_ID = '12345678'; // Твой ID

    let coins = parseInt(localStorage.getItem('coins')) || 0;
    let totalClicks = parseInt(localStorage.getItem('totalClicks')) || 0;
    let spins = parseInt(localStorage.getItem('spins')) || 0;

    const sectors = ["JACKPOT 💎", "500 💰", "1000 💰", "ПУСТО ❌", "2 Спина 🎰", "5000 💰"];
    const colors = ["#f59e0b", "#3b82f6", "#10b981", "#64748b", "#8b5cf6", "#ec4899"];

    let currentAngle = 0;
    let isSpinning = false;

    // Инициализация
    function updateUI() {
        document.getElementById('balance').innerText = coins.toLocaleString();
        document.getElementById('spins-count').innerText = spins;
        document.getElementById('spin-btn').disabled = (spins <= 0 || isSpinning);
    }

    function show(s) {
        document.querySelectorAll('.screen').forEach(scr => scr.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(s + '-scr').classList.add('active');
        document.getElementById('n-' + s).classList.add('active');
        
        if (s === 'bonus') {
            setTimeout(() => drawWheel(currentAngle), 50);
        }
        
        if (s === 'top') loadTop();
        updateUI();
    }

    function clickCoin() {
        coins += 1;
        totalClicks += 1;
        
        if (totalClicks >= 1000) {
            spins += 1;
            totalClicks = 0;
            tg.showScanQrPopup({text: "Вы заработали спин!"}); // Просто как уведомление
            setTimeout(() => tg.closeScanQrPopup(), 1000);
        }
        
        saveAll();
        updateUI();
    }

    // ЛОГИКА РУЛЕТКИ
    function drawWheel(angle) {
        const canvas = document.getElementById('wheel-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const centerX = 150;
        const centerY = 150;
        const radius = 140;
        const slice = (Math.PI * 2) / sectors.length;

        ctx.clearRect(0, 0, 300, 300);

        sectors.forEach((text, i) => {
            const start = i * slice + angle;
            ctx.beginPath();
            ctx.fillStyle = colors[i];
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, start, start + slice);
            ctx.fill();
            ctx.stroke();

            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(start + slice / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "white";
            ctx.font = "bold 14px Arial";
            ctx.fillText(text, radius - 10, 5);
            ctx.restore();
        });
    }

    function startSpin() {
        if (spins <= 0 || isSpinning) return;
        
        spins--;
        isSpinning = true;
        updateUI();

        const spinTime = 4000;
        const startTime = performance.now();
        const startRotation = currentAngle;
        const extraSpins = (Math.PI * 2) * (5 + Math.random() * 5);

        function animate(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / spinTime, 1);
            const easeOut = 1 - Math.pow(1 - progress, 3);
            
            currentAngle = startRotation + extraSpins * easeOut;
            drawWheel(currentAngle);

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                isSpinning = false;
                const finalAngle = currentAngle % (Math.PI * 2);
                const sectorAngle = (Math.PI * 2) / sectors.length;
                const idx = Math.floor(( (Math.PI * 2) - (finalAngle % (Math.PI * 2)) ) / sectorAngle) % sectors.length;
                finishSpin(idx);
            }
        }
        requestAnimationFrame(animate);
    }

    function finishSpin(idx) {
        const prize = sectors[idx];
        
        if (prize.includes("JACKPOT")) {
            coins += 100000;
            tg.showAlert("🔥 JACKPOT! +100,000 💰");
        } else if (prize.includes("5000")) {
            coins += 5000;
            tg.showAlert("💰 +5,000 монет!");
        } else if (prize.includes("1000")) {
            coins += 1000;
            tg.showAlert("💵 +1,000 монет!");
        } else if (prize.includes("500")) {
            coins += 500;
            tg.showAlert("🪙 +500 монет!");
        } else if (prize.includes("2 Спина")) {
            spins += 2;
            tg.showAlert("🎰 Бонус: +2 спина!");
        } else {
            tg.showAlert("❌ Пусто...");
        }

        saveAll();
        updateUI();
    }

    // РАБОТА С ДАННЫМИ
    function saveAll() {
        localStorage.setItem('coins', coins);
        localStorage.setItem('spins', spins);
        localStorage.setItem('totalClicks', totalClicks);

        const user = tg.initDataUnsafe?.user;
        if (user) {
            db.ref('users/' + user.id).set({
                name: user.first_name || "Игрок",
                coins: coins
            });
        }
    }

    function loadTop() {
        db.ref('users').orderByChild('coins').limitToLast(10).once('value', (snapshot) => {
            const list = document.getElementById('top-list');
            list.innerHTML = '';
            let users = [];
            snapshot.forEach(child => { users.push(child.val()); });
            users.reverse().forEach((u, i) => {
                list.innerHTML += `<div class="top-user">
                    <span>${i+1}. ${u.name}</span>
                    <span style="color:#fbbf24">${u.coins} 💰</span>
                </div>`;
            });
        });
    }

    // Стартовая загрузка
    updateUI();
    drawWheel(0);
</script>

</body>
</html>
