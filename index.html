<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЛУПИДРУПИКОИН: PERFECT EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #facc15; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --boost: #ef4444; --energy: #3b82f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        .screen { display: none; flex-direction: column; align-items: center; height: calc(100vh - 80px); padding: 20px; overflow-y: auto; }
        .active { display: flex; }

        .timers-container { display: flex; gap: 10px; margin-bottom: 10px; height: 35px; justify-content: center; width: 100%; }
        .timer-badge { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: bold; display: none; box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); }
        .t-x2 { background: var(--boost); }
        .t-inf { background: var(--energy); box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }

        #coins { font-size: 48px; font-weight: bold; color: var(--primary); text-shadow: 0 0 20px rgba(250, 204, 21, 0.4); }
        .stats { font-size: 14px; color: #94a3b8; display: flex; gap: 15px; margin: 10px 0; }

        .coin-btn {
            width: 240px; height: 240px; border-radius: 50%; border: 8px solid #1e293b;
            background: url('coin.png') center/cover; margin: 15px 0;
            box-shadow: 0 0 40px rgba(0,0,0,0.5); transition: transform 0.05s; touch-action: manipulation;
        }
        .coin-btn:active { transform: scale(0.92); }

        .energy-bar { width: 100%; height: 14px; background: #1e293b; border-radius: 10px; overflow: hidden; margin-top: 8px; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #facc15, #fbbf24); transition: 0.3s; }

        .shop-item { background: var(--card); width: 100%; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
        .buy-btn { background: #22c55e; color: white; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .wheel-box { position: relative; width: 280px; height: 280px; margin: 20px 0; }
        .wheel-pointer { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #ef4444; z-index: 100; filter: drop-shadow(0 2px 5px black); }

        .admin-panel { display: none; background: #1e293b; padding: 15px; border-radius: 15px; margin-bottom: 20px; width: 100%; border: 2px solid #ef4444; }
        .admin-input { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 10px; outline: none; }

        /* Кастомное интерактивное меню с вылетом вверх */
        .nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: #1e293b; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #334155; z-index: 1000; }
        .nav-item { text-align: center; font-size: 11px; opacity: 0.4; color: white; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 5px 10px; border-radius: 12px; }
        .nav-item.active { opacity: 1; color: var(--primary); transform: translateY(-10px) scale(1.1); text-shadow: 0 0 10px rgba(250, 204, 21, 0.6); }

        .btn { background: var(--primary); color: #000; border: none; padding: 14px; border-radius: 14px; font-weight: bold; width: 100%; cursor: pointer; }
        .plus-one { position: absolute; color: var(--primary); font-size: 28px; font-weight: bold; pointer-events: none; animation: floatUp 0.8s forwards; z-index: 100; }
        @keyframes floatUp { to { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="game-scr" class="screen active">
        <div class="timers-container">
            <div id="t-x2" class="timer-badge t-x2">🔥 X2</div>
            <div id="t-inf" class="timer-badge t-inf">⚡ INF</div>
        </div>
        <div id="coins">0</div>
        <div class="stats">
            <span>➕ <span id="click-val">1</span>/клик</span>
            <span>🎰 Спины: <span id="spins-top">0</span></span>
        </div>
        <button class="coin-btn" id="coin-tap"></button>
        <div style="width: 100%; max-width: 300px; margin-top: 15px;">
            <div style="display: flex; justify-content: space-between; font-size: 14px;">
                <span>⚡ Энергия</span>
                <span><span id="e-text">100</span>/<span id="max-e-text">100</span></span>
            </div>
            <div class="energy-bar"><div id="energy-fill"></div></div>
        </div>
    </div>

    <div id="shop-scr" class="screen">
        <h2 style="margin-bottom: 25px;">МАГАЗИН 🛒</h2>
        <div class="shop-item">
            <div><h4>Сила клика</h4><p id="l-c" style="color:#94a3b8">Ур: 1</p></div>
            <button class="buy-btn" onclick="buy('c')"><span id="p-c">150</span> 💰</button>
        </div>
        <div class="shop-item">
            <div><h4>Макс. Энергия</h4><p id="l-e" style="color:#94a3b8">Ур: 1</p></div>
            <button class="buy-btn" onclick="buy('e')"><span id="p-e">200</span> 💰</button>
        </div>
    </div>

    <div id="bonus-scr" class="screen">
        <div style="background: var(--card); padding: 15px; border-radius: 15px; width: 100%; margin-bottom: 10px; text-align: center; border: 1px solid #334155;">
            <button class="btn" onclick="claimDaily()">ЗАБРАТЬ ЕЖЕДНЕВНЫЙ БОНУС</button>
        </div>
        <div class="wheel-box">
            <div class="wheel-pointer"></div>
            <canvas id="wheel-canvas" width="280" height="280"></canvas>
        </div>
        <button class="btn" id="spin-btn" onclick="startSpin()">КРУТИТЬ (Спины: <span id="s-btn-val">0</span>)</button>
    </div>

    <div id="top-scr" class="screen">
        <h2 style="margin-bottom: 20px;">ТОП ИГРОКОВ 🏆</h2>
        <div id="admin-box" class="admin-panel">
            <h4 style="color:#ef4444; margin-bottom:10px">🛡 АДМИН-МЕНЮ</h4>
            <input type="text" id="target-id" class="admin-input" placeholder="ID игрока">
            <input type="number" id="add-coins" class="admin-input" placeholder="Добавить монет">
            <input type="number" id="add-spins" class="admin-input" placeholder="Добавить спинов">
            <button class="btn" style="background:#22c55e; color:white; margin-bottom:10px;" onclick="adminGive()">ВЫДАТЬ РЕСУРСЫ</button>
            <button class="btn" style="background:#ef4444; color:white;" onclick="adminWipe()">🛑 ОБНУЛИТЬ ИГРОКА (ПОЛНЫЙ СБРОС)</button>
        </div>
        <div id="leaderboard" style="width: 100%;">Загрузка...</div>
    </div>

    <div class="nav">
        <div class="nav-item active" id="n-game" onclick="show('game')">💰<br>Главная</div>
        <div class="nav-item" id="n-shop" onclick="show('shop')">🛒<br>Магазин</div>
        <div class="nav-item" id="n-bonus" onclick="show('bonus')">🎁<br>Бонусы</div>
        <div class="nav-item" id="n-top" onclick="show('top')">🏆<br>Топ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const ADMIN_ID = 5932857353;
        const firebaseConfig = {
            apiKey: "AIzaSyDSWXC6HPW0QJu73BWDD4rzHdzb6rP7yg",
            authDomain: "lupidrupikoin.firebaseapp.com",
            databaseURL: "https://lupidrupikoin-default-rtdb.firebaseio.com",
            projectId: "lupidrupikoin",
            appId: "1:71547438259:web:807e88ddf21799511e7aa6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let coins = parseInt(localStorage.getItem('c')) || 0;
        let energy = parseInt(localStorage.getItem('e')) || 100;
        let spins = parseInt(localStorage.getItem('s')) || 0;
        let lastClaim = parseInt(localStorage.getItem('lc')) || 0;
        let lvlC = parseInt(localStorage.getItem('l_c')) || 1;
        let lvlE = parseInt(localStorage.getItem('l_e')) || 1;

        let x2Time = 0, infTime = 0, spinning = false, currentAngle = 0;

        // Настройка секторов и распределения весов (Шансов)
        const sectors = [
            { n: "+10% Кеш", c: "#1e293b", w: 25 }, 
            { n: "+20% Кеш", c: "#334155", w: 15 }, 
            { n: "X2 Клик",  c: "#ef4444", w: 7 },  
            { n: "Безлимит", c: "#3b82f6", w: 5 },  
            { n: "+10% Кеш", c: "#1e293b", w: 25 }, 
            { n: "+20% Кеш", c: "#334155", w: 10 }, 
            { n: "X2 Клик",  c: "#ef4444", w: 6 },  
            { n: "Безлимит", c: "#3b82f6", w: 5 },  
            { n: "ДЖЕКПОТ 50%", c: "#facc15", w: 2 } 
        ];

        function drawWheel(angle = 0) {
            const canvas = document.getElementById('wheel-canvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            const arc = (Math.PI * 2) / sectors.length;
            ctx.clearRect(0, 0, 280, 280);
            
            sectors.forEach((s, i) => {
                const sectorAngle = angle + i * arc - Math.PI / 2;
                ctx.beginPath(); ctx.fillStyle = s.c; ctx.moveTo(140, 140);
                ctx.arc(140, 140, 135, sectorAngle, sectorAngle + arc); ctx.fill();
                
                ctx.save(); ctx.translate(140, 140); ctx.rotate(sectorAngle + arc / 2);
                ctx.textAlign = "right"; ctx.fillStyle = s.c === "#facc15" ? "black" : "white";
                ctx.font = "bold 11px Arial"; ctx.fillText(s.n, 125, 4); ctx.restore();
            });
        }

        function startSpin() {
            if (spins <= 0 || spinning) return tg.showAlert("Нет спинов!");
            spinning = true; spins--; updateUI();

            let rand = Math.random() * 100;
            let cum = 0, targetIdx = 0;
            for(let i = 0; i < sectors.length; i++) {
                cum += sectors[i].w;
                if(rand <= cum) { targetIdx = i; break; }
            }

            const sectorDeg = 360 / sectors.length;
            const finalAngle = 360 - (targetIdx * sectorDeg) - (sectorDeg / 2);
            const totalRotation = (360 * 10) + finalAngle; 

            let start = null;
            const duration = 4500;

            function animate(now) {
                if (!start) start = now;
                const progress = Math.min((now - start) / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 4);
                drawWheel(((ease * totalRotation) * Math.PI) / 180);

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    spinning = false;
                    currentAngle = (finalAngle * Math.PI) / 180;
                    finishSpin(targetIdx);
                }
            }
            requestAnimationFrame(animate);
        }

        function finishSpin(idx) {
            const prize = sectors[idx].n;
            if (prize === "+10% Кеш") coins += Math.max(100, Math.floor(coins * 0.1));
            else if (prize === "+20% Кеш") coins += Math.max(200, Math.floor(coins * 0.2));
            else if (prize === "X2 Клик") x2Time = 600;
            else if (prize === "Безлимит") infTime = 600;
            else if (prize === "ДЖЕКПОТ 50%") coins += Math.max(2000, Math.floor(coins * 0.5));

            tg.showAlert(`🎰 Выпало: ${prize}`);
            saveAll(); updateUI();
        }

        function handleTap(e) {
            if (e.cancelable) e.preventDefault();
            if (energy <= 0 && infTime <= 0) return;
            let p = x2Time > 0 ? lvlC * 2 : lvlC;
            coins += p; if (infTime <= 0) energy--;
            
            const x = e.touches ? e.touches[0].pageX : e.clientX;
            const y = e.touches ? e.touches[0].pageY : e.clientY;
            const div = document.createElement('div');
            div.className = 'plus-one'; div.innerText = `+${p}`;
            div.style.left = x + 'px'; div.style.top = y + 'px';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 700);
            
            updateUI(); saveAll();
            tg.HapticFeedback.impactOccurred('light');
        }

        document.getElementById('coin-tap').addEventListener('touchstart', handleTap, {passive:false});

        function buy(t) {
            let cost = t === 'c' ? lvlC * 150 : lvlE * 200;
            if (coins >= cost) {
                coins -= cost;
                if (t === 'c') lvlC++; else { lvlE++; energy += 100; }
                updateUI(); saveAll();
            } else tg.showAlert("Мало монет!");
        }

        function fmt(s) {
            let m = Math.floor(s/60); let sec = s % 60;
            return `${m}:${sec.toString().padStart(2,'0')}`;
        }

        function updateUI() {
            document.getElementById('coins').innerText = Math.floor(coins).toLocaleString();
            document.getElementById('click-val').innerText = x2Time > 0 ? lvlC * 2 : lvlC;
            document.getElementById('e-text').innerText = `${energy}/${lvlE * 100}`;
            document.getElementById('energy-fill').style.width = (energy / (lvlE * 100) * 100) + '%';
            document.getElementById('spins-top').innerText = spins;
            document.getElementById('s-btn-val').innerText = spins;
            document.getElementById('l-c').innerText = `Ур: ${lvlC}`;
            document.getElementById('p-c').innerText = lvlC * 150;
            document.getElementById('l-e').innerText = `Ур: ${lvlE}`;
            document.getElementById('p-e').innerText = lvlE * 200;
            
            document.getElementById('t-x2').style.display = x2Time > 0 ? 'block' : 'none';
            document.getElementById('t-x2').innerText = `🔥 X2: ${fmt(x2Time)}`;
            document.getElementById('t-inf').style.display = infTime > 0 ? 'block' : 'none';
            document.getElementById('t-inf').innerText = `⚡ INF: ${fmt(infTime)}`;
        }

        function claimDaily() {
            const now = Date.now();
            if (now - lastClaim < 86400000) return tg.showAlert("Заходи завтра!");
            coins += 5000; spins += 1; lastClaim = now;
            localStorage.setItem('lc', lastClaim);
            updateUI(); saveAll();
            tg.showAlert("Получено 5,000 монет и 1 Спин!");
        }

        function adminGive() {
            const tid = String(document.getElementById('target-id').value.trim());
            const aC = parseInt(document.getElementById('add-coins').value) || 0;
            const aS = parseInt(document.getElementById('add-spins').value) || 0;
            if(!tid) return tg.showAlert("ID игрока?");
            db.ref('users/' + tid).once('value').then(snap => {
                if(snap.exists()){
                    let d = snap.val();
                    let nC = (Number(d.coins) || 0) + aC;
                    let nS = (Number(d.spins) || 0) + aS;
                    db.ref('users/' + tid).update({ coins: nC, spins: nS }).then(() => {
                        tg.showAlert("Успешно добавлено!");
                        if(tid === String(tg.initDataUnsafe?.user?.id)) { coins=nC; spins=nS; updateUI(); }
                    });
                } else tg.showAlert("ID не найден");
            });
        }

        /* ПОЛНЫЙ СБРОС ИГРОКА ИЗ АДМИНКИ */
        function adminWipe() {
            const tid = String(document.getElementById('target-id').value.trim());
            if(!tid) return tg.showAlert("Введите ID для сброса!");
            
            if(confirm(`Вы уверены, что хотите ПОЛНОСТЬЮ ОБНУЛИТЬ игрока ${tid}?`)) {
                db.ref('users/' + tid).update({
                    coins: 0,
                    spins: 0,
                    lvlC: 1,
                    lvlE: 1,
                    lastClaim: 0
                }).then(() => {
                    tg.showAlert(`Игрок ${tid} успешно обнулен!`);
                    
                    // Если админ обнулил сам себя, мгновенно применяем локально
                    if(tid === String(tg.initDataUnsafe?.user?.id)) {
                        coins = 0; spins = 0; lvlC = 1; lvlE = 1; energy = 100; lastClaim = 0;
                        localStorage.clear();
                        updateUI();
                    }
                }).catch(() => {
                    tg.showAlert("Ошибка при работе с базой данных");
                });
            }
        }

        function show(s) {
            document.querySelectorAll('.screen').forEach(scr => scr.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(s + '-scr').classList.add('active');
            document.getElementById('n-' + s).classList.add('active');
            
            if (s === 'bonus') drawWheel(currentAngle);
            if (s === 'top') {
                loadTop();
                if(String(tg.initDataUnsafe?.user?.id) === String(ADMIN_ID)) {
                    document.getElementById('admin-box').style.display = 'block';
                }
            }
        }

        function saveAll() {
            const uid = tg.initDataUnsafe?.user?.id;
            localStorage.setItem('c', coins);
            localStorage.setItem('e', energy);
            localStorage.setItem('s', spins);
            localStorage.setItem('l_c', lvlC);
            localStorage.setItem('l_e', lvlE);
            if (uid) {
                db.ref('users/' + uid).update({
                    coins, spins, lvlC, lvlE, lastClaim,
                    username: tg.initDataUnsafe.user.first_name || "Игрок"
                });
            }
        }

        function loadTop() {
            db.ref('users').orderByChild('coins').limitToLast(15).once('value', s => {
                let html = ''; let arr = [];
                s.forEach(u => { const d = u.val(); d.id = u.key; arr.push(d); });
                arr.reverse().forEach((p, i) => {
                    html += `<div class="shop-item"><div><b>${i+1}. ${p.username}</b><br><small>ID: ${p.id}</small></div> <span>${Math.floor(p.coins).toLocaleString()} 💰</span></div>`;
                });
                document.getElementById('leaderboard').innerHTML = html;
            });
        }

        setInterval(() => {
            if (energy < lvlE * 100) energy++;
            if (x2Time > 0) x2Time--;
            if (infTime > 0) infTime--;
            updateUI();
        }, 1000);

        drawWheel(0);
        updateUI();
    </script>
</body>
</html>
