<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЛУПИДРУПИКОИН PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #facc15;
            --bg: radial-gradient(circle at top, #1e293b, #0f172a);
            --glass: rgba(30, 41, 59, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        .screen { display: none; flex-direction: column; align-items: center; height: calc(100vh - 100px); width: 100%; padding: 20px; overflow-y: auto; }
        .active { display: flex; }

        /* ИГРА */
        .balance-card { text-align: center; margin-top: 20px; }
        .balance-card h1 { font-size: 56px; text-shadow: 0 0 20px rgba(250, 204, 21, 0.4); }
        .energy-container { width: 80%; background: rgba(255,255,255,0.1); height: 12px; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        #energy-fill { background: var(--primary); height: 100%; width: 100%; transition: width 0.3s; }

        .coin-wrap { position: relative; margin-top: 30px; }
        .coin-btn { 
            width: 280px; height: 280px; border: none; border-radius: 50%; 
            background: url('coin.png') no-repeat center/cover;
            box-shadow: 0 0 60px rgba(250, 204, 21, 0.15);
            transition: transform 0.05s; touch-action: manipulation;
        }
        .coin-btn:active { transform: scale(0.92); }

        /* АНИМАЦИЯ +1 */
        .plus-one {
            position: absolute; color: var(--primary); font-size: 32px; font-weight: 900;
            pointer-events: none; animation: floatUp 0.8s ease-out forwards; z-index: 100;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        /* МАГАЗИН И ТОП */
        .card { background: var(--glass); backdrop-filter: blur(10px); border-radius: 24px; width: 100%; max-width: 450px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; padding: 20px; }
        .shop-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .buy-btn { background: var(--primary); color: #000; border: none; padding: 8px 16px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        .row { display: flex; justify-content: space-between; padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .rank-1 { color: #ffd700; font-size: 20px; }
        .me { background: rgba(250, 204, 21, 0.1); border: 1px solid var(--primary); border-radius: 12px; }

        /* НАВИГАЦИЯ */
        .navbar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 95%; height: 75px; background: var(--glass); backdrop-filter: blur(15px); border-radius: 24px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { display: flex; flex-direction: column; align-items: center; opacity: 0.5; color: white; transition: 0.3s; }
        .active-nav { opacity: 1; color: var(--primary); }
    </style>
</head>
<body>

    <div id="game-screen" class="screen active">
        <div class="balance-card">
            <h1>💰 <span id="coins">0</span></h1>
            <p style="color: #94a3b8; font-weight: bold;">Уровень: <span id="lvl-name">Новичок</span></p>
        </div>
        
        <div class="coin-wrap" id="coin-area">
            <button class="coin-btn" id="coin"></button>
        </div>

        <div class="energy-container"><div id="energy-fill"></div></div>
        <div style="font-weight: bold;">⚡ <span id="energy">100</span> / <span id="max-energy">100</span></div>
    </div>

    <div id="shop-screen" class="screen">
        <h2 style="margin-bottom: 20px;">УЛУЧШЕНИЯ</h2>
        <div class="card">
            <div class="shop-item">
                <div><b>Мультитап</b><br><small>+1 к клику</small></div>
                <button class="buy-btn" onclick="buyUpgrade('multi')"><span id="multi-cost">100</span> 💰</button>
            </div>
            <div class="shop-item">
                <div><b>Энергия</b><br><small>+50 к лимиту</small></div>
                <button class="buy-btn" onclick="buyUpgrade('limit')"><span id="limit-cost">150</span> 💰</button>
            </div>
        </div>
    </div>

    <div id="top-screen" class="screen">
        <h2 style="color:var(--primary); margin-bottom: 20px;">ЛИДЕРЫ МИРА</h2>
        <div class="card" id="list" style="padding: 5px;">Загрузка рейтинга...</div>
    </div>

    <div class="navbar">
        <div class="nav-btn active-nav" id="btn-game" onclick="changeTab('game')">🎮<span>Игра</span></div>
        <div class="nav-btn" id="btn-shop" onclick="changeTab('shop')">🛒<span>Магазин</span></div>
        <div class="nav-btn" id="btn-top" onclick="changeTab('top')">🏆<span>Топ</span></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDSWXC6HPW0QJu73BWDD4rzHdzb6rP7yg",
            authDomain: "lupidrupikoin.firebaseapp.com",
            databaseURL: "https://lupidrupikoin-default-rtdb.firebaseio.com",
            projectId: "lupidrupikoin",
            storageBucket: "lupidrupikoin.firebasestorage.app",
            messagingSenderId: "71547438259",
            appId: "1:71547438259:web:807e88ddf21799511e7aa6"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();

        const userId = tg.initDataUnsafe?.user?.id || "guest_" + Math.floor(Math.random()*1000);
        const userName = tg.initDataUnsafe?.user?.first_name || "Игрок";

        // Состояние игры
        let coins = Number(localStorage.getItem("coins")) || 0;
        let energy = Number(localStorage.getItem("energy")) || 100;
        let maxEnergy = Number(localStorage.getItem("maxEnergy")) || 100;
        let multi = Number(localStorage.getItem("multi")) || 1;

        function changeTab(tab) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(tab + '-screen').classList.add('active');
            document.getElementById('btn-' + tab).classList.add('active-nav');
            if(tab === 'top') loadTop();
        }

        function buyUpgrade(type) {
            if(type === 'multi') {
                let cost = multi * 150;
                if(coins >= cost) {
                    coins -= cost; multi++;
                    localStorage.setItem("multi", multi);
                }
            } else {
                let cost = (maxEnergy/50) * 200;
                if(coins >= cost) {
                    coins -= cost; maxEnergy += 50;
                    localStorage.setItem("maxEnergy", maxEnergy);
                }
            }
            save(); updateUI();
        }

        function loadTop() {
            const list = document.getElementById('list');
            db.ref('users').orderByChild('coins').limitToLast(20).once('value', (snap) => {
                let p = []; snap.forEach(c => { p.push(c.val()); });
                p.sort((a,b) => b.coins - a.coins);
                list.innerHTML = '';
                p.forEach((player, i) => {
                    const isMe = player.username === userName;
                    list.innerHTML += `<div class="row ${isMe?'me':''}">
                        <span class="rank-${i+1}">#${i+1}</span>
                        <span>${player.username}</span>
                        <span style="font-weight:900">${player.coins.toLocaleString()}</span>
                    </div>`;
                });
            });
        }

        function createPlusOne(x, y) {
            const el = document.createElement('div');
            el.className = 'plus-one';
            el.innerText = '+' + multi;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function save() {
            localStorage.setItem("coins", coins);
            localStorage.setItem("energy", energy);
            db.ref('users/' + userId).set({ username: userName, coins: coins });
        }

        function updateUI() {
            document.getElementById("coins").innerText = coins.toLocaleString();
            document.getElementById("energy").innerText = Math.floor(energy);
            document.getElementById("max-energy").innerText = maxEnergy;
            document.getElementById("energy-fill").style.width = (energy / maxEnergy * 100) + "%";
            document.getElementById("multi-cost").innerText = (multi * 150);
            document.getElementById("limit-cost").innerText = ((maxEnergy/50) * 200);
            
            let lvl = "Новичок";
            if(coins > 5000) lvl = "Лупер";
            if(coins > 50000) lvl = "Мастер";
            document.getElementById("lvl-name").innerText = lvl;
        }

        document.getElementById("coin").addEventListener('pointerdown', (e) => {
            if (energy < multi) return;
            coins += multi; energy -= multi;
            createPlusOne(e.pageX, e.pageY);
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            updateUI(); save();
        });

        setInterval(() => { if (energy < maxEnergy) { energy += 0.5; updateUI(); } }, 1000);
        updateUI();
    </script>
</body>
</html>
