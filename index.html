<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUPI DRUPI COIN</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --primary: #facc15; 
            --bg: #060913; 
            --card: rgba(17, 24, 39, 0.75); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; position: relative; }

        /* Фон */
        body::before {
            content: ""; position: absolute; border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.35;
            width: 300px; height: 300px; background: #2563eb; top: -50px; left: -50px;
        }

        .screen { display: none; flex-direction: column; align-items: center; height: calc(100vh - 150px); padding: 20px; overflow-y: auto; }
        .active { display: flex; }

        .header { padding: 15px; text-align: center; background: rgba(6, 9, 19, 0.6); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        #coins { font-size: 44px; font-weight: bold; color: var(--primary); }
        
        .energy-bar { width: 100%; max-width: 300px; height: 10px; background: #1e293b; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        #energy-fill { width: 100%; height: 100%; background: var(--primary); transition: 0.2s; }

        .coin-btn {
            width: 260px; height: 260px; border-radius: 50%; border: 8px solid rgba(255, 255, 255, 0.1);
            background: url('coin.png') center/cover; margin: auto 0; transition: transform 0.05s; touch-action: manipulation;
        }
        .coin-btn:active { transform: scale(0.95); }

        .upgrade-card { background: var(--card); border-radius: 16px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; width: 100%; border: 1px solid rgba(255,255,255,0.1); }
        
        .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .card-item { background: var(--card); border-radius: 15px; padding: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .card-img { width: 100%; border-radius: 10px; margin-bottom: 10px; }

        .btn { background: var(--primary); color: #000; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn:disabled { opacity: 0.5; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0f172a; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { text-align: center; font-size: 12px; color: #94a3b8; cursor: pointer; }
        .nav-item.active { color: var(--primary); }

        .plus-one { position: absolute; color: var(--primary); font-size: 30px; font-weight: bold; pointer-events: none; animation: float 0.7s forwards; }
        @keyframes float { to { transform: translateY(-100px); opacity: 0; } }

        /* Рулетка */
        .wheel-container { position: relative; width: 300px; height: 300px; margin: 20px 0; }
        #wheel-canvas { width: 100%; height: 100%; border-radius: 50%; }
        .wheel-pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); font-size: 30px; z-index: 5; color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <div id="coins">0</div>
        <div style="font-size: 14px; color: #94a3b8;">⚡ <span id="e-text">100</span> / <span id="max-e-text">100</span></div>
        <div class="energy-bar"><div id="energy-fill"></div></div>
    </div>

    <div id="game-scr" class="screen active">
        <div style="margin-top: 10px; color: #facc15;">Сила клика: <span id="click-val">1</span></div>
        <button class="coin-btn" id="coin-tap"></button>
    </div>

    <div id="shop-scr" class="screen">
        <h3 style="align-self:flex-start; margin-bottom:15px;">Улучшения</h3>
        <div class="upgrade-card">
            <div><b>Клик</b><br><small id="c-cost">500 💰</small></div>
            <button class="btn" onclick="buyUpgrade('click')">Улучшить</button>
        </div>
        <div class="upgrade-card">
            <div><b>Энергия</b><br><small id="e-cost">1000 💰</small></div>
            <button class="btn" id="e-btn" onclick="buyUpgrade('energy')">Улучшить</button>
        </div>
        <h3 style="align-self:flex-start; margin:15px 0;">Карточки</h3>
        <div class="cards-grid" id="cards-container"></div>
    </div>

    <div id="bonus-scr" class="screen">
        <h3>Рулетка Удачи</h3>
        <div class="wheel-container">
            <div class="wheel-pointer">▼</div>
            <canvas id="wheel-canvas" width="300" height="300"></canvas>
        </div>
        <button class="btn" id="spin-btn" onclick="startSpin()">Крутить (Спины: <span id="spins-count">0</span>)</button>
        <div id="boosts-info" style="margin-top: 15px; color: #facc15; font-weight: bold;"></div>
        <button class="btn" id="daily-btn" style="margin-top: 20px; width: 100%;" onclick="claimDaily()">Забрать ежедневный бонус</button>
    </div>

    <div id="top-scr" class="screen">
        <h3>Топ Игроков 🏆</h3>
        <div id="leaderboard" style="width: 100%; margin-top: 15px;"></div>
    </div>

    <div class="nav">
        <div class="nav-item active" id="n-game" onclick="show('game')">Игра</div>
        <div class="nav-item" id="n-shop" onclick="show('shop')">Магазин</div>
        <div class="nav-item" id="n-bonus" onclick="show('bonus')">Бонусы</div>
        <div class="nav-item" id="n-top" onclick="show('top')">Топ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Данные Firebase (Сюда вставь свои ключи, если они отличаются)
        const firebaseConfig = {
            apiKey: "AIzaSyDSWXC6HPW0QJu73BWDD4rzHdzb6rP7yg",
            authDomain: "lupidrupikoin.firebaseapp.com",
            databaseURL: "https://lupidrupikoin-default-rtdb.firebaseio.com",
            projectId: "lupidrupikoin",
            appId: "1:71547438259:web:807e88ddf21799511e7aa6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Состояние
        let coins = parseFloat(localStorage.getItem('cc_coins')) || 0;
        let energy = parseInt(localStorage.getItem('cc_energy')) || 100;
        let spins = parseInt(localStorage.getItem('cc_spins')) || 0;
        let lvlC = parseInt(localStorage.getItem('cc_lvlC')) || 1;
        let lvlE = parseInt(localStorage.getItem('cc_lvlE')) || 1;
        let lastClaim = parseInt(localStorage.getItem('cc_lastClaim')) || 0;
        let x2Timer = parseInt(localStorage.getItem('cc_x2Timer')) || 0;
        let infETimer = parseInt(localStorage.getItem('cc_infETimer')) || 0;

        let userCards = JSON.parse(localStorage.getItem('cc_userCards')) || {
            lupi_67: { bought: false, lastCollected: 0 },
            lupi_drupi: { bought: false, lastCollected: 0 },
            delo_lupi: { bought: false, lastCollected: 0 }
        };

        const CARDS_DATA = {
            lupi_67: { img: '67lupi.png', cost: 670000, income: 67000 },
            lupi_drupi: { img: 'lupidrupi.jpg', cost: 1000000, income: 20000 },
            delo_lupi: { img: 'delovolupi.png', cost: 5000000, income: 50000 }
        };

        // ТВОИ НОВЫЕ СЕКТОРЫ
        const sectors = [
            { label: "+10000 💰", weight: 15, type: "coins", val: 10000 },
            { label: "x2 Клик (10м)", weight: 10, type: "x2", val: 600000 },
            { label: "+10000 💰", weight: 15, type: "coins", val: 10000 },
            { label: "x2 Клик (10м)", weight: 10, type: "x2", val: 600000 },
            { label: "∞ Энергия (10м)", weight: 10, type: "infE", val: 600000 },
            { label: "+10000 💰", weight: 15, type: "coins", val: 10000 },
            { label: "∞ Энергия (10м)", weight: 10, type: "infE", val: 600000 },
            { label: "+500000 💰", weight: 8, type: "coins", val: 500000 },
            { label: "ДЖЕКПОТ 1M", weight: 7, type: "coins", val: 1000000 }
        ];

        function getClickPower() {
            let base = Math.floor(Math.pow(1.15, lvlC - 1));
            return (Date.now() < x2Timer) ? base * 2 : base;
        }

        function getEnergyMax() { return 100 + (lvlE - 1) * 100; }

        function updateUI() {
            document.getElementById('coins').innerText = Math.floor(coins).toLocaleString();
            document.getElementById('e-text').innerText = energy;
            document.getElementById('max-e-text').innerText = getEnergyMax();
            document.getElementById('energy-fill').style.width = (energy / getEnergyMax() * 100) + '%';
            document.getElementById('click-val').innerText = getClickPower();
            document.getElementById('spins-count').innerText = spins;
            
            document.getElementById('c-cost').innerText = Math.floor(500 * Math.pow(1.2, lvlC - 1)).toLocaleString() + " 💰";
            
            if(lvlE >= 10) {
                document.getElementById('e-cost').innerText = "MAX";
                document.getElementById('e-btn').disabled = true;
            } else {
                document.getElementById('e-cost').innerText = Math.floor(1000 * Math.pow(2.5, lvlE - 1)).toLocaleString() + " 💰";
            }

            let boostText = "";
            if(Date.now() < x2Timer) boostText += `x2 Клик активен! `;
            if(Date.now() < infETimer) boostText += `∞ Энергия активна!`;
            document.getElementById('boosts-info').innerText = boostText;

            renderCards();
        }

        function renderCards() {
            const container = document.getElementById('cards-container');
            if(!container) return;
            container.innerHTML = Object.keys(CARDS_DATA).map(id => {
                const c = CARDS_DATA[id];
                const state = userCards[id];
                if(!state.bought) {
                    return `<div class="card-item"><img src="${c.img}" class="card-img"><br><button class="btn" onclick="buyCard('${id}')">Купить ${c.cost.toLocaleString()}</button></div>`;
                } else {
                    let farm = Math.floor((Date.now() - state.lastCollected) / 5000) * c.income;
                    return `<div class="card-item"><img src="${c.img}" class="card-img"><br><button class="btn" onclick="collectCard('${id}')">Собрать ${farm}</button></div>`;
                }
            }).join('');
        }

        function buyUpgrade(type) {
            if(type === 'click') {
                let cost = Math.floor(500 * Math.pow(1.2, lvlC - 1));
                if(coins >= cost) { coins -= cost; lvlC++; }
            } else {
                let cost = Math.floor(1000 * Math.pow(2.5, lvlE - 1));
                if(coins >= cost && lvlE < 10) { coins -= cost; lvlE++; energy = getEnergyMax(); }
            }
            saveAll(); updateUI();
        }

        function buyCard(id) {
            if(coins >= CARDS_DATA[id].cost) {
                coins -= CARDS_DATA[id].cost;
                userCards[id].bought = true;
                userCards[id].lastCollected = Date.now();
                saveAll(); updateUI();
            }
        }

        function collectCard(id) {
            let farm = Math.floor((Date.now() - userCards[id].lastCollected) / 5000) * CARDS_DATA[id].income;
            if(farm > 0) {
                coins += farm;
                userCards[id].lastCollected = Date.now();
                saveAll(); updateUI();
            }
        }

        // Клик
        document.getElementById('coin-tap').addEventListener('touchstart', (e) => {
            if(energy <= 0 && Date.now() > infETimer) return;
            let p = getClickPower();
            coins += p;
            if(Date.now() > infETimer) energy--;
            
            let x = e.touches[0].pageX, y = e.touches[0].pageY;
            let d = document.createElement('div');
            d.className = 'plus-one'; d.innerText = `+${p}`;
            d.style.left = x + 'px'; d.style.top = y + 'px';
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 600);
            updateUI();
        });

        // Рулетка
        let currentAngle = 0;
        function drawWheel() {
            const canvas = document.getElementById('wheel-canvas');
            const ctx = canvas.getContext('2d');
            const arc = (Math.PI * 2) / sectors.length;
            ctx.clearRect(0, 0, 300, 300);
            sectors.forEach((s, i) => {
                ctx.beginPath(); ctx.fillStyle = i % 2 ? "#1e293b" : "#334155";
                ctx.moveTo(150, 150);
                ctx.arc(150, 150, 140, i * arc + currentAngle, (i + 1) * arc + currentAngle);
                ctx.fill();
                ctx.save(); ctx.translate(150, 150); ctx.rotate(i * arc + arc/2 + currentAngle);
                ctx.fillStyle = "white"; ctx.font = "10px Arial"; ctx.fillText(s.label, 60, 5);
                ctx.restore();
            });
        }

        function startSpin() {
            if(spins <= 0) return;
            spins--;
            let totalWeight = sectors.reduce((a, b) => a + b.weight, 0);
            let rnd = Math.random() * totalWeight;
            let idx = 0;
            for(let i=0; i<sectors.length; i++) {
                rnd -= sectors[i].weight;
                if(rnd <= 0) { idx = i; break; }
            }
            
            let extraDeg = 3600 + (360 - (idx * (360/sectors.length)));
            let start = null;
            function anim(now) {
                if(!start) start = now;
                let prog = (now - start) / 4000;
                if(prog > 1) prog = 1;
                let ease = 1 - Math.pow(1 - prog, 3);
                currentAngle = (ease * extraDeg) * Math.PI / 180;
                drawWheel();
                if(prog < 1) requestAnimationFrame(anim);
                else finishSpin(idx);
            }
            requestAnimationFrame(anim);
        }

        function finishSpin(idx) {
            let p = sectors[idx];
            if(p.type === 'coins') coins += p.val;
            else if(p.type === 'x2') x2Timer = Date.now() + p.val;
            else if(p.type === 'infE') { infETimer = Date.now() + p.val; energy = getEnergyMax(); }
            tg.showAlert("Вы выиграли: " + p.label);
            saveAll(); updateUI();
        }

        function claimDaily() {
            if(Date.now() - lastClaim > 86400000) {
                coins += 5000; spins += 1; lastClaim = Date.now();
                tg.showAlert("Бонус забран!");
                saveAll(); updateUI();
            } else tg.showAlert("Еще не время!");
        }

        function show(s) {
            document.querySelectorAll('.screen').forEach(sc => sc.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(ni => ni.classList.remove('active'));
            document.getElementById(s + '-scr').classList.add('active');
            document.getElementById('n-' + s).classList.add('active');
            if(s === 'bonus') drawWheel();
            if(s === 'top') loadTop();
        }

        function saveAll() {
            localStorage.setItem('cc_coins', coins);
            localStorage.setItem('cc_energy', energy);
            localStorage.setItem('cc_spins', spins);
            localStorage.setItem('cc_lvlC', lvlC);
            localStorage.setItem('cc_lvlE', lvlE);
            localStorage.setItem('cc_lastClaim', lastClaim);
            localStorage.setItem('cc_x2Timer', x2Timer);
            localStorage.setItem('cc_infETimer', infETimer);
            localStorage.setItem('cc_userCards', JSON.stringify(userCards));
            
            const uid = tg.initDataUnsafe?.user?.id;
            if(uid) db.ref('users/' + uid).update({ coins, username: tg.initDataUnsafe.user.first_name || "Player" });
        }

        function loadTop() {
            db.ref('users').orderByChild('coins').limitToLast(10).once('value', snap => {
                let html = "";
                snap.forEach(u => {
                    html = `<div class="upgrade-card"><span>${u.val().username}</span><b>${Math.floor(u.val().coins).toLocaleString()}</b></div>` + html;
                });
                document.getElementById('leaderboard').innerHTML = html;
            });
        }

        // Реген энергии
        setInterval(() => {
            if(energy < getEnergyMax() && Date.now() > infETimer) {
                energy++; updateUI();
            }
        }, 1500);

        updateUI();
    </script>
</body>
</html>
