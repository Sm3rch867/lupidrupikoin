<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЛУПИДРУПИКОИН</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #0f172a; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .screen { display: none; flex-direction: column; align-items: center; height: calc(100vh - 100px); width: 100%; padding: 20px; }
        .active { display: flex; }
        .game-header { margin-top: 20px; text-align: center; }
        h1 { font-size: 48px; margin-bottom: 5px; }
        .energy-bar { font-size: 18px; color: #94a3b8; margin-bottom: 30px; }
        .coin-btn { width: 250px; height: 250px; border: none; border-radius: 50%; background: url('coin.png') no-repeat center/cover; box-shadow: 0 0 40px rgba(234, 179, 8, 0.2); transition: transform 0.05s; touch-action: manipulation; }
        .coin-btn:active { transform: scale(0.94); }
        .top-title { font-size: 20px; font-weight: 800; margin-bottom: 15px; color: #facc15; text-transform: uppercase; text-align: center; }
        .leaderboard { width: 100%; max-width: 400px; background: #1e293b; border-radius: 20px; overflow-y: auto; border: 1px solid #334155; }
        .row { display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #334155; }
        .rank { font-weight: bold; color: #facc15; width: 35px; }
        .me { background: rgba(250, 204, 21, 0.2); border: 1px solid #facc15; }
        .navbar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 95%; height: 70px; background: #1e293b; border-radius: 20px; display: flex; justify-content: space-around; align-items: center; border: 1px solid #475569; z-index: 100; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; opacity: 0.5; color: white; text-decoration: none; cursor: pointer; }
        .active-nav { opacity: 1; color: #facc15; }
        .nav-icon { font-size: 24px; }
    </style>
</head>
<body>

    <div id="game-screen" class="screen active">
        <div class="game-header">
            <h1>💰 <span id="coins">0</span></h1>
            <div class="energy-bar">⚡ <span id="energy">100</span>/100</div>
        </div>
        <button class="coin-btn" id="coin"></button>
        <div style="margin-top: 30px; font-size: 20px; font-weight: 900; letter-spacing: 2px;">ЛУПИДРУПИКОИН</div>
    </div>

    <div id="top-screen" class="screen">
        <div class="top-title">ТОП ИГРОКОВ ЛУПИДРУПИКОИНА</div>
        <div class="leaderboard" id="list">Загрузка топа...</div>
    </div>

    <div class="navbar">
        <div class="nav-btn active-nav" id="btn-game" onclick="changeTab('game')"><div class="nav-icon">🎮</div><span>Игра</span></div>
        <div class="nav-btn" id="btn-top" onclick="changeTab('top')"><div class="nav-icon">🏆</div><span>Топ</span></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDSWXC6HPW0QJu73BWDD4rzHdzb6rP7yg",
            authDomain: "lupidrupikoin.firebaseapp.com",
            databaseURL: "https://lupidrupikoin-default-rtdb.firebaseio.com",
            projectId: "lupidrupikoin",
            storageBucket: "lupidrupikoin.firebasestorage.app",
            messagingSenderId: "71547438259",
            appId: "1:71547438259:web:807e88ddf21799511e7aa6"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();

        const userId = tg.initDataUnsafe?.user?.id || "guest_" + Math.floor(Math.random()*1000);
        const userName = tg.initDataUnsafe?.user?.first_name || "Игрок";

        let coins = Number(localStorage.getItem("coins")) || 0;
        let energy = Number(localStorage.getItem("energy")) || 100;

        function changeTab(tab) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            if(tab === 'game') {
                document.getElementById('game-screen').classList.add('active');
                document.getElementById('btn-game').classList.add('active-nav');
            } else {
                document.getElementById('top-screen').classList.add('active');
                document.getElementById('btn-top').classList.add('active-nav');
                loadTop();
            }
        }

        function loadTop() {
            const list = document.getElementById('list');
            db.ref('users').orderByChild('coins').limitToLast(50).once('value', (snap) => {
                let players = [];
                snap.forEach(child => { players.push(child.val()); });
                players.reverse();
                list.innerHTML = '';
                players.forEach((p, i) => {
                    const isMe = p.username === userName;
                    list.innerHTML += `<div class="row ${isMe ? 'me' : ''}"><span class="rank">#${i+1}</span><span class="name">${p.username}</span><span class="score">${p.coins.toLocaleString()}</span></div>`;
                });
            });
        }

        const cText = document.getElementById("coins");
        const eText = document.getElementById("energy");
        const btn = document.getElementById("coin");

        function update() {
            cText.innerText = coins.toLocaleString();
            eText.innerText = energy;
            btn.style.opacity = energy <= 0 ? "0.3" : "1";
        }

        btn.addEventListener('pointerdown', () => {
            if (energy <= 0) return;
            coins++; energy--;
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            update();
            localStorage.setItem("coins", coins);
            localStorage.setItem("energy", energy);
            db.ref('users/' + userId).set({ username: userName, coins: coins });
        });

        setInterval(() => { if (energy < 100) { energy++; update(); } }, 1500);
        update();
    </script>
</body>
</html>
