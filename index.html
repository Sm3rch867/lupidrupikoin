<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЛУПИДРУПИКОИН: TIMER EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #facc15; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --boost: #ef4444; --energy: #3b82f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        .screen { display: none; flex-direction: column; align-items: center; height: calc(100vh - 80px); padding: 20px; overflow-y: auto; }
        .active { display: flex; }

        #coins { font-size: 48px; font-weight: bold; color: var(--primary); text-shadow: 0 0 20px rgba(250, 204, 21, 0.4); margin-top: 10px; }
        
        /* Timers Overlay */
        .timers-container { display: flex; gap: 10px; margin-bottom: 10px; min-height: 25px; }
        .timer-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; display: none; animation: pulse 1.5s infinite; }
        .t-x2 { background: var(--boost); color: white; }
        .t-inf { background: var(--energy); color: white; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .stats { font-size: 14px; color: #94a3b8; display: flex; gap: 15px; margin-bottom: 20px; }

        .coin-btn {
            width: 240px; height: 240px; border-radius: 50%; border: 8px solid #1e293b;
            background: url('coin.png') center/cover; margin: 10px 0;
            box-shadow: 0 0 40px rgba(0,0,0,0.5); transition: transform 0.05s; touch-action: manipulation;
        }
        .coin-btn:active { transform: scale(0.92); }

        .energy-bar { width: 100%; height: 12px; background: #1e293b; border-radius: 10px; overflow: hidden; margin-top: 8px; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #facc15, #fbbf24); transition: 0.2s; }

        .shop-item { background: var(--card); width: 100%; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { background: #22c55e; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; }
        
        .wheel-box { position: relative; width: 280px; height: 280px; margin: 15px 0; }
        .wheel-pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #ef4444; z-index: 10; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: #1e293b; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #334155; }
        .nav-item { text-align: center; font-size: 11px; opacity: 0.5; color: white; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--primary); }

        .btn { background: var(--primary); color: #000; border: none; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        .plus-one { position: absolute; color: var(--primary); font-size: 24px; font-weight: bold; pointer-events: none; animation: floatUp 0.8s forwards; z-index: 100; }
        @keyframes floatUp { to { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="game-scr" class="screen active">
        <div class="timers-container">
            <div id="timer-x2" class="timer-badge t-x2">🔥 X2: 10:00</div>
            <div id="timer-inf" class="timer-badge t-inf">⚡ Безлимит: 10:00</div>
        </div>
        <div id="coins">0</div>
        <div class="stats">
            <span>➕ <span id="click-val">1</span>/клик</span>
            <span>🎰 <span id="spins-top">0</span> спинов</span>
        </div>
        <button class="coin-btn" id="coin-tap"></button>
        <div style="width: 100%; max-width: 300px; margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; font-size: 14px;">
                <span>⚡ Энергия</span>
                <span><span id="e-text">100</span>/<span id="max-e-text">100</span></span>
            </div>
            <div class="energy-bar"><div id="energy-fill"></div></div>
        </div>
    </div>

    <div id="shop-scr" class="screen">
        <h2 style="margin-bottom: 20px;">МАГАЗИН 🛒</h2>
        <div class="shop-item">
            <div><h4>Сила клика</h4><p id="lvl-c">Ур: 1</p></div>
            <button class="buy-btn" onclick="buy('c')"><span id="pr-c">150</span> 💰</button>
        </div>
        <div class="shop-item">
            <div><h4>Энергия</h4><p id="lvl-e">Ур: 1</p></div>
            <button class="buy-btn" onclick="buy('e')"><span id="pr-e">200</span> 💰</button>
        </div>
    </div>

    <div id="bonus-scr" class="screen">
        <div style="background: var(--card); padding: 15px; border-radius: 15px; width: 100%; margin-bottom: 20px; text-align: center;">
            <button class="btn" id="claim-btn" onclick="claimDaily()">ЗАБРАТЬ ЕЖЕДНЕВНЫЙ БОНУС</button>
        </div>
        <div class="wheel-box">
            <div class="wheel-pointer"></div>
            <canvas id="wheel-canvas" width="280" height="280"></canvas>
        </div>
        <button class="btn" id="spin-btn" onclick="startSpin()">КРУТИТЬ КОЛЕСО (<span id="s-btn-val">0</span>)</button>
    </div>

    <div id="top-scr" class="screen">
        <h2 style="margin-bottom: 20px;">ТОП ИГРОКОВ 🏆</h2>
        <div id="leaderboard" style="width: 100%;">Загрузка...</div>
    </div>

    <div class="nav">
        <div class="nav-item active" id="n-game" onclick="show('game')">💰<br>Главная</div>
        <div class="nav-item" id="n-shop" onclick="show('shop')">🛒<br>Магазин</div>
        <div class="nav-item" id="n-bonus" onclick="show('bonus')">🎁<br>Бонусы</div>
        <div class="nav-item" id="n-top" onclick="show('top')">🏆<br>Топ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Настройки Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDSWXC6HPW0QJu73BWDD4rzHdzb6rP7yg",
            authDomain: "lupidrupikoin.firebaseapp.com",
            databaseURL: "https://lupidrupikoin-default-rtdb.firebaseio.com",
            projectId: "lupidrupikoin",
            appId: "1:71547438259:web:807e88ddf21799511e7aa6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Состояние
        let coins = parseInt(localStorage.getItem('c')) || 0;
        let energy = parseInt(localStorage.getItem('e')) || 100;
        let spins = parseInt(localStorage.getItem('s')) || 0;
        let lastClaim = parseInt(localStorage.getItem('lc')) || 0;
        let lvlC = parseInt(localStorage.getItem('l_c')) || 1;
        let lvlE = parseInt(localStorage.getItem('l_e')) || 1;

        let x2Time = 0; // в секундах
        let infTime = 0; // в секундах
        let spinning = false;

        const sectors = [
            { n: "+5% Кеш", c: "#1e293b", w: 20 },
            { n: "X2 Монеты", c: "#ef4444", w: 10 },
            { n: "Беск. Энергия", c: "#3b82f6", w: 10 },
            { n: "+15% Кеш", c: "#334155", w: 7 },
            { n: "+5% Кеш", c: "#1e293b", w: 20 },
            { n: "X2 Монеты", c: "#ef4444", w: 10 },
            { n: "Беск. Энергия", c: "#3b82f6", w: 10 },
            { n: "+15% Кеш", c: "#334155", w: 8 },
            { n: "ДЖЕКПОТ 50%", c: "#facc15", w: 5 }
        ];

        function drawWheel(angle = 0) {
            const canvas = document.getElementById('wheel-canvas');
            const ctx = canvas.getContext('2d');
            const arc = (Math.PI * 2) / sectors.length;
            ctx.clearRect(0,0,280,280);
            sectors.forEach((s, i) => {
                const a = angle + i * arc;
                ctx.beginPath(); ctx.fillStyle = s.c; ctx.moveTo(140,140);
                ctx.arc(140,140,135,a,a+arc); ctx.fill();
                ctx.save(); ctx.translate(140,140); ctx.rotate(a+arc/2);
                ctx.fillStyle="white"; ctx.font="bold 9px Arial"; ctx.fillText(s.n, 60, 5); ctx.restore();
            });
        }

        function buy(type) {
            if(type === 'c') {
                let price = lvlC * 150;
                if(coins >= price) { coins -= price; lvlC++; }
            } else {
                let price = lvlE * 200;
                if(coins >= price) { coins -= price; lvlE++; energy += 100; }
            }
            updateUI(); saveAll();
        }

        function startSpin() {
            if (spins <= 0 || spinning) return;
            spinning = true; spins--; updateUI();
            
            let rand = Math.random() * 100;
            let cum = 0; let targetIdx = 0;
            for(let i=0; i<sectors.length; i++) {
                cum += sectors[i].w;
                if(rand <= cum) { targetIdx = i; break; }
            }

            let angle = 0;
            let extraDeg = (360 - (targetIdx * (360/sectors.length))) + 3600; 
            let speed = 0.5;
            const anim = () => {
                angle += speed; speed *= 0.985; drawWheel(angle);
                if (speed < 0.005) { spinning = false; finishSpin(targetIdx); }
                else requestAnimationFrame(anim);
            };
            anim();
        }

        function finishSpin(idx) {
            const p = sectors[idx].n;
            if(p.includes("5%")) coins += Math.floor(coins * 0.05);
            else if(p.includes("15%")) coins += Math.floor(coins * 0.15);
            else if(p.includes("50%")) coins += Math.floor(coins * 0.50);
            else if(p.includes("X2")) x2Time = 600;
            else if(p.includes("Беск")) infTime = 600;
            
            tg.showAlert(`Выпало: ${p}!`);
            updateUI(); saveAll();
        }

        function handleTap(e) {
            if (e.cancelable) e.preventDefault();
            if (energy <= 0 && infTime <= 0) return;

            let power = lvlC;
            if (x2Time > 0) power *= 2; // Твоя просьба: 5x2 = 10

            coins += power;
            if (infTime <= 0) energy--;

            const clientX = e.touches ? e.touches[0].pageX : e.clientX;
            const clientY = e.touches ? e.touches[0].pageY : e.clientY;
            const p = document.createElement('div');
            p.className = 'plus-one'; p.innerText = `+${power}`;
            p.style.left = clientX + 'px'; p.style.top = clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
            
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
        }

        document.getElementById('coin-tap').addEventListener('touchstart', handleTap, {passive: false});

        // Таймеры и Реген
        setInterval(() => {
            // Реген энергии 1 в сек
            if(energy < lvlE * 100) energy++;
            
            // Буст X2
            if(x2Time > 0) {
                x2Time--;
                document.getElementById('timer-x2').style.display = 'block';
                document.getElementById('timer-x2').innerText = `🔥 X2: ${fmt(x2Time)}`;
            } else { document.getElementById('timer-x2').style.display = 'none'; }

            // Буст Инфинити
            if(infTime > 0) {
                infTime--;
                document.getElementById('timer-inf').style.display = 'block';
                document.getElementById('timer-inf').innerText = `⚡ Безлимит: ${fmt(infTime)}`;
            } else { document.getElementById('timer-inf').style.display = 'none'; }

            updateUI();
        }, 1000);

        function fmt(s) {
            let m = Math.floor(s/60);
            let sec = s % 60;
            return `${m}:${sec.toString().padStart(2,'0')}`;
        }

        function updateUI() {
            document.getElementById('coins').innerText = Math.floor(coins).toLocaleString();
            document.getElementById('click-val').innerText = (x2Time > 0) ? lvlC * 2 : lvlC;
            document.getElementById('spins-top').innerText = spins;
            document.getElementById('s-btn-val').innerText = spins;
            document.getElementById('e-text').innerText = energy;
            document.getElementById('max-e-text').innerText = lvlE * 100;
            document.getElementById('energy-fill').style.width = (energy/(lvlE*100)*100)+'%';
            
            document.getElementById('lvl-c').innerText = `Ур: ${lvlC}`;
            document.getElementById('pr-c').innerText = lvlC * 150;
            document.getElementById('lvl-e').innerText = `Ур: ${lvlE}`;
            document.getElementById('pr-e').innerText = lvlE * 200;
        }

        function show(scr) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(scr+'-scr').classList.add('active');
            document.getElementById('n-'+scr).classList.add('active');
            if(scr === 'bonus') drawWheel();
            if(scr === 'top') loadTop();
        }

        function saveAll() {
            localStorage.setItem('c', coins); localStorage.setItem('e', energy);
            localStorage.setItem('s', spins); localStorage.setItem('l_c', lvlC); 
            localStorage.setItem('l_e', lvlE);
            if(tg.initDataUnsafe?.user?.id) {
                db.ref('users/' + tg.initDataUnsafe.user.id).update({ coins, spins, lvlC, lvlE });
            }
        }

        function loadTop() {
            db.ref('users').orderByChild('coins').limitToLast(10).once('value', s => {
                let h = ''; let players = [];
                s.forEach(u => { players.push(u.val()); });
                players.reverse().forEach((p, i) => {
                    h += `<div style="padding:10px;background:rgba(255,255,255,0.05);margin-bottom:5px;border-radius:10px;display:flex;justify-content:space-between">
                        <span>${i+1}. ${p.username || 'Игрок'}</span><b>${Math.floor(p.coins).toLocaleString()}</b>
                    </div>`;
                });
                document.getElementById('leaderboard').innerHTML = h;
            });
        }

        drawWheel();
        updateUI();
    </script>
</body>
</html>
