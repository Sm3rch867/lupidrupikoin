<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUPI DRUPI COIN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020617; height: 100vh; display: flex; flex-direction: column; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #hud-container { flex-shrink: 0; }
        #app-frame { flex: 1; width: 100%; border: none; background: #0b1e3d; }
    </style>
</head>
<body>

    <div id="hud-container"></div>
    <iframe id="app-frame" src="home.html"></iframe>

    <script>
        fetch('HUD.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('hud-container').innerHTML = html;
                document.querySelectorAll('.hud-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const page = this.dataset.page;
                        document.querySelectorAll('.hud-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        document.getElementById('app-frame').src = page;
                    });
                });
                // активируем главную по умолчанию
                const defaultBtn = document.querySelector('.hud-btn[data-page="home.html"]');
                if (defaultBtn) defaultBtn.classList.add('active');
            })
            .catch(err => console.error('Ошибка загрузки HUD:', err));
    </script>
</body>
</html>
