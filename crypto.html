<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Крипто‑Интуит</title>
<style>
  body{margin:0;background:#0b132a;color:#e9f0ff;font-family:Inter,system-ui}
  .wrap{max-width:520px;margin:0 auto;padding:14px}
  .panel{background:#0f1b39;border:1px solid #1a2c59;border-radius:12px;padding:12px;margin-bottom:10px}
  .row{display:flex;gap:10px;align-items:center;justify-content:space-between}
  button{background:#17306a;border:1px solid #2b55cc;color:#e9f0ff;border-radius:10px;padding:10px 14px;cursor:pointer}
  .chart{height:160px;background:linear-gradient(180deg,#112552,#0c1a37);border:1px solid #1a2c59;border-radius:12px;position:relative;overflow:hidden}
  canvas{position:absolute;left:0;top:0;width:100%;height:100%}
</style></head>
<body>
<div class="wrap">
  <div class="panel row">
    <div>Баланс: <span id="bal">0</span></div>
    <div>Ставка: <input id="bet" type="number" min="1" value="10" style="width:90px;background:#0e1836;color:#fff;border:1px solid #284aa0;border-radius:8px;padding:6px"></div>
  </div>
  <div class="panel chart"><canvas id="c"></canvas></div>
  <div class="panel row">
    <button id="up">Вверх</button>
    <button id="down">Вниз</button>
  </div>
</div>
<script>
  function send(m){ parent.postMessage(m,'*'); }
  let balance=0; send({type:'getBalance'});
  window.addEventListener('message',e=>{ if(e.data?.type==='balance'){ balance=e.data.value; bal.textContent=balance; }});
  const bal=document.getElementById('bal');
  const betEl=document.getElementById('bet');
  const up=document.getElementById('up'), down=document.getElementById('down');

  // псевдо‑график
  const cvs=document.getElementById('c'); const ctx=cvs.getContext('2d');
  function resize(){ cvs.width=cvs.clientWidth; cvs.height=cvs.clientHeight; }
  window.addEventListener('resize',resize); resize();
  let pts=Array.from({length:40},(_,i)=> 0.5 + 0.15*Math.sin(i/4));
  function draw(){
    ctx.clearRect(0,0,cvs.width,cvs.height);
    ctx.strokeStyle='#4aa3ff'; ctx.lineWidth=2; ctx.beginPath();
    pts.forEach((v,i)=>{ const x=i/(pts.length-1)*cvs.width; const y=(1-v)*cvs.height; i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
    ctx.stroke();
  }
  setInterval(()=>{
    const last=pts[pts.length-1];
    const next=Math.max(0.1,Math.min(0.9, last + (Math.random()-.5)*0.12));
    pts.push(next); pts.shift(); draw();
  },500); draw();

  function play(dir){ // dir: 'up'|'down'
    const bet=Math.max(1,parseInt(betEl.value||1));
    if(bet>balance) return alert('Недостаточно средств');
    send({type:'sub',amount:bet}); balance-=bet; bal.textContent=balance;
    // через 3 секунды определяем движение
    const start=pts[pts.length-1];
    setTimeout(()=>{
      const end=pts[pts.length-1];
      const upMove = end>start;
      const win = (dir==='up' && upMove) || (dir==='down' && !upMove);
      const k = 1.9; // коэффициент
      if(win){ const prize=Math.floor(bet*k); send({type:'add',amount:prize}); balance+=prize; }
      bal.textContent=balance;
      alert(win?('Победа! +' + Math.floor(bet*k)):'Проигрыш');
    },3000);
  }
  up.onclick=()=>play('up'); down.onclick=()=>play('down');
</script>
</body></html>
