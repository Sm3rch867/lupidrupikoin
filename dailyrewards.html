<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            background: #1e1e2f;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin: 10px 0 15px;
            width: 100%;
            max-width: 400px;
        }
        .day-card {
            background: #2e2e42;
            border-radius: 12px;
            padding: 10px 2px;
            text-align: center;
            font-size: 14px;
            border: 2px solid transparent;
        }
        .day-card.today {
            border-color: #f0c45a;
            background: #3e3a2c;
            font-weight: bold;
        }
        .day-card.claimed {
            opacity: 0.6;
            text-decoration: line-through;
        }
        .reward-btn {
            background: #f0c45a;
            border: none;
            color: #1e1e2f;
            font-weight: bold;
            font-size: 16px;
            padding: 10px 30px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
        .reward-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div style="font-size: 18px; margin-bottom: 5px;">🎁 День 3 из 7</div>
    <div class="days-grid">
        <div class="day-card claimed">1<br>🪙10</div>
        <div class="day-card claimed">2<br>🪙15</div>
        <div class="day-card today">3<br>🪙25</div>
        <div class="day-card">4<br>💎5</div>
        <div class="day-card">5<br>🪙50</div>
        <div class="day-card">6<br>🎁</div>
        <div class="day-card">7<br>👑</div>
    </div>
    <button class="reward-btn" onclick="alert('Награда получена! +25 монет')">🎁 Забрать награду</button>
    <p style="font-size:12px; color:#aaa; margin-top:10px;">Следующая награда через 23:59:40</p>
</body>
</html>
