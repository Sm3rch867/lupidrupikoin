<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dice</title>
<style>
  body{margin:0;background:#0b132a;color:#e9f0ff;font-family:Inter,system-ui}
  .wrap{max-width:520px;margin:0 auto;padding:14px}
  .panel{background:#0f1b39;border:1px solid #1a2c59;border-radius:12px;padding:12px;margin-bottom:10px}
  .row{display:flex;gap:10px;align-items:center;justify-content:space-between}
  button{background:#17306a;border:1px solid #2b55cc;color:#e9f0ff;border-radius:10px;padding:10px 14px;cursor:pointer}
  input,select{background:#0e1836;color:#fff;border:1px solid #284aa0;border-radius:8px;padding:8px}
</style></head>
<body>
<div class="wrap">
  <div class="panel row">
    <div>Баланс: <span id="bal">0</span></div>
    <div>Ставка: <input id="bet" type="number" min="1" value="10" style="width:90px"></div>
  </div>
  <div class="panel row">
    <div>
      Режим:
      <select id="mode">
        <option value="gt">Больше 3.5 (x1.9)</option>
        <option value="lt">Меньше 3.5 (x1.9)</option>
        <option value="eq">Точно число (x5)</option>
      </select>
    </div>
    <div id="numWrap">Число: <input id="num" type="number" min="1" max="6" value="6" style="width:70px"></div>
    <button id="roll">Бросок</button>
  </div>
  <div class="panel" id="res">Результат: —</div>
</div>
<script>
  function send(m){ parent.postMessage(m,'*'); }
  let balance=0; send({type:'getBalance'});
  window.addEventListener('message',e=>{ if(e.data?.type==='balance'){ balance=e.data.value; bal.textContent=balance; }});
  const bal=bal=document.getElementById('bal');
  const betEl=document.getElementById('bet');
  const mode=document.getElementById('mode');
  const numEl=document.getElementById('num');
  const numWrap=document.getElementById('numWrap');
  const res=document.getElementById('res');

  mode.addEventListener('change',()=>{ numWrap.style.display = mode.value==='eq'?'block':'none'; });
  mode.dispatchEvent(new Event('change'));

  document.getElementById('roll').onclick=()=>{
    const bet=Math.max(1,parseInt(betEl.value||1));
    if(bet>balance) return alert('Недостаточно средств');
    send({type:'sub',amount:bet}); balance-=bet; bal.textContent=balance;
    const d = Math.floor(Math.random()*6)+1;
    let win=false, k=0;
    if(mode.value==='gt'){ win = d>3; k=1.9; }
    if(mode.value==='lt'){ win = d<4; k=1.9; }
    if(mode.value==='eq'){ const n=parseInt(numEl.value||6); win=(d===n); k=5; }
    if(win){ const prize=Math.floor(bet*k); send({type:'add',amount:prize}); balance+=prize; }
    bal.textContent=balance;
    res.textContent='Результат: ' + d + (win?' — Победа! +'+Math.floor(bet*k):' — Не повезло');
  };
</script>
</body></html>
